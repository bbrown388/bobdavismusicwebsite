<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merch — Bob Davis Music</title>
<meta name="description" content="Bob Davis merch — hats, tees, and more.">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0d0608;
  color: #E8DCC8;
  font-family: Georgia, serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px 100px;
}

.back-nav {
  width: 100%;
  max-width: 480px;
  margin-bottom: 28px;
}

.back-link {
  font-size: 13px;
  color: #907860;
  text-decoration: none;
  letter-spacing: 1px;
  font-style: italic;
  transition: color 0.15s;
}
.back-link:hover { color: #FFD700; }

.section-label {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #888;
  text-align: center;
  margin-bottom: 28px;
}

/* ── Product grid ─────────────────── */
.product-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(195px, 1fr));
  gap: 20px;
  width: 100%;
  max-width: 480px;
  margin-bottom: 16px;
}
.product-grid.single {
  grid-template-columns: 1fr;
  max-width: 260px;
}

/* ── Product card ─────────────────── */
.product-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,215,0,0.15);
  border-radius: 12px;
  padding: 18px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  transition: border-color 0.2s, background 0.2s;
}
.product-card:hover {
  background: rgba(255,215,0,0.04);
  border-color: rgba(255,215,0,0.35);
}

/* ── Product image ────────────────── */
.product-img-wrap {
  width: 100%;
  aspect-ratio: 4/3;
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  background: rgba(255,255,255,0.07);
  box-shadow: inset 0 0 0 1px rgba(0,0,0,0.18);
}
.product-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: opacity 0.15s ease;
}
.product-img.fading { opacity: 0; }

/* ── Product text ─────────────────── */
.product-name {
  font-size: 15px;
  color: #FFD700;
  text-align: center;
  letter-spacing: 0.3px;
  line-height: 1.3;
  width: 100%;
}
.product-price {
  font-size: 16px;
  color: #b09878;
  font-weight: 600;
}

/* ── Variant buttons ──────────────── */
.variant-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-auto-rows: 42px;
  gap: 6px;
  width: 100%;
}
.variant-btn {
  height: 100%;
  padding: 4px 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px;
  color: #C8B89A;
  font-family: Georgia, serif;
  font-size: 11px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
  text-align: center;
  line-height: 1.3;
  display: flex;
  align-items: center;
  justify-content: center;
}
.variant-btn:hover:not(:disabled) {
  background: rgba(255,215,0,0.08);
  border-color: rgba(255,215,0,0.3);
  color: #E8DCC8;
}
.variant-btn.active {
  background: rgba(255,215,0,0.12);
  border-color: rgba(255,215,0,0.5);
  color: #FFD700;
}
.variant-btn:disabled {
  opacity: 0.3;
  cursor: default;
  text-decoration: line-through;
}

/* ── Add to cart button ───────────── */
.add-btn {
  width: 100%;
  padding: 13px 16px;
  background: rgba(255,215,0,0.24);
  border: 1px solid rgba(255,215,0,0.6);
  border-radius: 8px;
  color: #FFD700;
  font-family: Georgia, serif;
  font-size: 14px;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s, filter 0.15s;
  margin-top: auto;
}
.add-btn:hover:not(:disabled) {
  background: rgba(255,215,0,0.34);
  filter: brightness(1.1);
}
.add-btn:disabled { opacity: 0.45; cursor: default; }

/* ── Status messages ──────────────── */
.status-msg {
  color: #888;
  font-style: italic;
  font-size: 14px;
  text-align: center;
  padding: 40px 0;
  grid-column: 1 / -1;
}
.error-msg {
  color: #907860;
  font-style: italic;
  font-size: 14px;
  text-align: center;
  padding: 40px 0;
}

/* ── Cart toggle ──────────────────── */
.cart-toggle {
  position: fixed;
  bottom: 24px;
  right: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(255,215,0,0.12);
  border: 1px solid rgba(255,215,0,0.4);
  border-radius: 24px;
  color: #FFD700;
  font-family: Georgia, serif;
  font-size: 14px;
  font-weight: bold;
  letter-spacing: 0.5px;
  padding: 10px 18px;
  cursor: pointer;
  transition: background 0.15s;
  z-index: 100;
}
.cart-toggle:hover { background: rgba(255,215,0,0.2); }
.cart-count {
  background: #FFD700;
  color: #0d0608;
  border-radius: 50%;
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: bold;
}

/* ── Cart overlay ─────────────────── */
.cart-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
}
.cart-overlay.visible { display: block; }

/* ── Cart drawer ──────────────────── */
.cart-drawer {
  position: fixed;
  top: 0;
  right: -360px;
  width: 320px;
  height: 100%;
  background: #140a0c;
  border-left: 1px solid rgba(255,215,0,0.15);
  display: flex;
  flex-direction: column;
  z-index: 300;
  transition: right 0.28s ease;
  padding: 24px 20px;
}
.cart-drawer.open { right: 0; }

.cart-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid rgba(255,215,0,0.1);
}
.cart-header span {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #888;
}
.cart-close {
  background: none;
  border: none;
  color: #888;
  font-size: 18px;
  cursor: pointer;
  padding: 4px;
  transition: color 0.15s;
}
.cart-close:hover { color: #FFD700; }

.cart-empty {
  color: #888;
  font-style: italic;
  font-size: 14px;
  text-align: center;
  padding: 40px 0;
}
.cart-items {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.cart-item {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
  padding-bottom: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.cart-item-info { flex: 1; }
.cart-item-name {
  font-size: 14px;
  color: #E8DCC8;
  margin-bottom: 4px;
  line-height: 1.3;
}
.cart-item-price {
  font-size: 12px;
  color: #907860;
  font-style: italic;
}
.cart-item-remove {
  background: none;
  border: none;
  color: #444;
  font-size: 14px;
  cursor: pointer;
  padding: 2px 4px;
  transition: color 0.15s;
  flex-shrink: 0;
}
.cart-item-remove:hover { color: #907860; }

.cart-footer {
  padding-top: 20px;
  border-top: 1px solid rgba(255,215,0,0.1);
  margin-top: 8px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.cart-subtotal {
  font-size: 14px;
  color: #C8B89A;
  text-align: right;
}
.checkout-btn {
  display: block;
  width: 100%;
  padding: 13px;
  background: rgba(255,215,0,0.15);
  border: 1px solid rgba(255,215,0,0.5);
  border-radius: 8px;
  color: #FFD700;
  font-family: Georgia, serif;
  font-size: 14px;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
  text-align: center;
  text-decoration: none;
  transition: background 0.15s, filter 0.15s;
}
.checkout-btn:hover {
  background: rgba(255,215,0,0.25);
  filter: brightness(1.1);
}

footer {
  margin-top: 40px;
  text-align: center;
  color: #776650;
  font-size: 12px;
  letter-spacing: 1px;
}

/* ── Image thumbnail gallery ──────── */
.img-thumbs {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  width: 100%;
  padding-bottom: 4px;
  scrollbar-width: none;
  margin-bottom: 10px;
}
.img-thumbs::-webkit-scrollbar { display: none; }

.img-thumb {
  width: 54px;
  height: 54px;
  flex-shrink: 0;
  border-radius: 6px;
  overflow: hidden;
  border: 2px solid transparent;
  cursor: pointer;
  padding: 0;
  background: rgba(255,255,255,0.04);
  transition: border-color 0.15s;
}
.img-thumb img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.img-thumb.active { border-color: #FFD700; }
.img-thumb:hover:not(.active) { border-color: rgba(255,215,0,0.45); }

/* ── Option label ─────────────────── */
.option-label {
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #776650;
  margin-bottom: 5px;
  width: 100%;
}

/* ── Size picker ──────────────────── */
.size-picker {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  width: 100%;
  margin-bottom: 2px;
}
.size-btn {
  padding: 6px 14px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px;
  color: #C8B89A;
  font-family: Georgia, serif;
  font-size: 12px;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.size-btn:hover:not(:disabled) {
  background: rgba(255,215,0,0.08);
  border-color: rgba(255,215,0,0.3);
  color: #E8DCC8;
}
.size-btn.active {
  background: rgba(255,215,0,0.14);
  border-color: rgba(255,215,0,0.55);
  color: #FFD700;
}
.size-btn:disabled {
  opacity: 0.28;
  cursor: default;
  text-decoration: line-through;
}

/* ── Trust line ───────────────────── */
.trust-line {
  font-size: 12px;
  color: #776650;
  letter-spacing: 0.5px;
  text-align: center;
  margin-top: -16px;
  margin-bottom: 20px;
  font-style: italic;
}

/* ── Product description ──────────── */
.product-desc {
  font-size: 12px;
  color: #9a7a64;
  line-height: 1.6;
  text-align: center;
  width: 100%;
  margin: 0;
}

/* ── Option selected label ────────── */
.opt-current {
  color: #FFD700;
  font-style: normal;
}

/* ── Hidden color overflow ────────── */
.color-hidden { display: none; }

/* ── Thumbnail overflow count ─────── */
.thumb-count {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 54px;
  height: 54px;
  flex-shrink: 0;
  border-radius: 6px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: #9a7a64;
  font-size: 11px;
  font-style: italic;
  cursor: default;
  user-select: none;
}

/* ── Focus indicators ─────────────── */
.size-btn:focus-visible,
.img-thumb:focus-visible,
.add-btn:focus-visible,
.variant-btn:focus-visible,
.cart-toggle:focus-visible,
.checkout-btn:focus-visible {
  outline: 2px solid rgba(255,215,0,0.85);
  outline-offset: 2px;
}

@media (max-width: 400px) {
  .cart-drawer { width: 100%; right: -100%; }
  .product-grid { grid-template-columns: 1fr; }
  .product-grid.single { max-width: 100%; }
}

<script>
const SHOP_DOMAIN = '6anqxb-rt.myshopify.com';
const STOREFRONT_TOKEN = '2a7e0382b6e5915658809f9549bb28a7';
const GQL = `https://${SHOP_DOMAIN}/api/2024-01/graphql.json`;

let cartId = localStorage.getItem('bd_cart_id');
let currentCart = null;

async function shopify(query, variables = {}) {
  const res = await fetch(GQL, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Shopify-Storefront-Access-Token': STOREFRONT_TOKEN,
    },
    body: JSON.stringify({ query, variables }),
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.errors) throw new Error(json.errors[0].message);
  return json.data;
}

function fmt(amount, currency) {
  return new Intl.NumberFormat('en-US', { style: 'currency', currency }).format(amount);
}

// ── Products ──────────────────────────────────────────────

async function loadProducts() {
  try {
    const data = await shopify(`{
      products(first: 20, sortKey: CREATED_AT, reverse: true) {
        edges {
          node {
            id title description
            priceRange { minVariantPrice { amount currencyCode } }
            options { name values }
            images(first: 20) { edges { node { url altText } } }
            variants(first: 30) {
              edges {
                node {
                  id title availableForSale
                  selectedOptions { name value }
                  image { url altText }
                  priceV2 { amount currencyCode }
                }
              }
            }
          }
        }
      }
    }`);
    renderProducts(data.products.edges.map(e => e.node));
  } catch (err) {
    console.error(err);
    document.getElementById('product-grid').innerHTML = '';
    document.getElementById('error-msg').hidden = false;
  }
}

function safeId(gid) { return gid.replace(/[^a-z0-9]/gi, ''); }

const _cards = {};

function renderProducts(products) {
  const grid = document.getElementById('product-grid');
  if (!products.length) {
    grid.innerHTML = '<p class="status-msg">No products yet — check back soon.</p>';
    return;
  }
  if (products.length === 1) grid.classList.add('single');
  grid.innerHTML = products.map(buildCard).join('');
  gtag('event', 'view_item_list', {
    item_list_name: 'Merch',
    items: products.map(p => ({
      item_id: p.id,
      item_name: p.title,
      price: parseFloat(p.priceRange.minVariantPrice.amount),
      currency: p.priceRange.minVariantPrice.currencyCode
    }))
  });
}

function buildCard(p) {
  const sid = safeId(p.id);
  const variants = p.variants.edges.map(e => e.node);
  const options = p.options || [];
  const price = fmt(p.priceRange.minVariantPrice.amount, p.priceRange.minVariantPrice.currencyCode);
  const available = variants.some(v => v.availableForSale);
  const firstVariant = variants[0];
  const mainImg = firstVariant?.image || null;

  const allImages = (p.images?.edges || []).map(e => e.node);
  const colorOpt = options.find(o => /^colou?r$/i.test(o.name));
  const sizeOpt  = options.find(o => /^size$/i.test(o.name));
  const isDefault = variants.length === 1 && variants[0].title === 'Default Title';

  // Seed card state with first variant's selections
  const initSelected = {};
  if (!isDefault && firstVariant?.selectedOptions) {
    firstVariant.selectedOptions.forEach(o => { initSelected[o.name] = o.value; });
  }
  _cards[sid] = { variants, options, selected: initSelected };

  const mainImgHtml = mainImg
    ? `<img class="product-img" id="img-${sid}" src="${mainImg.url}" alt="${mainImg.altText || p.title}">`
    : `<div class="product-img" style="background:rgba(255,215,0,0.04)"></div>`;

  // Thumbnail strip — cap at 6, show overflow count
  const MAX_THUMBS = 6;
  const visibleImgs = allImages.slice(0, MAX_THUMBS);
  const extraImgs = allImages.length - MAX_THUMBS;
  const thumbsHtml = allImages.length > 1
    ? `<div class="img-thumbs" id="ithumbs-${sid}">
        ${visibleImgs.map((img, i) => `<button class="img-thumb${i === 0 ? ' active' : ''}"
          data-img-url="${img.url}" data-img-alt="${img.altText || ''}"
          onclick="selectThumb(this,'${sid}')">
          <img src="${img.url}" alt="${img.altText || ''}" loading="lazy">
        </button>`).join('')}
        ${extraImgs > 0 ? `<div class="thumb-count">+${extraImgs}</div>` : ''}
      </div>`
    : '';

  // Color pill buttons — show first 5, collapse rest
  const MAX_COLORS = 5;
  let colorHtml = '';
  if (colorOpt && !isDefault) {
    const seen = new Map();
    variants.forEach(v => {
      const val = v.selectedOptions?.find(o => o.name === colorOpt.name)?.value;
      if (val && !seen.has(val)) seen.set(val, v);
    });
    if (seen.size > 1) {
      const initColor = initSelected[colorOpt.name];
      const colorEntries = [...seen.entries()];
      const visibleColors = colorEntries.slice(0, MAX_COLORS);
      const hiddenColors  = colorEntries.slice(MAX_COLORS);
      const renderBtn = ([val, v], hidden) => `<button
        class="size-btn${val === initColor ? ' active' : ''}${hidden ? ' color-hidden' : ''}"
        data-opt="${colorOpt.name}" data-val="${val}"
        data-img-url="${v.image?.url || ''}" data-img-alt="${v.image?.altText || ''}"
        onclick="selectOpt(this,'${sid}')">${val}</button>`;
      const moreBtn = hiddenColors.length > 0
        ? `<button class="size-btn more-btn" onclick="showMoreColors('${sid}')">+${hiddenColors.length} more</button>`
        : '';
      colorHtml = `<div class="option-label">Color: <span class="opt-current" id="clabel-${sid}">${initColor || ''}</span></div>
        <div class="size-picker" id="cthumbs-${sid}">
          ${visibleColors.map(e => renderBtn(e, false)).join('')}
          ${hiddenColors.map(e => renderBtn(e, true)).join('')}
          ${moreBtn}
        </div>`;
    }
  }

  // Size picker
  let sizeHtml = '';
  if (sizeOpt && !isDefault) {
    const initColor = initSelected[colorOpt?.name];
    const initSize  = initSelected[sizeOpt.name];
    sizeHtml = `<div class="option-label">Size: <span class="opt-current" id="slabel-${sid}">${initSize || ''}</span></div>
      <div class="size-picker" id="spicker-${sid}">
        ${sizeOpt.values.map(sv => {
          const ok = variants.some(v => {
            const hasSize  = v.selectedOptions?.some(o => o.name === sizeOpt.name && o.value === sv);
            const hasColor = !colorOpt || !initColor || v.selectedOptions?.some(o => o.name === colorOpt.name && o.value === initColor);
            return hasSize && hasColor && v.availableForSale;
          });
          return `<button class="size-btn${sv === initSize ? ' active' : ''}"
            data-opt="${sizeOpt.name}" data-val="${sv}"
            onclick="selectOpt(this,'${sid}')" ${!ok ? 'disabled' : ''}>${sv}</button>`;
        }).join('')}
      </div>`;
  }

  // Fallback: flat variant buttons for products with unrecognised option types
  let legacyHtml = '';
  if (!colorOpt && !sizeOpt && variants.length > 1 && !isDefault) {
    legacyHtml = `<div class="variant-buttons" id="vbtns-${sid}">
      ${variants.map((v, i) => `<button class="variant-btn${i === 0 ? ' active' : ''}"
        data-vid="${v.id}" data-img-url="${v.image?.url || ''}" data-img-alt="${v.image?.altText || ''}"
        data-price="${v.priceV2?.amount || ''}" onclick="selectVariant(this,'${sid}')"
        ${!v.availableForSale ? 'disabled' : ''}>${v.title}</button>`).join('')}
    </div>`;
  }

  const descHtml = p.description
    ? `<p class="product-desc">${p.description.length > 110 ? p.description.slice(0, 110) + '…' : p.description}</p>`
    : '';

  return `
    <div class="product-card">
      <div class="product-img-wrap">${mainImgHtml}</div>
      ${thumbsHtml}
      <div class="product-name">${p.title}</div>
      <div class="product-price">${price}</div>
      ${descHtml}
      ${colorHtml}${sizeHtml}${legacyHtml}
      <button class="add-btn" id="add-${sid}"
        data-sid="${sid}" data-vid="${firstVariant?.id || ''}"
        data-product-name="${p.title.replace(/"/g, '&quot;')}"
        data-price="${firstVariant?.priceV2?.amount || p.priceRange.minVariantPrice.amount}"
        data-currency="${p.priceRange.minVariantPrice.currencyCode}"
        onclick="handleAdd(this)" ${!available ? 'disabled' : ''}>
        ${available ? 'Add to Cart' : 'Sold Out'}
      </button>
    </div>`;
}

function selectOpt(btn, sid) {
  const card = _cards[sid];
  if (!card) return;
  const optName = btn.dataset.opt;
  const optVal  = btn.dataset.val;
  card.selected[optName] = optVal;

  // Mark active in this group
  btn.closest('.size-picker')
    ?.querySelectorAll('button')
    .forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Update inline option label
  const colorOpt = card.options.find(o => /^colou?r$/i.test(o.name));
  const sizeOpt  = card.options.find(o => /^size$/i.test(o.name));
  if (colorOpt && optName === colorOpt.name) {
    const lbl = document.getElementById(`clabel-${sid}`);
    if (lbl) lbl.textContent = optVal;
  }
  if (sizeOpt && optName === sizeOpt.name) {
    const lbl = document.getElementById(`slabel-${sid}`);
    if (lbl) lbl.textContent = optVal;
  }

  // Color changed — swap image and refresh size availability
  if (colorOpt && optName === colorOpt.name) {
    if (btn.dataset.imgUrl) swapMainImage(sid, btn.dataset.imgUrl, btn.dataset.imgAlt || '');
    if (sizeOpt) {
      const selectedColor = card.selected[colorOpt.name];
      const selectedSize  = card.selected[sizeOpt.name];
      document.getElementById(`spicker-${sid}`)
        ?.querySelectorAll('.size-btn')
        .forEach(sb => {
          const sv = sb.dataset.val;
          const ok = card.variants.some(v => {
            const hasColor = v.selectedOptions?.some(o => o.name === colorOpt.name && o.value === selectedColor);
            const hasSize  = v.selectedOptions?.some(o => o.name === sizeOpt.name  && o.value === sv);
            return hasColor && hasSize && v.availableForSale;
          });
          sb.disabled = !ok;
          if (sv === selectedSize && !ok) {
            sb.classList.remove('active');
            delete card.selected[sizeOpt.name];
          }
        });
    }
  }

  // Find matching variant and update Add to Cart
  const match = card.variants.find(v =>
    Object.entries(card.selected).every(([n, val]) =>
      v.selectedOptions?.some(o => o.name === n && o.value === val)
    )
  );
  const addBtn = document.getElementById(`add-${sid}`);
  if (match && addBtn) {
    addBtn.dataset.vid = match.id;
    if (match.priceV2?.amount) addBtn.dataset.price = match.priceV2.amount;
  }
}

function selectVariant(btn, sid) {
  document.querySelectorAll(`#vbtns-${sid} .variant-btn`).forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const addBtn = document.getElementById(`add-${sid}`);
  addBtn.dataset.vid = btn.dataset.vid;
  if (btn.dataset.price) addBtn.dataset.price = btn.dataset.price;
  if (btn.dataset.imgUrl) swapMainImage(sid, btn.dataset.imgUrl, btn.dataset.imgAlt);
}

function selectThumb(btn, sid) {
  document.getElementById(`ithumbs-${sid}`)
    ?.querySelectorAll('.img-thumb')
    .forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  swapMainImage(sid, btn.dataset.imgUrl, btn.dataset.imgAlt, true);
}

function showMoreColors(sid) {
  const container = document.getElementById(`cthumbs-${sid}`);
  if (!container) return;
  container.querySelectorAll('.color-hidden').forEach(b => b.classList.remove('color-hidden'));
  container.querySelector('.more-btn')?.remove();
}

function swapMainImage(sid, url, alt, skipThumbSync) {
  const imgEl = document.getElementById(`img-${sid}`);
  if (!imgEl || imgEl.src === url) return;
  imgEl.classList.add('fading');
  const start = Date.now();
  const preload = new Image();
  preload.onload = preload.onerror = () => {
    const wait = Math.max(0, 150 - (Date.now() - start));
    setTimeout(() => {
      imgEl.src = url;
      imgEl.alt = alt || '';
      imgEl.classList.remove('fading');
      if (!skipThumbSync) {
        const thumbs = document.getElementById(`ithumbs-${sid}`);
        thumbs?.querySelectorAll('.img-thumb').forEach(b => {
          const match = b.dataset.imgUrl === url;
          b.classList.toggle('active', match);
          if (match) b.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
        });
      }
    }, wait);
  };
  preload.src = url;
}


// ── Cart ──────────────────────────────────────────────────

const CART_FIELDS = `
  id checkoutUrl totalQuantity
  lines(first: 20) {
    edges {
      node {
        id quantity
        merchandise {
          ... on ProductVariant {
            id title
            product { title }
            priceV2 { amount currencyCode }
          }
        }
      }
    }
  }
  estimatedCost { subtotalAmount { amount currencyCode } }
`;

async function createCartWith(variantId) {
  const data = await shopify(`
    mutation($lines: [CartLineInput!]) {
      cartCreate(input: { lines: $lines }) { cart { ${CART_FIELDS} } }
    }`, { lines: [{ merchandiseId: variantId, quantity: 1 }] });
  return data.cartCreate.cart;
}

async function addLineToCart(variantId) {
  const data = await shopify(`
    mutation($cartId: ID!, $lines: [CartLineInput!]!) {
      cartLinesAdd(cartId: $cartId, lines: $lines) { cart { ${CART_FIELDS} } }
    }`, { cartId, lines: [{ merchandiseId: variantId, quantity: 1 }] });
  return data.cartLinesAdd.cart;
}

async function removeLineFromCart(lineId) {
  const data = await shopify(`
    mutation($cartId: ID!, $lineIds: [ID!]!) {
      cartLinesRemove(cartId: $cartId, lineIds: $lineIds) { cart { ${CART_FIELDS} } }
    }`, { cartId, lineIds: [lineId] });
  return data.cartLinesRemove.cart;
}

async function handleAdd(btn) {
  const variantId = btn.dataset.vid;
  if (!variantId) return;

  const orig = btn.textContent.trim();
  btn.textContent = 'Adding…';
  btn.disabled = true;

  try {
    let cart;
    if (!cartId) {
      cart = await createCartWith(variantId);
      cartId = cart.id;
      localStorage.setItem('bd_cart_id', cartId);
    } else {
      try {
        cart = await addLineToCart(variantId);
        if (!cart) throw new Error('null cart');
      } catch {
        cartId = null;
        localStorage.removeItem('bd_cart_id');
        cart = await createCartWith(variantId);
        cartId = cart.id;
        localStorage.setItem('bd_cart_id', cartId);
      }
    }
    updateCartUI(cart);
    gtag('event', 'add_to_cart', {
      currency: btn.dataset.currency || 'USD',
      value: parseFloat(btn.dataset.price || 0),
      items: [{ item_id: variantId, item_name: btn.dataset.productName || '', price: parseFloat(btn.dataset.price || 0), quantity: 1 }]
    });
    btn.textContent = 'Added!';
    setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 1400);
    openCart();
  } catch (err) {
    console.error(err);
    btn.textContent = 'Try Again';
    btn.disabled = false;
  }
}

async function removeLine(lineId) {
  try { updateCartUI(await removeLineFromCart(lineId)); }
  catch (err) { console.error(err); }
}

function updateCartUI(cart) {
  currentCart = cart;
  const qty = cart.totalQuantity;
  const lines = cart.lines.edges.map(e => e.node);

  document.getElementById('cart-toggle').hidden = qty === 0;
  document.getElementById('cart-count').textContent = qty;
  document.getElementById('checkout-btn').href = cart.checkoutUrl;

  const emptyEl = document.getElementById('cart-empty');
  const footerEl = document.getElementById('cart-footer');
  const itemsEl = document.getElementById('cart-items');

  if (!lines.length) {
    itemsEl.innerHTML = '';
    emptyEl.hidden = false;
    footerEl.hidden = true;
    return;
  }

  emptyEl.hidden = true;
  footerEl.hidden = false;
  document.getElementById('cart-subtotal').textContent =
    `Subtotal: ${fmt(cart.estimatedCost.subtotalAmount.amount, cart.estimatedCost.subtotalAmount.currencyCode)}`;

  itemsEl.innerHTML = lines.map(line => {
    const m = line.merchandise;
    const label = m.title !== 'Default Title' ? ` — ${m.title}` : '';
    return `
      <div class="cart-item">
        <div class="cart-item-info">
          <div class="cart-item-name">${m.product.title}${label}</div>
          <div class="cart-item-price">Qty ${line.quantity} &times; ${fmt(m.priceV2.amount, m.priceV2.currencyCode)}</div>
        </div>
        <button class="cart-item-remove" onclick="removeLine('${line.id}')" aria-label="Remove">&#10005;</button>
      </div>`;
  }).join('');
}

function trackCheckout() {
  if (!currentCart) return;
  const lines = currentCart.lines.edges.map(e => e.node);
  gtag('event', 'begin_checkout', {
    currency: currentCart.estimatedCost.subtotalAmount.currencyCode,
    value: parseFloat(currentCart.estimatedCost.subtotalAmount.amount),
    items: lines.map(l => ({
      item_id: l.merchandise.id,
      item_name: l.merchandise.product.title,
      item_variant: l.merchandise.title !== 'Default Title' ? l.merchandise.title : undefined,
      price: parseFloat(l.merchandise.priceV2.amount),
      quantity: l.quantity
    }))
  });
}

function openCart() {
  document.getElementById('cart-drawer').classList.add('open');
  document.getElementById('cart-overlay').classList.add('visible');
}
function closeCart() {
  document.getElementById('cart-drawer').classList.remove('open');
  document.getElementById('cart-overlay').classList.remove('visible');
}

async function restoreCart() {
  if (!cartId) return;
  try {
    const data = await shopify(`
      query($id: ID!) { cart(id: $id) { ${CART_FIELDS} } }
    `, { id: cartId });
    if (data.cart) updateCartUI(data.cart);
    else { cartId = null; localStorage.removeItem('bd_cart_id'); }
  } catch (err) {
    console.error(err);
  }
}

loadProducts();
restoreCart();
</script>
