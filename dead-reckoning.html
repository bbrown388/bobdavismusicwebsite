<!DOCTYPE html>
<html lang="en">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;align-items:center;justify-content:center;height:100vh;overflow:hidden}
canvas{display:block;image-rendering:pixelated}

<body>
<canvas id="c"></canvas>
<script>
const MUSIC_SRC = '';
const FEEDBACK_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwdJq8jFwM31ZUwkyhRrVVJkk5wf8rOZARAArWFOMfaymVOnNmnmM7fOc_acsiM6dRVSg/exec';

// Canvas setup
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 360, H = 640;
canvas.width = W; canvas.height = H;
(function scale() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.style.width = s * W + 'px';
  canvas.style.height = s * H + 'px';
})();

// Layout constants
const SKY_Y = 40, SKY_H = 330;        // stars zone y=40..370
const INFO_Y = 370, INFO_H = 28;       // instruction bar
const MAP_Y = 398, MAP_H = 200;        // terrain map y=398..598
const NAV_Y = 598, NAV_H = 42;         // arrow buttons
const COLS = 5, ROWS = 4;
const CW = W / COLS;                   // 72
const CH = MAP_H / ROWS;               // 50
const STAR_TAP_R = 22;                 // tap radius for stars

// Star tap constant exposed for tests
const STAR_HIT_R = STAR_TAP_R;

// Named stars - fixed positions in sky
const NAMED_STARS = [
  { x: 180, y: 85,  name: 'POLARIS',  color: '#FFE066' }, // 0 - north star
  { x: 286, y: 128, name: 'VEGA',     color: '#CCE0FF' }, // 1 - right side
  { x: 82,  y: 195, name: 'ALTAIR',   color: '#FFDDAA' }, // 2 - left
  { x: 272, y: 240, name: 'ANTARES',  color: '#FF8080' }, // 3 - lower right
  { x: 108, y: 290, name: 'DENEB',    color: '#AADDFF' }, // 4 - lower left
  { x: 195, y: 320, name: 'RIGEL',    color: '#DDEEEE' }, // 5 - bottom center
];

// Cardinal direction labels
function bearingLabel(deg) {
  const dirs = ['N','NE','E','SE','S','SW','W','NW'];
  return dirs[Math.round(deg / 45) % 8];
}

// Cell center on canvas
function cellCenter(c, r) {
  return { x: c * CW + CW / 2, y: MAP_Y + r * CH + CH / 2 };
}

// Bearing line segment clipped to terrain map rect
function bearingSegment(c, r, bearing) {
  const pt = cellCenter(c, r);
  const rad = bearing * Math.PI / 180;
  const dx = Math.sin(rad), dy = -Math.cos(rad);
  const x0 = 0, y0 = MAP_Y, x1 = W, y1 = MAP_Y + MAP_H;
  let tMin = -Infinity, tMax = Infinity;
  if (Math.abs(dx) > 1e-9) {
    const ta = (x0 - pt.x) / dx, tb = (x1 - pt.x) / dx;
    tMin = Math.max(tMin, Math.min(ta, tb));
    tMax = Math.min(tMax, Math.max(ta, tb));
  }
  if (Math.abs(dy) > 1e-9) {
    const ta = (y0 - pt.y) / dy, tb = (y1 - pt.y) / dy;
    tMin = Math.max(tMin, Math.min(ta, tb));
    tMax = Math.min(tMax, Math.max(ta, tb));
  }
  if (tMin > tMax) return null;
  return {
    x1: pt.x + tMin * dx, y1: pt.y + tMin * dy,
    x2: pt.x + tMax * dx, y2: pt.y + tMax * dy
  };
}

// 5 rounds: navStars=indices into NAMED_STARS, bearings=FROM player TO star
const ROUNDS = [
  { // Round 1: straight north
    navStars: [0, 1], bearings: [0, 48],
    playerCell: [2, 3], ranchCell: [2, 0], maxMoves: 7,
    terrain: [
      ['g','g','R','g','g'],
      ['g','g','g','g','g'],
      ['g','g','g','g','g'],
      ['g','g','g','g','g']
    ],
    clouds: [{ x: -220, y: 80,  w: 160, h: 80, speed: 0.28 }]
  },
  { // Round 2: west required, river obstacle
    navStars: [0, 2], bearings: [0, 272],
    playerCell: [4, 3], ranchCell: [0, 0], maxMoves: 9,
    terrain: [
      ['R','g','g','g','g'],
      ['g','g','v','g','g'],
      ['g','r','r','g','g'],
      ['g','g','g','g','g']
    ],
    clouds: [
      { x: -170, y: 60,  w: 140, h: 75, speed: 0.36 },
      { x:   60, y: 210, w: 120, h: 55, speed: 0.32 }
    ]
  },
  { // Round 3: diagonal path, multiple hazards
    navStars: [1, 3], bearings: [44, 138],
    playerCell: [0, 3], ranchCell: [4, 0], maxMoves: 10,
    terrain: [
      ['g','g','g','g','R'],
      ['g','v','g','g','g'],
      ['g','g','r','v','g'],
      ['g','g','g','g','g']
    ],
    clouds: [
      { x: -100, y: 75,  w: 145, h: 72, speed: 0.44 },
      { x:  160, y: 165, w: 125, h: 58, speed: 0.38 },
      { x: -230, y: 250, w: 105, h: 50, speed: 0.48 }
    ]
  },
  { // Round 4: complex, faster clouds
    navStars: [0, 4], bearings: [0, 316],
    playerCell: [4, 3], ranchCell: [1, 0], maxMoves: 9,
    terrain: [
      ['g','R','g','g','g'],
      ['g','g','g','v','g'],
      ['g','v','g','g','r'],
      ['g','g','g','g','g']
    ],
    clouds: [
      { x:  -80, y: 50,  w: 155, h: 82, speed: 0.54 },
      { x:  110, y: 145, w: 135, h: 68, speed: 0.50 },
      { x: -190, y: 225, w: 115, h: 55, speed: 0.58 }
    ]
  },
  { // Round 5: hardest - complex path, fastest clouds
    navStars: [2, 3], bearings: [226, 133],
    playerCell: [2, 3], ranchCell: [4, 0], maxMoves: 11,
    terrain: [
      ['g','v','g','g','R'],
      ['g','g','v','g','g'],
      ['g','r','g','v','g'],
      ['g','g','g','g','g']
    ],
    clouds: [
      { x:  -60, y: 42,  w: 162, h: 88, speed: 0.68 },
      { x:  125, y: 128, w: 142, h: 75, speed: 0.62 },
      { x: -145, y: 200, w: 122, h: 62, speed: 0.72 },
      { x:   55, y: 280, w: 102, h: 52, speed: 0.58 }
    ]
  }
];

// Game state
let state, round, score, lives, movesLeft;
let playerCell, ranchCell, terrain, clouds;
let tappedNavStars, drawnBearings, locateTries;
let flashCells, popup, roundResult;
let bgStars, starPhase, cloudT;
let best = parseInt(localStorage.getItem('dead_reckoning_best') || '0', 10);
let feedbackOpen = false, fbName = '', fbMsg = '', fbRating = 0;
let last = 0;

// Background star field (random, fixed)
function makeBgStars() {
  const arr = [];
  const rng = { n: 42 };
  function rand() { rng.n = (rng.n * 1664525 + 1013904223) & 0xffffffff; return (rng.n >>> 0) / 0xffffffff; }
  for (let i = 0; i < 80; i++) {
    arr.push({ x: rand() * W, y: SKY_Y + rand() * SKY_H, r: 0.5 + rand() * 1.2, tw: rand() * Math.PI * 2 });
  }
  return arr;
}

// Audio
const AC = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, dur, vol, type, attack, release) {
  const g = AC.createGain(); const o = AC.createOscillator();
  o.type = type || 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(0, AC.currentTime);
  g.gain.linearRampToValueAtTime(vol, AC.currentTime + (attack || 0.02));
  g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur + (release || 0.1));
  o.connect(g); g.connect(AC.destination);
  o.start(); o.stop(AC.currentTime + dur + (release || 0.1) + 0.05);
}
function playChime()   { playTone(880, 0.3, 0.3, 'sine', 0.01, 0.3); playTone(1320, 0.2, 0.2, 'sine', 0.04, 0.3); }
function playWhoosh()  { playTone(300, 0.3, 0.2, 'triangle', 0.01, 0.25); playTone(450, 0.25, 0.15, 'triangle', 0.05, 0.2); }
function playChord()   { [440,550,660].forEach((f,i) => playTone(f, 0.5, 0.25, 'sine', 0.01 + i*0.02, 0.4)); }
function playThud()    { playTone(120, 0.2, 0.4, 'square', 0.005, 0.15); }
function playStep()    { playTone(200 + Math.random()*40, 0.12, 0.2, 'triangle', 0.005, 0.08); }
function playFanfare() { [523,659,784,1047].forEach((f,i) => setTimeout(() => playTone(f, 0.4, 0.3, 'sine', 0.01, 0.3), i*120)); }
function playFail()    { [440,370,330,220].forEach((f,i) => setTimeout(() => playTone(f, 0.3, 0.25, 'sine', 0.01, 0.2), i*100)); }

// --- Game logic ---
function startGame() {
  if (AC.state === 'suspended') AC.resume();
  round = 0; score = 0; lives = 3;
  bgStars = makeBgStars(); starPhase = 0;
  startRound();
}

function startRound() {
  const rd = ROUNDS[round];
  playerCell = [...rd.playerCell];
  ranchCell  = [...rd.ranchCell];
  terrain = rd.terrain.map(row => [...row]);
  terrain[ranchCell[1]][ranchCell[0]] = 'R';
  movesLeft = rd.maxMoves;
  clouds = rd.clouds.map(c => ({ ...c }));
  tappedNavStars = [];
  drawnBearings  = [];
  locateTries    = 0;
  flashCells     = [];
  popup          = null;
  roundResult    = null;
  cloudT         = 0;
  state = 'starphase';
}

function isStarCovered(starIdx) {
  const s = NAMED_STARS[starIdx];
  for (const cl of clouds) {
    if (s.x >= cl.x && s.x <= cl.x + cl.w && s.y >= cl.y && s.y <= cl.y + cl.h) return true;
  }
  return false;
}

function tapStar(sx) {
  if (state !== 'starphase') return;
  const rd = ROUNDS[round];
  for (let ni = 0; ni < rd.navStars.length; ni++) {
    const starIdx = rd.navStars[ni];
    if (tappedNavStars.includes(starIdx)) continue;
    if (isStarCovered(starIdx)) continue;
    const s = NAMED_STARS[starIdx];
    const dx = sx.x - s.x, dy = sx.y - s.y;
    if (dx*dx + dy*dy <= STAR_TAP_R * STAR_TAP_R) {
      tappedNavStars.push(starIdx);
      drawnBearings.push({ starIdx, bearing: rd.bearings[ni] });
      playChime();
      if (tappedNavStars.length === 2) {
        setTimeout(() => { if (state === 'starphase') { state = 'locating'; } }, 900);
      }
      return;
    }
  }
}

function tapTerrain(px, py) {
  if (state !== 'locating') return;
  const c = Math.floor(px / CW);
  const r = Math.floor((py - MAP_Y) / CH);
  if (c < 0 || c >= COLS || r < 0 || r >= ROWS) return;
  if (c === playerCell[0] && r === playerCell[1]) {
    const pts = locateTries === 0 ? 100 : Math.max(20, 100 - locateTries * 25);
    score += pts;
    flashCells.push({ c, r, color: '#FFE066', t: 0.9 });
    popup = { x: cellCenter(c,r).x, y: MAP_Y + r * CH, text: '+' + pts, color: '#FFE066', t: 1.0 };
    playChord();
    setTimeout(() => { if (state === 'locating') state = 'navigating'; }, 900);
  } else {
    locateTries++;
    score = Math.max(0, score - 20);
    flashCells.push({ c, r, color: '#E74C3C', t: 0.6 });
    popup = { x: cellCenter(c,r).x, y: MAP_Y + r * CH, text: 'WRONG', color: '#E74C3C', t: 0.8 };
    playThud();
  }
}

const DIR_DELTAS = { N: [0,-1], S: [0,1], E: [1,0], W: [-1,0] };

function movePlayer(dir) {
  if (state !== 'navigating') return;
  const [dc, dr] = DIR_DELTAS[dir];
  const nc = playerCell[0] + dc, nr = playerCell[1] + dr;
  if (nc < 0 || nc >= COLS || nr < 0 || nr >= ROWS) {
    popup = { x: W/2, y: MAP_Y + 20, text: 'WALL', color: '#FF9F43', t: 0.6 };
    return;
  }
  const cell = terrain[nr][nc];
  if (cell === 'v') {
    popup = { x: cellCenter(nc,nr).x, y: MAP_Y + nr*CH, text: 'RAVINE!', color: '#E74C3C', t: 1.0 };
    playThud();
    lives--;
    if (lives <= 0) { state = 'gameover'; playFail(); return; }
    // restart round navigation from same starting position
    playerCell = [...ROUNDS[round].playerCell];
    movesLeft = ROUNDS[round].maxMoves;
    return;
  }
  movesLeft--;
  if (cell === 'r') movesLeft--; // river costs extra move
  playerCell = [nc, nr];
  playStep();
  if (nc === ranchCell[0] && nr === ranchCell[1]) {
    const bonus = movesLeft * 15;
    score += bonus;
    popup = { x: W/2, y: MAP_Y + 80, text: '+' + bonus + ' BONUS', color: '#FF9F43', t: 1.5 };
    roundResult = 'win';
    state = 'roundover';
    playFanfare();
    setTimeout(() => {
      round++;
      if (round >= ROUNDS.length) {
        if (score > best) { best = score; localStorage.setItem('dead_reckoning_best', best); }
        state = 'gamewin';
      } else {
        startRound();
      }
    }, 2200);
  } else if (movesLeft <= 0) {
    lives--;
    popup = { x: W/2, y: MAP_Y + 80, text: 'OUT OF MOVES', color: '#E74C3C', t: 1.5 };
    if (lives <= 0) { state = 'gameover'; playFail(); return; }
    playerCell = [...ROUNDS[round].playerCell];
    movesLeft = ROUNDS[round].maxMoves;
    flashCells.push({ c: playerCell[0], r: playerCell[1], color: '#E74C3C', t: 0.6 });
  }
}

// Nav button layout at bottom
const NAV_BTNS = [
  { dir: 'N', x: W/2 - 20, y: NAV_Y + 1,  w: 40, h: 18, label: '▲' },
  { dir: 'S', x: W/2 - 20, y: NAV_Y + 23, w: 40, h: 18, label: '▼' },
  { dir: 'W', x: W/2 - 63, y: NAV_Y + 12, w: 40, h: 18, label: '◄' },
  { dir: 'E', x: W/2 + 23, y: NAV_Y + 12, w: 40, h: 18, label: '►' },
];

function hitNavBtn(px, py) {
  for (const btn of NAV_BTNS) {
    if (px >= btn.x && px <= btn.x + btn.w && py >= btn.y && py <= btn.y + btn.h) return btn.dir;
  }
  return null;
}

// Update
function update(dt) {
  starPhase += dt * 0.4;
  cloudT += dt;
  // advance clouds
  for (const cl of clouds) {
    cl.x += cl.speed;
    if (cl.x > W + 20) cl.x = -cl.w - 20;
  }
  // expire flash cells
  flashCells = flashCells.filter(f => { f.t -= dt; return f.t > 0; });
  if (popup) { popup.t -= dt; if (popup.t <= 0) popup = null; }
}

// Draw helpers
function roundRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1.5; ctx.stroke(); }
}

function drawSky() {
  ctx.save();
  // Sky gradient
  const grad = ctx.createLinearGradient(0, SKY_Y, 0, SKY_Y + SKY_H);
  grad.addColorStop(0, '#050208');
  grad.addColorStop(1, '#1a0d35');
  ctx.fillStyle = grad;
  ctx.fillRect(0, SKY_Y, W, SKY_H);

  // Background stars
  for (const s of bgStars) {
    const tw = 0.5 + 0.5 * Math.sin(starPhase * 1.7 + s.tw);
    ctx.globalAlpha = 0.3 + 0.7 * tw;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  const rd = ROUNDS[round] || ROUNDS[0];

  // Constellation lines between nav stars (subtle)
  if (rd.navStars.length >= 2) {
    const s0 = NAMED_STARS[rd.navStars[0]], s1 = NAMED_STARS[rd.navStars[1]];
    ctx.strokeStyle = 'rgba(200,180,255,0.12)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath(); ctx.moveTo(s0.x, s0.y); ctx.lineTo(s1.x, s1.y); ctx.stroke();
    ctx.setLineDash([]);
  }

  // Draw all named stars
  for (let i = 0; i < NAMED_STARS.length; i++) {
    const s = NAMED_STARS[i];
    const isNav = rd.navStars.includes(i);
    const isTapped = tappedNavStars.includes(i);
    const covered = isNav && isStarCovered(i);

    ctx.save();
    if (covered) ctx.globalAlpha = 0.3;

    // Glow for nav stars
    if (isNav && !covered) {
      const glow = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, 16);
      glow.addColorStop(0, s.color + '88');
      glow.addColorStop(1, 'transparent');
      ctx.fillStyle = glow;
      ctx.beginPath(); ctx.arc(s.x, s.y, 16, 0, Math.PI*2); ctx.fill();
    }

    // Star dot
    const tw = 0.5 + 0.5 * Math.sin(starPhase * 2.1 + i);
    ctx.fillStyle = isNav ? s.color : '#888888';
    const r = isNav ? (isTapped ? 5.5 : 4.5 + tw) : 1.8;
    ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI*2); ctx.fill();

    // Tap ring for nav stars
    if (isNav && !covered) {
      ctx.strokeStyle = isTapped ? s.color : s.color + '99';
      ctx.lineWidth = isTapped ? 2 : 1;
      ctx.beginPath(); ctx.arc(s.x, s.y, 11, 0, Math.PI*2); ctx.stroke();
    }

    // Star name label
    if (isNav) {
      ctx.font = 'bold 9px Georgia, serif';
      ctx.textAlign = 'center';
      ctx.fillStyle = covered ? '#666' : (isTapped ? s.color : '#aaa');
      ctx.fillText(s.name, s.x, s.y - 15);
      // Bearing label
      const bIdx = rd.navStars.indexOf(i);
      if (bIdx >= 0) {
        const label = bearingLabel(rd.bearings[bIdx]);
        ctx.fillStyle = covered ? '#555' : '#FFE066';
        ctx.font = 'bold 10px Georgia, serif';
        ctx.fillText(label, s.x, s.y + 22);
      }
    }
    ctx.restore();
  }

  // Clouds
  for (const cl of clouds) {
    ctx.save();
    ctx.globalAlpha = 0.82;
    const cg = ctx.createRadialGradient(
      cl.x + cl.w/2, cl.y + cl.h/2, 0,
      cl.x + cl.w/2, cl.y + cl.h/2, cl.w/2
    );
    cg.addColorStop(0, '#9090a8');
    cg.addColorStop(0.7, '#6060788a');
    cg.addColorStop(1, 'transparent');
    ctx.fillStyle = cg;
    ctx.beginPath();
    ctx.ellipse(cl.x + cl.w/2, cl.y + cl.h/2, cl.w/2, cl.h/2, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Instruction in star phase
  if (state === 'starphase') {
    const n = tappedNavStars.length;
    const msg = n === 0 ? 'TAP A NAVIGATION STAR' : (n === 1 ? 'TAP THE SECOND STAR' : 'PLOTTING BEARING...');
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    roundRect(W/2 - 110, SKY_Y + SKY_H - 28, 220, 22, 4, 'rgba(0,0,0,0.5)');
    ctx.fillStyle = '#FFE066';
    ctx.font = 'bold 11px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText(msg, W/2, SKY_Y + SKY_H - 12);
  }

  ctx.restore();
}

function drawInfoBar() {
  ctx.save();
  ctx.fillStyle = '#120820';
  ctx.fillRect(0, INFO_Y, W, INFO_H);
  ctx.strokeStyle = '#3a2060';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, INFO_Y); ctx.lineTo(W, INFO_Y); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, INFO_Y + INFO_H); ctx.lineTo(W, INFO_Y + INFO_H); ctx.stroke();

  const msgs = {
    starphase:  'TAKE YOUR BEARINGS FROM THE STARS',
    locating:   'WHERE ARE YOU? TAP YOUR POSITION ON THE MAP',
    navigating: 'GUIDE THE CATTLE TO THE RANCH',
    roundover:  roundResult === 'win' ? 'MADE IT! GOOD TRAIL WORK.' : '',
    gameover:   'TRAIL LOST',
    gamewin:    'ALL ROUNDS CLEAR!',
    title:      ''
  };
  ctx.fillStyle = '#C8A04A';
  ctx.font = '10px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText(msgs[state] || '', W/2, INFO_Y + 17);
  ctx.restore();
}

function drawTerrain() {
  ctx.save();

  const terrainColors = {
    g: '#2a4a1a', // grass - dark green
    r: '#1a3060', // river - blue
    v: '#2a1008', // ravine - very dark
    h: '#3a2a10', // hills - tan
    R: '#1a0a00', // ranch cell bg
  };
  const terrainStroke = {
    g: '#3a6025', r: '#2a50a0', v: '#4a1810', h: '#5a4020', R: '#C8A04A',
  };

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const t = terrain[r][c];
      const x = c * CW, y = MAP_Y + r * CH;
      ctx.fillStyle = terrainColors[t] || '#222';
      ctx.fillRect(x, y, CW, CH);
      ctx.strokeStyle = terrainStroke[t] || '#333';
      ctx.lineWidth = 0.8;
      ctx.strokeRect(x + 0.5, y + 0.5, CW - 1, CH - 1);

      // Terrain icons
      ctx.save();
      ctx.textAlign = 'center';
      if (t === 'v') {
        ctx.fillStyle = '#6a2010';
        ctx.font = '18px serif';
        ctx.fillText('/', x + CW/2, y + CH/2 + 6);
      } else if (t === 'r') {
        ctx.fillStyle = '#4080d0';
        ctx.font = '9px sans-serif';
        ctx.fillText('~~~', x + CW/2, y + CH/2 + 3);
      } else if (t === 'g' || t === 'h') {
        ctx.fillStyle = '#2d5a1a';
        ctx.font = '10px sans-serif';
        // Small grass dots
        for (let gx = 8; gx < CW-8; gx += 14) {
          ctx.fillText('.', x + gx, y + CH - 6);
        }
      }
      ctx.restore();
    }
  }

  // Ranch icon
  {
    const { x: rx, y: ry } = cellCenter(ranchCell[0], ranchCell[1]);
    ctx.save();
    ctx.fillStyle = '#C8A04A';
    ctx.font = 'bold 11px Georgia, serif';
    ctx.textAlign = 'center';
    // Barn shape
    ctx.fillStyle = '#8B4513';
    ctx.fillRect(rx - 14, ry - 10, 28, 16);
    ctx.beginPath(); ctx.moveTo(rx - 16, ry - 10); ctx.lineTo(rx, ry - 20); ctx.lineTo(rx + 16, ry - 10); ctx.closePath();
    ctx.fillStyle = '#C0392B';
    ctx.fill();
    ctx.fillStyle = '#FFE066';
    ctx.font = 'bold 8px Georgia, serif';
    ctx.fillText('RANCH', rx, ry + 16);
    ctx.restore();
  }

  // Flash cells
  for (const f of flashCells) {
    ctx.save();
    ctx.globalAlpha = f.t > 0 ? Math.min(f.t, 0.6) : 0;
    ctx.fillStyle = f.color;
    ctx.fillRect(f.c * CW + 2, MAP_Y + f.r * CH + 2, CW - 4, CH - 4);
    ctx.restore();
  }

  // Drawn bearing lines
  if (state === 'locating' || state === 'starphase') {
    const rd = ROUNDS[round];
    for (let i = 0; i < drawnBearings.length; i++) {
      const db = drawnBearings[i];
      const star = NAMED_STARS[db.starIdx];
      const seg = bearingSegment(playerCell[0], playerCell[1], db.bearing);
      if (!seg) continue;
      const color = star.color;
      ctx.save();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.7;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.moveTo(seg.x1, seg.y1);
      ctx.lineTo(seg.x2, seg.y2);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
  }

  // In locating phase: highlight candidate cells and intersection
  if (state === 'locating') {
    // Intersection = playerCell
    const { x: px, y: py } = cellCenter(playerCell[0], playerCell[1]);
    const pulse = 0.6 + 0.4 * Math.sin(starPhase * 4);
    ctx.save();
    // Show 3 distractor cells as faint options + correct cell pulsing
    const distractors = getDistractors(playerCell[0], playerCell[1]);
    for (const d of distractors) {
      ctx.fillStyle = 'rgba(180,140,60,0.25)';
      ctx.beginPath();
      const dc = cellCenter(d.c, d.r);
      ctx.arc(dc.x, dc.y, 14, 0, Math.PI*2);
      ctx.fill();
    }
    // Correct cell pulsing
    ctx.globalAlpha = pulse;
    const glow = ctx.createRadialGradient(px, py, 0, px, py, 20);
    glow.addColorStop(0, '#FFE066cc');
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(px, py, 20, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // Player cattle icon (visible in navigating phase)
  if (state === 'navigating' || state === 'roundover') {
    const { x: px, y: py } = cellCenter(playerCell[0], playerCell[1]);
    ctx.save();
    // Cattle silhouette (simple)
    ctx.fillStyle = '#1a0520';
    ctx.beginPath();
    ctx.ellipse(px, py + 2, 13, 8, 0, 0, Math.PI*2);
    ctx.fill();
    // Head
    ctx.beginPath();
    ctx.ellipse(px + 10, py - 2, 6, 5, 0.3, 0, Math.PI*2);
    ctx.fill();
    // Horns
    ctx.strokeStyle = '#1a0520';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(px + 13, py - 4);
    ctx.lineTo(px + 17, py - 10);
    ctx.moveTo(px + 15, py - 2);
    ctx.lineTo(px + 19, py - 7);
    ctx.stroke();
    ctx.fillStyle = '#FFE066';
    ctx.font = 'bold 7px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('YOU', px, py + 20);
    ctx.restore();
  }

  // Popup text
  if (popup && popup.t > 0) {
    ctx.save();
    ctx.globalAlpha = Math.min(popup.t, 0.9);
    ctx.fillStyle = popup.color;
    ctx.font = 'bold 13px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText(popup.text, popup.x, popup.y - (1.0 - popup.t) * 20);
    ctx.restore();
  }

  ctx.restore();
}

function getDistractors(pc, pr) {
  const options = [];
  const offsets = [[-2,0],[-1,-2],[2,-1],[1,1],[-1,2],[0,-3],[3,0]];
  for (const [dc, dr] of offsets) {
    const nc = pc + dc, nr = pr + dr;
    if (nc >= 0 && nc < COLS && nr >= 0 && nr < ROWS && !(nc === pc && nr === pr)) {
      if (terrain[nr][nc] !== 'v') options.push({ c: nc, r: nr });
    }
    if (options.length >= 3) break;
  }
  return options;
}

function drawNavButtons() {
  ctx.save();
  ctx.fillStyle = '#0d0518';
  ctx.fillRect(0, NAV_Y, W, NAV_H);

  // Moves remaining display
  ctx.fillStyle = '#C8A04A';
  ctx.font = 'bold 10px Georgia, serif';
  ctx.textAlign = 'left';
  ctx.fillText('MOVES: ' + movesLeft, 8, NAV_Y + 26);

  for (const btn of NAV_BTNS) {
    roundRect(btn.x, btn.y, btn.w, btn.h, 4, '#2a1040', '#6040a0');
    ctx.fillStyle = '#FFE066';
    ctx.font = 'bold 13px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(btn.label, btn.x + btn.w/2, btn.y + btn.h/2 + 5);
  }
  ctx.restore();
}

function drawHUD() {
  ctx.save();
  // Top HUD bar
  ctx.fillStyle = '#0d0518';
  ctx.fillRect(0, 0, W, SKY_Y);
  ctx.strokeStyle = '#3a1060';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, SKY_Y); ctx.lineTo(W, SKY_Y); ctx.stroke();

  // Score
  ctx.fillStyle = '#FFE066';
  ctx.font = 'bold 14px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText(score, W/2, 27);

  // Lives - star icons
  ctx.textAlign = 'left';
  ctx.font = '14px sans-serif';
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i < lives ? '#FFE066' : '#333';
    ctx.fillText('★', 8 + i * 18, 27);
  }

  // Round indicator
  ctx.textAlign = 'right';
  ctx.fillStyle = '#C8A04A';
  ctx.font = '10px Georgia, serif';
  ctx.fillText('ROUND ' + (round + 1) + '/5', W - 8, 27);

  ctx.restore();
}

function drawTitle() {
  ctx.save();
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#050208');
  grad.addColorStop(1, '#1a0d35');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars in background
  for (const s of bgStars) {
    const tw = 0.5 + 0.5 * Math.sin(starPhase * 1.7 + s.tw);
    ctx.globalAlpha = 0.3 + 0.6 * tw;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Title
  ctx.fillStyle = '#FFE066';
  ctx.font = 'bold 38px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('DEAD', W/2, 160);
  ctx.fillText('RECKONING', W/2, 200);

  ctx.fillStyle = '#C8A04A';
  ctx.font = '13px Georgia, serif';
  ctx.fillText('Navigate by starlight', W/2, 235);
  ctx.fillText('guide your cattle home', W/2, 254);

  // Best score
  if (best > 0) {
    ctx.fillStyle = '#888';
    ctx.font = '11px Georgia, serif';
    ctx.fillText('BEST: ' + best, W/2, 290);
  }

  // Tap to play
  const pulse = 0.6 + 0.4 * Math.sin(starPhase * 2.5);
  ctx.globalAlpha = pulse;
  roundRect(W/2 - 80, 340, 160, 40, 8, '#2a1040', '#C8A04A');
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#FFE066';
  ctx.font = 'bold 15px Georgia, serif';
  ctx.fillText('TAP TO RIDE', W/2, 366);

  // How to play
  ctx.fillStyle = '#666';
  ctx.font = '10px Georgia, serif';
  ctx.fillText('Tap stars to get your bearing', W/2, 430);
  ctx.fillText('Locate your position - navigate to the ranch', W/2, 448);
  ctx.fillText('5 rounds   ★★★ lives', W/2, 466);

  ctx.restore();
}

function drawEndScreen() {
  ctx.save();
  ctx.fillStyle = 'rgba(5,2,8,0.88)';
  ctx.fillRect(0, 0, W, H);

  const won = state === 'gamewin';
  ctx.fillStyle = won ? '#FFE066' : '#E74C3C';
  ctx.font = 'bold 32px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText(won ? 'TRAILBLAZER!' : 'TRAIL LOST', W/2, 220);

  ctx.fillStyle = '#C8A04A';
  ctx.font = '18px Georgia, serif';
  ctx.fillText('SCORE: ' + score, W/2, 270);

  if (score >= best && best > 0 && won) {
    ctx.fillStyle = '#FF9F43';
    ctx.font = 'bold 14px Georgia, serif';
    ctx.fillText('NEW RECORD!', W/2, 300);
  }
  if (best > 0) {
    ctx.fillStyle = '#666';
    ctx.font = '11px Georgia, serif';
    ctx.fillText('BEST: ' + best, W/2, 322);
  }

  const pulse = 0.6 + 0.4 * Math.sin(starPhase * 2.5);
  ctx.globalAlpha = pulse;
  roundRect(W/2 - 80, 360, 160, 40, 8, '#2a1040', '#C8A04A');
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#FFE066';
  ctx.font = 'bold 14px Georgia, serif';
  ctx.fillText('PLAY AGAIN', W/2, 386);

  // Share button
  roundRect(W/2 - 60, 412, 120, 32, 6, '#1a0d35', '#6040a0');
  ctx.fillStyle = '#aaa';
  ctx.font = '11px Georgia, serif';
  ctx.fillText('SHARE', W/2, 433);

  ctx.restore();
}

// Main draw
function draw() {
  ctx.clearRect(0, 0, W, H);
  if (state === 'title') { drawTitle(); return; }
  if (state === 'gameover' || state === 'gamewin') { drawEndScreen(); return; }

  drawSky();
  drawInfoBar();
  drawTerrain();
  if (state === 'navigating' || state === 'roundover') drawNavButtons();
  drawHUD();
}

// Input
canvas.addEventListener('pointerdown', e => {
  if (AC.state === 'suspended') AC.resume();
  const rect = canvas.getBoundingClientRect();
  const sx = (e.clientX - rect.left) * (W / rect.width);
  const sy = (e.clientY - rect.top)  * (H / rect.height);

  if (state === 'title') { bgStars = makeBgStars(); startGame(); return; }
  if (state === 'gameover' || state === 'gamewin') {
    if (sy >= 356 && sy <= 404) { bgStars = makeBgStars(); startGame(); return; }
    if (sy >= 412 && sy <= 444) {
      if (navigator.share) navigator.share({ title: 'Dead Reckoning', text: 'I scored ' + score + ' in Dead Reckoning! Navigate by starlight.' }).catch(() => {});
    }
    return;
  }
  if (state === 'roundover') return;

  if (state === 'starphase') {
    if (sy >= SKY_Y && sy < SKY_Y + SKY_H) tapStar({ x: sx, y: sy });
    return;
  }
  if (state === 'locating') {
    if (sy >= MAP_Y && sy < MAP_Y + MAP_H) tapTerrain(sx, sy);
    return;
  }
  if (state === 'navigating') {
    const dir = hitNavBtn(sx, sy);
    if (dir) movePlayer(dir);
    // Also handle swipe zones on terrain
    if (sy >= MAP_Y && sy < MAP_Y + MAP_H) {
      const c = Math.floor(sx / CW), r = Math.floor((sy - MAP_Y) / CH);
      // Tapping cells doesn't do anything during navigate - only buttons
    }
    return;
  }
});

// Keyboard fallback
document.addEventListener('keydown', e => {
  if (state === 'navigating') {
    if (e.key === 'ArrowUp' || e.key === 'w') movePlayer('N');
    else if (e.key === 'ArrowDown' || e.key === 's') movePlayer('S');
    else if (e.key === 'ArrowLeft' || e.key === 'a') movePlayer('W');
    else if (e.key === 'ArrowRight' || e.key === 'd') movePlayer('E');
  }
  if (state === 'title') { bgStars = makeBgStars(); startGame(); }
});

// Feedback overlay
function buildFeedback() {
  const ep = FEEDBACK_ENDPOINT;
  const overlay = document.createElement('div');
  overlay.id = 'fb-overlay';
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:99';
  overlay.innerHTML = `<div style="background:#1a0d35;border:1px solid #C8A04A;border-radius:10px;padding:20px;width:300px;color:#FFE066;font-family:Georgia,serif">
    <div style="font-size:16px;font-weight:bold;margin-bottom:12px">How was Dead Reckoning?</div>
    <div id="fb-stars" style="font-size:24px;cursor:pointer;margin-bottom:10px">&#9733;&#9733;&#9733;&#9733;&#9733;</div>
    <textarea id="fb-msg" placeholder="Tell us what you think..." style="width:100%;height:70px;background:#0d0820;color:#fff;border:1px solid #6040a0;border-radius:6px;padding:6px;font-size:13px;resize:none"></textarea>
    <div style="display:flex;gap:8px;margin-top:10px">
      <button id="fb-send" style="flex:1;padding:8px;background:#C8A04A;color:#000;border:none;border-radius:6px;font-weight:bold;cursor:pointer">SEND</button>
      <button id="fb-close" style="padding:8px 14px;background:#333;color:#fff;border:none;border-radius:6px;cursor:pointer">SKIP</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);

  let rating = 0;
  const stars = overlay.querySelector('#fb-stars');
  stars.addEventListener('mousemove', e => {
    const rect = stars.getBoundingClientRect();
    const idx = Math.ceil((e.clientX - rect.left) / (rect.width / 5));
    stars.innerHTML = Array.from({length:5}, (_,i) => `<span style="color:${i<idx?'#FFE066':'#555'}">★</span>`).join('');
  });
  stars.addEventListener('click', e => {
    const rect = stars.getBoundingClientRect();
    rating = Math.ceil((e.clientX - rect.left) / (rect.width / 5));
  });
  overlay.querySelector('#fb-send').addEventListener('click', () => {
    const msg = overlay.querySelector('#fb-msg').value.trim();
    fetch(ep, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ game:'Dead Reckoning', rating, message: msg, score }) });
    overlay.remove();
  });
  overlay.querySelector('#fb-close').addEventListener('click', () => overlay.remove());
}

document.addEventListener('DOMContentLoaded', () => {
  const fbBtn = document.createElement('button');
  fbBtn.textContent = 'Feedback';
  fbBtn.style.cssText = 'position:fixed;bottom:8px;right:8px;background:#2a1040;color:#C8A04A;border:1px solid #6040a0;border-radius:6px;padding:5px 10px;font-size:11px;cursor:pointer;z-index:10';
  fbBtn.addEventListener('click', buildFeedback);
  document.body.appendChild(fbBtn);
});

// Test surface
window.__test = {
  getState: () => state,
  getScore: () => score,
  getLives: () => lives,
  getRound: () => round,
  getMovesLeft: () => movesLeft,
  getPlayerCell: () => playerCell ? [...playerCell] : null,
  getRanchCell: () => ranchCell ? [...ranchCell] : null,
  getDrawnBearings: () => drawnBearings,
  getTappedNavStars: () => tappedNavStars,
  getLocateTries: () => locateTries,
  getTerrain: () => terrain,
  getBest: () => best,
  startGame,
  startRound,
  tapStar,
  tapTerrain,
  movePlayer,
  isStarCovered,
  setRound: v => { round = v; },
  setState: v => { state = v; },
  setScore: v => { score = v; },
  setLives: v => { lives = v; },
  setMovesLeft: v => { movesLeft = v; },
  setPlayerCell: (c, r) => { playerCell = [c, r]; },
  setDrawnBearings: v => { drawnBearings = v; },
  setTappedNavStars: v => { tappedNavStars = v; },
  bearingSegment,
  cellCenter,
  isStarCoveredFn: isStarCovered,
  hitNavBtn,
  movePlayerFn: movePlayer,
  ROUNDS,
  NAMED_STARS,
  COLS,
  ROWS,
  CW,
  CH,
  MAP_Y,
  NAV_BTNS,
  STAR_HIT_R,
};

// Game loop
function loop(ts) {
  try {
    if (!last) last = ts;
    const dt = Math.min((ts - last) / 1000, 0.05);
    last = ts;
    if (state && state !== 'title' && state !== 'gameover' && state !== 'gamewin') update(dt);
    else if (state === 'title') { starPhase += dt * 0.4; }
    draw();
  } catch(e) { console.error(e); }
  requestAnimationFrame(loop);
}

// Init
state = 'title';
score = 0; lives = 3; round = 0;
bgStars = makeBgStars(); starPhase = 0;
requestAnimationFrame(loop);
</script>
