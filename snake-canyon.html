<script>

<canvas id="c"></canvas>
<script>
'use strict';

const FEEDBACK_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwdJq8jFwM31ZUwkyhRrVVJkk5wf8rOZARAArWFOMfaymVOnNmnmM7fOc_acsiM6dRVSg/exec';
const MUSIC_SRC = '';

const W = 360, H = 640;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.width = W; canvas.height = H;
  canvas.style.width = W * s + 'px'; canvas.style.height = H * s + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── Maze constants ──────────────────────────────────────────────────────────
const ROWS = 11, COLS = 7;
// Directions: 0=N, 1=E, 2=S, 3=W
const DIR_DR = [-1, 0, 1, 0];
const DIR_DC = [0, 1, 0, -1];

// Perspective slot bounds [lx, rx, ty, by] — index 0=farthest, 3=player ref
const SLOTS = [
  [157, 203, 238, 402],  // depth 3 (farthest)
  [117, 243, 183, 457],  // depth 2
  [46,  314, 91,  549],  // depth 1
  [0,   360, 0,   640],  // depth 0 (player reference)
];

const TIMER_MAX = 90;
const SNAKE_HEAR_RANGE = 4;   // cells (Manhattan)
const SNAKE_ALERT_DUR  = 8.0; // seconds alert stays active
const LOUD_STEP_WINDOW = 0.55; // seconds — step within this window = loud
const SNAKE_IDLE_INTERVAL   = 3.0;  // s between wander moves
const SNAKE_ALERT_INTERVAL  = 0.75; // s between chase moves

// ── Audio ───────────────────────────────────────────────────────────────────
let audioCtx = null;
let snakeSource = null, snakePanner = null, snakeGainNode = null, snakeLFOGain = null;

function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function startSnakeAudio() {
  if (snakeSource) return;
  const ac = ensureAudio();
  const bufLen = ac.sampleRate * 2;
  const buf = ac.createBuffer(1, bufLen, ac.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufLen; i++) data[i] = Math.random() * 2 - 1;

  const src = ac.createBufferSource();
  src.buffer = buf; src.loop = true;

  const bpf = ac.createBiquadFilter();
  bpf.type = 'bandpass'; bpf.frequency.value = 180; bpf.Q.value = 2.5;

  const lfo = ac.createOscillator();
  lfo.frequency.value = 20;
  const lfoG = ac.createGain(); lfoG.gain.value = 0.55;
  lfo.connect(lfoG);
  const ampNode = ac.createGain(); ampNode.gain.value = 0.45;
  lfoG.connect(ampNode.gain);

  const pan = ac.createStereoPanner();
  const master = ac.createGain(); master.gain.value = 0;

  src.connect(bpf); bpf.connect(ampNode); ampNode.connect(pan); pan.connect(master); master.connect(ac.destination);
  src.start(); lfo.start();

  snakeSource = src; snakePanner = pan; snakeGainNode = master; snakeLFOGain = lfoG;
}

function stopSnakeAudio() {
  if (snakeSource) { try { snakeSource.stop(); } catch (_) {} snakeSource = null; }
  snakePanner = null; snakeGainNode = null; snakeLFOGain = null;
}

function updateSnakeAudio() {
  if (!snakeGainNode || !snakePanner || !audioCtx) return;
  const ac = audioCtx; const t = ac.currentTime;
  const distM = Math.abs(snakeR - playerR) + Math.abs(snakeC - playerC);
  const maxDist = SNAKE_HEAR_RANGE + 2;
  const vol = Math.max(0, 1 - distM / maxDist) * (snakeAlert > 0 ? 0.5 : 0.28);

  const dr = snakeR - playerR, dc = snakeC - playerC;
  let fwd, right;
  if      (playerDir === 0) { fwd = -dr; right =  dc; }
  else if (playerDir === 1) { fwd =  dc; right =  dr; }
  else if (playerDir === 2) { fwd =  dr; right = -dc; }
  else                      { fwd = -dc; right = -dr; }
  const pan = distM > 0 ? Math.max(-1, Math.min(1, right / Math.max(1, distM))) : 0;

  snakeGainNode.gain.setTargetAtTime(vol, t, 0.12);
  snakePanner.pan.setTargetAtTime(pan, t, 0.1);
  if (snakeLFOGain) snakeLFOGain.gain.setTargetAtTime(snakeAlert > 0 ? 0.8 : 0.55, t, 0.2);
}

function playClick(loud) {
  const ac = ensureAudio();
  const t = ac.currentTime;
  const osc = ac.createOscillator(); const g = ac.createGain();
  osc.type = 'sine'; osc.frequency.value = loud ? 55 : 80;
  const vol = loud ? 0.4 : 0.12;
  g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
  osc.connect(g); g.connect(ac.destination);
  try { osc.start(t); osc.stop(t + 0.18); } catch (_) {}
}

function playTone(freq, dur, vol) {
  const ac = ensureAudio(); const t = ac.currentTime;
  const osc = ac.createOscillator(); const g = ac.createGain();
  osc.type = 'sine'; osc.frequency.value = freq;
  g.gain.setValueAtTime(vol || 0.18, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + (dur || 0.4));
  osc.connect(g); g.connect(ac.destination);
  try { osc.start(t); osc.stop(t + (dur || 0.4)); } catch (_) {}
}

// ── Maze generation (DFS) ───────────────────────────────────────────────────
let maze = null; // grid[r][c] = { walls:[N,E,S,W] }

function generateMaze() {
  const grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) grid[r][c] = { walls: [true, true, true, true], visited: false };
  }
  function carve(r, c) {
    grid[r][c].visited = true;
    const dirs = [0, 1, 2, 3].sort(() => Math.random() - 0.5);
    for (const dir of dirs) {
      const nr = r + DIR_DR[dir], nc = c + DIR_DC[dir];
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !grid[nr][nc].visited) {
        grid[r][c].walls[dir] = false;
        grid[nr][nc].walls[(dir + 2) % 4] = false;
        carve(nr, nc);
      }
    }
  }
  const startC = Math.floor(COLS / 2);
  carve(ROWS - 1, startC);
  // Open exit at top
  grid[0][startC].walls[0] = false;
  return grid;
}

function bfsPath(fromR, fromC, toR, toC) {
  const visited = new Uint8Array(ROWS * COLS);
  const q = [[fromR, fromC, []]];
  while (q.length) {
    const [r, c, path] = q.shift();
    const k = r * COLS + c;
    if (visited[k]) continue; visited[k] = 1;
    if (r === toR && c === toC) return path;
    for (let d = 0; d < 4; d++) {
      if (!maze[r][c].walls[d]) {
        const nr = r + DIR_DR[d], nc = c + DIR_DC[d];
        if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS)
          q.push([nr, nc, [...path, d]]);
      }
    }
  }
  return [];
}

// ── Game state ───────────────────────────────────────────────────────────────
let state = 'title';
let playerR, playerC, playerDir;
let exitR, exitC;
let snakeR, snakeC;
let snakeAlert = 0;
let snakeIdleTimer = 0;
let snakeAlertTimer = 0;
let lastStepTime = -9;
let timeLeft = TIMER_MAX;
let score = 0;
let bestScore = parseInt(localStorage.getItem('snake_canyon_best') || '0', 10);
let alertFlash = 0;
let stepsTaken = 0;
let strikePulse = 0;
let winPulse = 0;
let shakeX = 0, shakeY = 0;

function startGame() {
  gtag('event', 'game_start', {game_name: 'Snake Canyon'});
  maze = generateMaze();
  const mid = Math.floor(COLS / 2);
  playerR = ROWS - 1; playerC = mid; playerDir = 0;
  exitR = 0; exitC = mid;
  // Place snake in a random cell at least 4 cells away from player
  let sr, sc;
  do {
    sr = 1 + Math.floor(Math.random() * (ROWS - 3));
    sc = Math.floor(Math.random() * COLS);
  } while (Math.abs(sr - playerR) + Math.abs(sc - playerC) < 4);
  snakeR = sr; snakeC = sc;
  snakeAlert = 0; snakeIdleTimer = SNAKE_IDLE_INTERVAL; snakeAlertTimer = 0;
  lastStepTime = -9; timeLeft = TIMER_MAX; score = 0;
  alertFlash = 0; stepsTaken = 0; strikePulse = 0; winPulse = 0;
  shakeX = 0; shakeY = 0;
  startSnakeAudio();
  state = 'playing';
}

// ── Corridor visibility ──────────────────────────────────────────────────────
function getCorridorView() {
  // Returns array of 3 sections, index 0=farthest drawn, 2=nearest
  // Each: { leftOpen, rightOpen, backWall }
  // leftOpen/rightOpen = passage to player's left/right exists
  // backWall = forward wall blocks passage at far end of this section
  const leftDir  = (playerDir + 3) % 4;
  const rightDir = (playerDir + 1) % 4;
  const fwdDir   = playerDir;

  const cells = [{ r: playerR, c: playerC }];
  for (let d = 0; d < 3; d++) {
    const last = cells[cells.length - 1];
    if (!maze[last.r][last.c].walls[fwdDir]) {
      const nr = last.r + DIR_DR[fwdDir], nc = last.c + DIR_DC[fwdDir];
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) cells.push({ r: nr, c: nc });
      else break;
    } else break;
  }

  const sections = [];
  // Section i covers the tunnel between cells[i] and cells[i+1]
  // We render sections 0,1,2 from near to far but return them [far, mid, near]
  // Build near sections first: near=cells[0], mid=cells[1], far=cells[2]
  for (let i = 0; i < 3; i++) {
    const cell = cells[i] || null;
    if (!cell) {
      sections.push({ leftOpen: false, rightOpen: false, backWall: true, hasExit: false, hasSnake: false });
      continue;
    }
    const fwdOpen    = !maze[cell.r][cell.c].walls[fwdDir] && cells[i + 1] !== undefined;
    const leftOpen   = !maze[cell.r][cell.c].walls[leftDir];
    const rightOpen  = !maze[cell.r][cell.c].walls[rightDir];
    const hasExit    = cell.r === exitR && cell.c === exitC;
    const hasSnake   = i > 0 && cell.r === snakeR && cell.c === snakeC;
    sections.push({ leftOpen, rightOpen, backWall: !fwdOpen, hasExit, hasSnake });
  }
  // Reverse so index 0 = farthest (depth 3 in SLOTS), 2 = nearest (depth 1 in SLOTS)
  return sections.reverse();
}

// ── Rendering ────────────────────────────────────────────────────────────────
function fillTrap(ax, ay, bx, by, cx, cy, dx, dy) {
  ctx.beginPath();
  ctx.moveTo(ax, ay); ctx.lineTo(bx, by); ctx.lineTo(cx, cy); ctx.lineTo(dx, dy);
  ctx.closePath(); ctx.fill();
}

function drawScene() {
  const ox = shakeX, oy = shakeY;
  ctx.save(); ctx.translate(ox, oy);

  // Sky (canyon top)
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.48);
  sky.addColorStop(0, '#02010a');
  sky.addColorStop(1, '#0e0518');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H * 0.48);

  // Floor
  const floor = ctx.createLinearGradient(0, H * 0.52, 0, H);
  floor.addColorStop(0, '#150b03');
  floor.addColorStop(1, '#080401');
  ctx.fillStyle = floor; ctx.fillRect(0, H * 0.52, W, H * 0.48);

  // Horizon strip
  ctx.fillStyle = '#1e0c05';
  ctx.fillRect(0, H * 0.47, W, H * 0.06);

  const view = getCorridorView();
  // Wall shades: index 0=far, 2=near
  const wallShades = ['#1c0a04', '#2e1308', '#4f2010'];
  const ceilShades = ['#06020e', '#0a0415', '#12061e'];
  const floorShades = ['#130901', '#1e0e02', '#2b1504'];

  for (let di = 0; di < 3; di++) {
    const sec = view[di]; // far=0, near=2
    // SLOT[di] = inner rect (far end), SLOT[di+1] = outer rect (near end)
    const [ilx, irx, ity, iby] = SLOTS[di];
    const [olx, orx, oty, oby] = SLOTS[di + 1];

    // Floor slab
    ctx.fillStyle = floorShades[di];
    fillTrap(ilx, iby, irx, iby, orx, oby, olx, oby);

    // Ceiling slab
    ctx.fillStyle = ceilShades[di];
    fillTrap(olx, oty, orx, oty, irx, ity, ilx, ity);

    // Left wall
    if (!sec.leftOpen) {
      ctx.fillStyle = wallShades[di];
      fillTrap(olx, oty, ilx, ity, ilx, iby, olx, oby);
    } else {
      // Dark opening interior suggestion
      ctx.fillStyle = '#0a0402';
      fillTrap(olx, oty, ilx, ity, ilx, iby, olx, oby);
    }

    // Right wall
    if (!sec.rightOpen) {
      ctx.fillStyle = wallShades[di];
      fillTrap(irx, ity, orx, oty, orx, oby, irx, iby);
    } else {
      ctx.fillStyle = '#0a0402';
      fillTrap(irx, ity, orx, oty, orx, oby, irx, iby);
    }

    // Back face (wall blocking forward)
    if (sec.backWall) {
      ctx.fillStyle = wallShades[di];
      ctx.fillRect(ilx, ity, irx - ilx, iby - ity);
      // Rock texture lines
      ctx.strokeStyle = 'rgba(0,0,0,0.35)';
      ctx.lineWidth = 1;
      for (let yl = ity + 8; yl < iby - 4; yl += 14) {
        ctx.beginPath();
        ctx.moveTo(ilx + 2, yl); ctx.lineTo(irx - 2, yl + 3);
        ctx.stroke();
      }
      break; // nothing beyond this wall
    }

    // Exit glow at this depth
    if (sec.hasExit) {
      const ex = (ilx + irx) / 2, ey = (ity + iby) / 2;
      const exGrad = ctx.createRadialGradient(ex, ey, 2, ex, ey, 30);
      exGrad.addColorStop(0, 'rgba(255,224,80,0.55)');
      exGrad.addColorStop(1, 'rgba(255,180,0,0)');
      ctx.fillStyle = exGrad;
      ctx.fillRect(ilx, ity, irx - ilx, iby - ity);
      // Archway symbol
      ctx.fillStyle = '#FFE066';
      ctx.font = `bold ${di === 0 ? 10 : di === 1 ? 16 : 24}px Georgia, serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('EXIT', ex, ey);
    }

    // Snake silhouette at this depth (if visible ahead)
    if (sec.hasSnake) {
      const sw = irx - ilx, sh = iby - ity;
      const sx = ilx + sw * 0.5, sy = ity + sh * 0.65;
      const sr2 = sw * 0.13;
      // Body
      ctx.fillStyle = snakeAlert > 0 ? '#8B1A00' : '#3d1800';
      ctx.beginPath(); ctx.ellipse(sx, sy, sr2, sr2 * 0.6, 0, 0, Math.PI * 2); ctx.fill();
      // Head
      ctx.beginPath(); ctx.ellipse(sx + sr2 * 0.9, sy - sr2 * 0.3, sr2 * 0.6, sr2 * 0.45, 0.4, 0, Math.PI * 2); ctx.fill();
      // Red eyes
      ctx.fillStyle = '#ff2200';
      ctx.beginPath(); ctx.arc(sx + sr2 * 1.2, sy - sr2 * 0.5, sr2 * 0.15, 0, Math.PI * 2); ctx.fill();
    }
  }

  // Torch glow overlay
  const torch = ctx.createRadialGradient(W / 2, H * 0.88, 10, W / 2, H * 0.88, H * 0.75);
  torch.addColorStop(0, 'rgba(255,130,30,0.18)');
  torch.addColorStop(0.35, 'rgba(200,80,10,0.06)');
  torch.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = torch; ctx.fillRect(0, 0, W, H);

  // Stars in sky
  ctx.fillStyle = 'rgba(255,255,200,0.55)';
  const stars = [[44,18],[98,8],[160,24],[220,12],[290,22],[330,10],[70,36],[185,6],[255,32],[315,18]];
  for (const [sx, sy] of stars) { ctx.beginPath(); ctx.arc(sx, sy, 0.9, 0, Math.PI * 2); ctx.fill(); }

  ctx.restore();
}

function drawHUD() {
  // Timer pill
  const tx = W / 2, ty = 22;
  const tr = 14;
  const warn = timeLeft < 20;
  ctx.fillStyle = warn ? 'rgba(180,30,0,0.82)' : 'rgba(0,0,0,0.65)';
  roundRect(tx - 44, ty - tr, 88, tr * 2, 10);
  ctx.fill();
  ctx.fillStyle = warn ? '#FF6644' : '#FFE066';
  ctx.font = 'bold 18px Georgia, serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(Math.ceil(timeLeft) + 's', tx, ty);

  // Alert indicator (snake is near/alerted)
  if (alertFlash > 0) {
    ctx.fillStyle = `rgba(200,20,0,${Math.min(0.7, alertFlash)})`;
    ctx.fillRect(0, 0, W, H);
  }
  if (snakeAlert > 0) {
    const pulse = 0.5 + 0.5 * Math.sin(Date.now() / 180);
    ctx.fillStyle = `rgba(180,0,0,${0.12 * pulse})`;
    ctx.fillRect(0, 0, W, H);
    // Alert badge
    ctx.fillStyle = 'rgba(180,0,0,0.8)';
    roundRect(W - 80, 8, 72, 28, 8);
    ctx.fill();
    ctx.fillStyle = '#FF6644';
    ctx.font = 'bold 11px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('ALERTED!', W - 44, 22);
  }

  // Compass (facing direction)
  const dirs = ['N','E','S','W'];
  const compassX = 30, compassY = 22;
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  roundRect(compassX - 22, compassY - 14, 44, 28, 8);
  ctx.fill();
  ctx.fillStyle = '#C8A04A';
  ctx.font = 'bold 14px Georgia, serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(dirs[playerDir], compassX, compassY);

  // Control zone hints (subtle, bottom area)
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  // Left zone
  ctx.beginPath(); ctx.roundRect(6, H - 110, 100, 100, 12); ctx.fill();
  // Center zone
  ctx.beginPath(); ctx.roundRect(114, H - 110, 132, 100, 12); ctx.fill();
  // Right zone
  ctx.beginPath(); ctx.roundRect(254, H - 110, 100, 100, 12); ctx.fill();

  ctx.fillStyle = 'rgba(200,160,80,0.55)';
  ctx.font = 'bold 28px sans-serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('◄', 56, H - 60);
  ctx.fillText('▲', 180, H - 60);
  ctx.fillText('►', 304, H - 60);
}

function drawTitle() {
  ctx.save();
  // Canyon background sky
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.5);
  sky.addColorStop(0, '#02010a'); sky.addColorStop(1, '#120820');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H);

  // Ground silhouette
  ctx.fillStyle = '#1a0c03';
  ctx.fillRect(0, H * 0.68, W, H * 0.32);

  // Canyon walls silhouette
  ctx.fillStyle = '#110804';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.48); ctx.lineTo(W * 0.28, H * 0.3); ctx.lineTo(W * 0.28, H);
  ctx.lineTo(0, H); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(W, H * 0.48); ctx.lineTo(W * 0.72, H * 0.3); ctx.lineTo(W * 0.72, H);
  ctx.lineTo(W, H); ctx.closePath(); ctx.fill();

  // Stars
  ctx.fillStyle = 'rgba(255,240,180,0.7)';
  const stars = [[50,20],[90,12],[130,28],[190,8],[240,18],[300,14],[340,25],[160,6]];
  for (const [sx, sy] of stars) { ctx.beginPath(); ctx.arc(sx, sy, 1, 0, Math.PI * 2); ctx.fill(); }

  // Title
  ctx.fillStyle = '#FFE066';
  ctx.font = 'bold 48px Georgia, serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(200,100,0,0.8)'; ctx.shadowBlur = 18;
  ctx.fillText('Snake Canyon', W / 2, H * 0.22);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#C8A04A';
  ctx.font = '18px Georgia, serif';
  ctx.fillText('Navigate the canyon.', W / 2, H * 0.35);
  ctx.fillText('Move silently. Trust your ears.', W / 2, H * 0.41);

  // Instruction icons
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.beginPath(); ctx.roundRect(W * 0.1, H * 0.52, W * 0.24, 64, 10); ctx.fill();
  ctx.beginPath(); ctx.roundRect(W * 0.38, H * 0.52, W * 0.24, 64, 10); ctx.fill();
  ctx.beginPath(); ctx.roundRect(W * 0.66, H * 0.52, W * 0.24, 64, 10); ctx.fill();

  ctx.fillStyle = '#C8A04A'; ctx.font = 'bold 24px sans-serif';
  ctx.fillText('◄', W * 0.22, H * 0.555);
  ctx.fillText('▲', W * 0.50, H * 0.555);
  ctx.fillText('►', W * 0.78, H * 0.555);
  ctx.font = '11px sans-serif';
  ctx.fillStyle = 'rgba(200,160,80,0.7)';
  ctx.fillText('TURN', W * 0.22, H * 0.595); ctx.fillText('LEFT', W * 0.22, H * 0.613);
  ctx.fillText('STEP', W * 0.50, H * 0.595); ctx.fillText('FORWARD', W * 0.50, H * 0.613);
  ctx.fillText('TURN', W * 0.78, H * 0.595); ctx.fillText('RIGHT', W * 0.78, H * 0.613);

  if (bestScore > 0) {
    ctx.fillStyle = 'rgba(255,200,60,0.7)';
    ctx.font = '14px Georgia, serif';
    ctx.fillText('Best Escape: ' + bestScore + 's left', W / 2, H * 0.66);
  }

  ctx.fillStyle = '#FFE066';
  ctx.font = 'bold 17px Georgia, serif';
  const pulse = 0.7 + 0.3 * Math.sin(Date.now() / 500);
  ctx.globalAlpha = pulse;
  ctx.fillText('Tap to Enter the Canyon', W / 2, H * 0.76);
  ctx.globalAlpha = 1;

  // Warning
  ctx.fillStyle = '#8B3A0A';
  ctx.font = '13px Georgia, serif';
  ctx.fillText('Rattle = danger. Move slow. Reach the exit.', W / 2, H * 0.84);

  ctx.restore();
}

function drawResult(won) {
  ctx.save();
  ctx.fillStyle = 'rgba(5,2,8,0.88)';
  ctx.fillRect(0, 0, W, H);

  if (won) {
    const glow = ctx.createRadialGradient(W / 2, H * 0.38, 10, W / 2, H * 0.38, 180);
    glow.addColorStop(0, 'rgba(255,220,50,0.22)');
    glow.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = glow; ctx.fillRect(0, 0, W, H);

    const pulse = 1 + 0.04 * Math.sin(winPulse * 8);
    ctx.save(); ctx.translate(W / 2, H * 0.32); ctx.scale(pulse, pulse); ctx.translate(-W / 2, -H * 0.32);
    ctx.fillStyle = '#FFE066';
    ctx.font = 'bold 46px Georgia, serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(255,180,0,0.9)'; ctx.shadowBlur = 22;
    ctx.fillText('ESCAPED!', W / 2, H * 0.32);
    ctx.shadowBlur = 0;
    ctx.restore();

    ctx.fillStyle = '#C8A04A';
    ctx.font = '20px Georgia, serif';
    ctx.fillText(score + 's remaining', W / 2, H * 0.46);

    const isRecord = bestScore === 0 || score > bestScore;
    if (isRecord) {
      const rp = 0.8 + 0.2 * Math.sin(winPulse * 6);
      ctx.fillStyle = `rgba(255,220,60,${rp})`;
      ctx.font = 'bold 18px Georgia, serif';
      ctx.fillText('NEW RECORD!', W / 2, H * 0.54);
    }
  } else {
    ctx.fillStyle = '#E74C3C';
    ctx.font = 'bold 44px Georgia, serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(200,0,0,0.8)'; ctx.shadowBlur = 18;
    ctx.fillText('STRUCK DOWN', W / 2, H * 0.32);
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#C8A04A'; ctx.font = '18px Georgia, serif';
    const reason = timeLeft <= 0 ? 'Time ran out.' : 'The snake got you.';
    ctx.fillText(reason, W / 2, H * 0.44);
    ctx.fillStyle = '#8B3A0A'; ctx.font = '15px Georgia, serif';
    ctx.fillText('Move slower. Listen for the rattle.', W / 2, H * 0.52);
  }

  // Share + Play Again
  ctx.fillStyle = '#FFE066'; ctx.font = 'bold 20px Georgia, serif';
  roundRect(W * 0.15, H * 0.68, W * 0.7, 52, 12);
  ctx.fillStyle = '#3a1800'; ctx.fill();
  ctx.fillStyle = '#FFE066'; ctx.fillText('Play Again', W / 2, H * 0.697 + 26);

  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y); ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h); ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r); ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ── Player movement ──────────────────────────────────────────────────────────
function tryMove(action) {
  // action: 'left' | 'right' | 'forward'
  if (state !== 'playing') return;
  ensureAudio();
  if (action === 'left') {
    playerDir = (playerDir + 3) % 4;
    playTone(440, 0.08, 0.06);
    return;
  }
  if (action === 'right') {
    playerDir = (playerDir + 1) % 4;
    playTone(440, 0.08, 0.06);
    return;
  }
  // Forward
  if (maze[playerR][playerC].walls[playerDir]) return; // wall blocks
  const nr = playerR + DIR_DR[playerDir], nc = playerC + DIR_DC[playerDir];
  if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) {
    // Stepped out of maze top = exit!
    triggerWin();
    return;
  }

  const now = performance.now() / 1000;
  const loud = (now - lastStepTime) < LOUD_STEP_WINDOW;
  lastStepTime = now;
  stepsTaken++;

  playerR = nr; playerC = nc;
  playClick(loud);

  if (loud) {
    const dist = Math.abs(snakeR - playerR) + Math.abs(snakeC - playerC);
    if (dist <= SNAKE_HEAR_RANGE) {
      if (snakeAlert <= 0) playTone(280, 0.3, 0.15); // alert sting
      snakeAlert = SNAKE_ALERT_DUR;
      alertFlash = 0.6;
    }
  }

  // Check win: reached exit cell
  if (playerR === exitR && playerC === exitC) {
    triggerWin();
  }
  // Check strike: player walked into snake
  if (playerR === snakeR && playerC === snakeC) {
    triggerLose();
  }
}

function triggerWin() {
  score = Math.max(0, Math.round(timeLeft));
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('snake_canyon_best', bestScore);
  }
  stopSnakeAudio();
  playTone(440, 0.12, 0.2); playTone(554, 0.2, 0.2); playTone(659, 0.35, 0.22);
  winPulse = 0; state = 'win';
}

function triggerLose() {
  stopSnakeAudio();
  shakeX = 10; shakeY = 8;
  playTone(110, 0.5, 0.35);
  strikePulse = 1.0;
  state = 'lose';
}

// ── Input ────────────────────────────────────────────────────────────────────
function onTap(x, y) {
  if (state === 'title') {
    startGame(); return;
  }
  if (state === 'win' || state === 'lose') {
    // Play Again button area
    if (y >= H * 0.68 && y <= H * 0.68 + 52) {
      stopSnakeAudio();
      state = 'title'; return;
    }
    stopSnakeAudio(); state = 'title'; return;
  }
  if (state === 'playing') {
    const controlY = H - 110;
    if (y >= controlY) {
      if (x < W / 3)        tryMove('left');
      else if (x > W * 2/3) tryMove('right');
      else                   tryMove('forward');
    } else {
      tryMove('forward');
    }
  }
}

canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  const s = W / r.width;
  onTap((e.clientX - r.left) * s, (e.clientY - r.top) * s);
});
canvas.addEventListener('touchend', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  const s = W / r.width;
  const t = e.changedTouches[0];
  onTap((t.clientX - r.left) * s, (t.clientY - r.top) * s);
}, { passive: false });

// ── Game loop ─────────────────────────────────────────────────────────────────
let lastTime = 0;

function loop(ts) {
  try {
    const dt = Math.min((ts - lastTime) / 1000, 0.1);
    lastTime = ts;

    ctx.clearRect(0, 0, W, H);

    if (state === 'title') {
      drawTitle();
    } else if (state === 'playing') {
      // Update timer
      timeLeft -= dt;
      if (timeLeft <= 0) { timeLeft = 0; triggerLose(); }

      // Decay alert flash
      alertFlash = Math.max(0, alertFlash - dt * 2);

      // Shake decay
      shakeX *= 0.7; shakeY *= 0.7;
      if (Math.abs(shakeX) < 0.1) { shakeX = 0; shakeY = 0; }

      // Update snake alert countdown
      if (snakeAlert > 0) {
        snakeAlert -= dt;
        snakeAlertTimer += dt;
        if (snakeAlertTimer >= SNAKE_ALERT_INTERVAL) {
          snakeAlertTimer = 0;
          moveSnake(true);
        }
      } else {
        snakeIdleTimer -= dt;
        if (snakeIdleTimer <= 0) {
          snakeIdleTimer = SNAKE_IDLE_INTERVAL + Math.random() * 1.5;
          moveSnake(false);
        }
      }

      updateSnakeAudio();
      drawScene();
      drawHUD();
    } else if (state === 'win') {
      winPulse += dt;
      drawScene();
      drawResult(true);
    } else if (state === 'lose') {
      strikePulse = Math.max(0, strikePulse - dt * 1.5);
      shakeX = strikePulse > 0.1 ? (Math.random() - 0.5) * strikePulse * 14 : 0;
      shakeY = strikePulse > 0.1 ? (Math.random() - 0.5) * strikePulse * 8 : 0;
      drawScene();
      drawResult(false);
    }
  } catch (e) { console.error(e); }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── Snake AI ──────────────────────────────────────────────────────────────────
function moveSnake(alert) {
  if (alert) {
    // Chase player via BFS
    const path = bfsPath(snakeR, snakeC, playerR, playerC);
    if (path.length > 0) {
      const dir = path[0];
      snakeR += DIR_DR[dir]; snakeC += DIR_DC[dir];
    }
  } else {
    // Wander: pick a random valid direction
    const dirs = [0, 1, 2, 3].filter(d => !maze[snakeR][snakeC].walls[d]);
    if (dirs.length) {
      const dir = dirs[Math.floor(Math.random() * dirs.length)];
      const nr = snakeR + DIR_DR[dir], nc = snakeC + DIR_DC[dir];
      if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
        snakeR = nr; snakeC = nc;
      }
    }
  }
  // Check if snake reached player
  if (state === 'playing' && snakeR === playerR && snakeC === playerC) {
    triggerLose();
  }
}

fbDiv.style.cssText = 'position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:360px;max-width:100vw;background:#1a0c03;border-top:2px solid #C8A04A;padding:14px;z-index:100;display:none;font-family:Georgia,serif;';

for (let i = 1; i <= 5; i++) {

function showFeedback() {

}

// Show feedback after first win
let fbShown = false;
const _origTriggerWin = triggerWin;
// Hook feedback on win (replace win handler)
function checkFeedbackTrigger() {
  if (!fbShown && (state === 'win' || state === 'lose')) {
    fbShown = true;
    setTimeout(showFeedback, 2500);
  }
}

// Patch game loop to check
const _loopOrig = loop;
function loopPatched(ts) {

}
