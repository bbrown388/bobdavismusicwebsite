<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tin Star Showdown</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center;
       height: 100vh; overflow: hidden; touch-action: none; }
#wrap { position: relative; }
canvas { display: block; }
</style>
</head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<script>
const W = 360, H = 640;
const FEEDBACK_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwdJq8jFwM31ZUwkyhRrVVJkk5wf8rOZARAArWFOMfaymVOnNmnmM7fOc_acsiM6dRVSg/exec';
const MUSIC_SRC = '';

const READY_MIN  = 1400;
const READY_MAX  = 3600;
const DRAW_TIMEOUT = 2800;
const RESULT_LOCK  = 600;

const P_X = 88,  P_Y = H - 58;
const A_X = 272, A_Y = H - 58;

// AI reaction range [min, max] ms by match count
function aiRange(m) {
  const base = Math.max(180, 680 - m * 75);
  return [base, base + 220];
}

// ── Canvas ─────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('wrap');

function resize() {
  const scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.width  = W; canvas.height = H;
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
  wrap.style.width    = (W * scale) + 'px';
  wrap.style.height   = (H * scale) + 'px';
}
resize();
window.addEventListener('resize', resize);

// ── Audio ──────────────────────────────────────────────────
let ac;
function initAudio() {
  if (ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();
}

function tone(freq, dur, type = 'triangle', vol = 0.22) {
  if (!ac) return;
  const osc = ac.createOscillator();
  const g   = ac.createGain();
  osc.type = type; osc.frequency.value = freq;
  g.gain.setValueAtTime(vol, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  osc.connect(g); g.connect(ac.destination);
  osc.start(); osc.stop(ac.currentTime + dur);
}

function playGunshot() {
  if (!ac) return;
  const len = Math.floor(ac.sampleRate * 0.22);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d   = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (len * 0.07));
  const src = ac.createBufferSource();
  src.buffer = buf;
  const g = ac.createGain(); g.gain.value = 0.75;
  src.connect(g); g.connect(ac.destination); src.start();
  // Low thump
  tone(80, 0.3, 'sine', 0.35);
}

function playVictory() {
  if (!ac) return;
  [261.63, 329.63, 392, 523.25].forEach((f, i) =>
    setTimeout(() => tone(f, 0.45, 'triangle', 0.25), i * 85));
}

function playDefeat() {
  if (!ac) return;
  [392, 349.23, 311.13, 261.63].forEach((f, i) =>
    setTimeout(() => tone(f, 0.4, 'sawtooth', 0.15), i * 110));
}

function playReadyTick(t) {
  if (!ac) return;
  tone(55 + t * 28, 0.25, 'sine', 0.07 + t * 0.09);
}

// ── State vars ─────────────────────────────────────────────
let state      = 'title';
let round      = 0;
let pWins      = 0;
let aWins      = 0;
let matchWins  = 0;
let matchTotal = 0;

let readyAt    = 0;
let drawAt     = 0;
let drawShownAt= 0;
let aiDelay    = 0;
let aiTimer    = null;
let drawTimer  = null;

let roundResult = '';
let pReactMs    = 0;
let aReactMs    = 0;

let flashAlpha = 0, flashX = 0, flashY = 0;
let fallAngle  = 0;
let fadeAlpha  = 0;
let resultAt   = 0;
let readyTickNext = 0;

let bestReact = parseInt(localStorage.getItem('tinstar_best_react') || '0');

// ── Dust particles ─────────────────────────────────────────
const DUST = Array.from({ length: 20 }, () => makeDust());
function makeDust() {
  return {
    x: Math.random() * W,
    y: H - 55 + Math.random() * 18,
    vx: (Math.random() - 0.5) * 14,
    vy: -Math.random() * 7,
    life: Math.random(),
    maxLife: 0.5 + Math.random() * 0.9,
    r: 1 + Math.random() * 3,
  };
}
function updateDust(dt) {
  for (const d of DUST) {
    d.x += d.vx * dt; d.y += d.vy * dt;
    d.life -= dt / d.maxLife;
    if (d.life <= 0) Object.assign(d, makeDust(), { x: Math.random() * W, life: 1 });
  }
}

// Static star positions (deterministic)
const STARS = [
  [20,30],[80,15],[150,45],[220,20],[290,55],[50,80],[130,65],[200,90],
  [310,75],[340,30],[170,110],[240,95],[70,120],[290,110],[10,100],
  [350,115],[110,140],[320,140],[180,160],[40,155],[260,170],
];

// ── Draw helpers ───────────────────────────────────────────
function rr(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawBackground() {
  ctx.save();
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.65);
  sky.addColorStop(0, '#050208'); sky.addColorStop(0.5, '#1a0d35'); sky.addColorStop(1, '#5C2D0E');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, H * 0.65);

  const gnd = ctx.createLinearGradient(0, H * 0.65, 0, H);
  gnd.addColorStop(0, '#3a1f05'); gnd.addColorStop(1, '#2a1500');
  ctx.fillStyle = gnd; ctx.fillRect(0, H * 0.65, W, H * 0.35);

  // Horizon glow
  const hor = ctx.createLinearGradient(0, H * 0.58, 0, H * 0.72);
  hor.addColorStop(0, 'rgba(200,110,30,0)');
  hor.addColorStop(0.5, 'rgba(200,110,30,0.22)');
  hor.addColorStop(1, 'rgba(200,110,30,0)');
  ctx.fillStyle = hor; ctx.fillRect(0, H*0.58, W, H*0.14);

  // Mesa silhouette
  ctx.fillStyle = '#170418';
  ctx.beginPath();
  ctx.moveTo(0, H*0.65);
  ctx.lineTo(0, H*0.43); ctx.lineTo(35, H*0.38); ctx.lineTo(65, H*0.44);
  ctx.lineTo(95, H*0.31); ctx.lineTo(135, H*0.41); ctx.lineTo(165, H*0.35);
  ctx.lineTo(200, H*0.44); ctx.lineTo(235, H*0.29); ctx.lineTo(265, H*0.37);
  ctx.lineTo(300, H*0.44); ctx.lineTo(335, H*0.34); ctx.lineTo(360, H*0.42);
  ctx.lineTo(360, H*0.65); ctx.closePath(); ctx.fill();

  // Ground line
  ctx.strokeStyle = 'rgba(200,160,74,0.12)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H*0.65); ctx.lineTo(W, H*0.65); ctx.stroke();

  ctx.restore();
}

function drawStars() {
  ctx.save();
  for (const [sx, sy] of STARS) {
    ctx.globalAlpha = 0.35 + Math.sin(Date.now() / 900 + sx * 0.1) * 0.2;
    ctx.fillStyle = '#FFE066';
    ctx.beginPath(); ctx.arc(sx, sy, 0.9, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawDust() {
  ctx.save();
  for (const d of DUST) {
    ctx.globalAlpha = d.life * 0.22;
    ctx.fillStyle = '#C8A04A';
    ctx.beginPath(); ctx.arc(d.x, d.y, d.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawCactus(x, y, h) {
  ctx.save();
  ctx.fillStyle = '#170418';
  const w = h * 0.16;
  ctx.fillRect(x - w/2, y - h, w, h);
  ctx.fillRect(x - w*2.3, y - h*0.64, w*1.9, w*0.9);
  ctx.fillRect(x - w*2.3, y - h*0.86, w*0.9, h*0.26);
  ctx.fillRect(x + w*0.5, y - h*0.53, w*1.8, w*0.9);
  ctx.fillRect(x + w*2.3, y - h*0.77, w*0.9, h*0.29);
  ctx.restore();
}

// x,y = foot pos; facing = 1(right) / -1(left); armUp; fallAng 0..PI/2
function drawDueler(x, y, facing, armUp, fallAng) {
  ctx.save();
  ctx.translate(x, y);
  if (fallAng > 0) ctx.rotate(-facing * fallAng);

  ctx.fillStyle = '#1a0520';

  // Legs
  ctx.fillRect(-7, -32, 6, 32);
  ctx.fillRect(1,  -32, 6, 32);

  // Boot spurs (tiny)
  ctx.fillRect(facing === 1 ? 7 : -10, -4, 4, 4);

  // Body
  ctx.fillRect(-9, -70, 18, 38);

  // Head
  ctx.beginPath(); ctx.arc(0, -78, 10, 0, Math.PI*2); ctx.fill();

  // Hat brim + crown
  ctx.fillRect(-13, -90, 26, 6);
  ctx.fillRect(-9, -108, 18, 20);
  // Hat band
  ctx.fillStyle = '#3a1000';
  ctx.fillRect(-9, -92, 18, 4);
  ctx.fillStyle = '#1a0520';

  // Gun arm
  if (armUp) {
    const ax = facing === 1 ? 9 : -18;
    const bx = facing === 1 ? 9+18 : -18;
    const barrelOff = facing === 1 ? 27 : -27-14;
    ctx.fillRect(ax, -70, facing*18, 6);
    // Gun grip
    ctx.fillRect(bx - (facing===1?0:6), -74, 6, 10);
    // Barrel
    ctx.fillRect(bx + (facing===1?0:-14), -72, 14, 4);
  } else {
    // Arm near holster
    const ax = facing === 1 ? 9 : -18;
    ctx.fillRect(ax, -68, facing*10, 5);
    ctx.fillRect(ax + (facing===1?4:-4), -63, 6, 20);
  }

  // Shadow ellipse
  ctx.globalAlpha = 0.28;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(0, 1, 15, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;

  ctx.restore();
}

function drawFlash() {
  if (flashAlpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = flashAlpha;
  const g = ctx.createRadialGradient(flashX, flashY, 0, flashX, flashY, 28);
  g.addColorStop(0, '#FFF');
  g.addColorStop(0.25, '#FFD700');
  g.addColorStop(1, 'rgba(255,140,0,0)');
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(flashX, flashY, 28, 0, Math.PI*2); ctx.fill();
  // Spark lines
  ctx.strokeStyle = 'rgba(255,220,50,0.7)'; ctx.lineWidth = 1.5;
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(flashX, flashY);
    ctx.lineTo(flashX + Math.cos(a)*32, flashY + Math.sin(a)*32);
    ctx.stroke();
  }
  ctx.restore();
}

function drawHUD() {
  ctx.save();
  const py = 14, pw = 85, ph = 28, cx = W/2;

  // Player pill
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  rr(cx - pw - 5, py, pw, ph, 10); ctx.fill();
  ctx.fillStyle = '#FFE066';
  ctx.font = 'bold 14px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText(`YOU  ${pWins}`, cx - pw/2 - 5, py + 19);

  // AI pill
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  rr(cx + 5, py, pw, ph, 10); ctx.fill();
  ctx.fillStyle = '#E74C3C';
  ctx.fillText(`OUTLAW  ${aWins}`, cx + pw/2 + 5, py + 19);

  // Round label
  ctx.fillStyle = 'rgba(200,160,74,0.65)';
  ctx.font = '11px Georgia, serif';
  ctx.fillText(`ROUND ${round} OF 3`, cx, py + ph + 13);

  ctx.restore();
}

function drawFade() {
  if (fadeAlpha <= 0) return;
  ctx.save();
  ctx.globalAlpha = Math.min(1, fadeAlpha);
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  ctx.restore();
}

// ── State draw functions ───────────────────────────────────
function drawTitle() {
  ctx.save();
  drawBackground(); drawStars();
  drawCactus(38, H-60, 92); drawCactus(318, H-60, 78);
  drawCactus(62, H-60, 52); drawCactus(298, H-60, 57);
  drawDueler(P_X, P_Y, 1, false, 0);
  drawDueler(A_X, A_Y, -1, false, 0);
  drawDust();

  // Title card
  ctx.fillStyle = 'rgba(5,2,8,0.7)';
  rr(38, H*0.17, W-76, 118, 14); ctx.fill();
  ctx.strokeStyle = 'rgba(200,160,74,0.5)'; ctx.lineWidth = 1.5;
  rr(38, H*0.17, W-76, 118, 14); ctx.stroke();

  ctx.fillStyle = '#FFE066';
  ctx.font = 'bold 32px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('TIN STAR', W/2, H*0.17 + 46);
  ctx.fillText('SHOWDOWN', W/2, H*0.17 + 82);

  ctx.fillStyle = '#C8A04A';
  ctx.font = '13px Georgia, serif';
  ctx.fillText('★  BEST OF THREE  ★', W/2, H*0.17 + 104);

  if (bestReact > 0) {
    ctx.fillStyle = '#FF9F43';
    ctx.font = '12px sans-serif';
    ctx.fillText(`BEST DRAW: ${bestReact}ms`, W/2, H*0.17 + 122);
  }

  const pulse = 0.6 + Math.sin(Date.now()/480)*0.4;
  ctx.fillStyle = `rgba(255,224,102,${pulse})`;
  ctx.font = 'bold 16px Georgia, serif';
  ctx.fillText('TAP TO PLAY', W/2, H*0.83);

  ctx.restore();
}

function drawIntro() {
  ctx.save();
  drawBackground(); drawStars();
  drawCactus(38, H-60, 92); drawCactus(318, H-60, 78);
  drawDueler(P_X, P_Y, 1, false, 0);
  drawDueler(A_X, A_Y, -1, false, 0);
  drawDust(); drawHUD();

  ctx.fillStyle = 'rgba(5,2,8,0.68)';
  rr(62, H*0.37, W-124, 108, 13); ctx.fill();
  ctx.strokeStyle = 'rgba(200,160,74,0.45)'; ctx.lineWidth = 1.2;
  rr(62, H*0.37, W-124, 108, 13); ctx.stroke();

  ctx.fillStyle = '#FFE066';
  ctx.font = 'bold 24px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText(`ROUND ${round}`, W/2, H*0.37 + 40);

  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.font = '13px Georgia, serif';
  ctx.fillText('Draw your iron.', W/2, H*0.37 + 64);

  const pulse = 0.6 + Math.sin(Date.now()/480)*0.4;
  ctx.fillStyle = `rgba(255,224,102,${pulse})`;
  ctx.font = 'bold 14px Georgia, serif';
  ctx.fillText('TAP TO FACE OFF', W/2, H*0.37 + 92);

  ctx.restore();
}

function drawReady() {
  ctx.save();
  drawBackground(); drawStars();
  drawCactus(38, H-60, 92); drawCactus(318, H-60, 78);
  drawDueler(P_X, P_Y, 1, false, 0);
  drawDueler(A_X, A_Y, -1, false, 0);
  drawDust(); drawHUD();

  const elapsed = Date.now() - readyAt;
  const span    = drawAt - readyAt;
  const t       = Math.min(1, elapsed / span);
  const pulse   = 0.7 + Math.sin(Date.now() / (180 - t*100)) * 0.3;

  ctx.shadowColor = '#C8A04A'; ctx.shadowBlur = 14 * pulse;
  ctx.fillStyle = `rgba(200,160,74,${pulse})`;
  ctx.font = 'bold 34px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('READY...', W/2, H*0.52);
  ctx.shadowBlur = 0;

  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '12px Georgia, serif';
  ctx.fillText('Wait for DRAW!', W/2, H*0.52 + 26);

  ctx.restore();
}

function drawDrawState() {
  ctx.save();
  drawBackground(); drawStars();
  drawCactus(38, H-60, 92); drawCactus(318, H-60, 78);

  const pFall = (roundResult && roundResult !== 'player') ? fallAngle : 0;
  const aFall = (roundResult === 'player') ? fallAngle : 0;
  drawDueler(P_X, P_Y, 1,  true, pFall);
  drawDueler(A_X, A_Y, -1, true, aFall);
  drawFlash();
  drawDust(); drawHUD();

  if (!roundResult) {
    ctx.shadowColor = '#FFD700'; ctx.shadowBlur = 22;
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 52px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText('DRAW!', W/2, H*0.50);
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

function drawResult() {
  ctx.save();
  drawBackground(); drawStars();
  drawCactus(38, H-60, 92); drawCactus(318, H-60, 78);

  const pFall = (roundResult !== 'player') ? fallAngle : 0;
  const aFall = (roundResult === 'player') ? fallAngle : 0;
  drawDueler(P_X, P_Y, 1,  true, pFall);
  drawDueler(A_X, A_Y, -1, true, aFall);
  drawFlash();
  drawDust(); drawHUD();

  // Result card
  ctx.fillStyle = 'rgba(5,2,8,0.72)';
  rr(48, H*0.35, W-96, 148, 14); ctx.fill();
  ctx.strokeStyle = 'rgba(200,160,74,0.4)'; ctx.lineWidth = 1.2;
  rr(48, H*0.35, W-96, 148, 14); ctx.stroke();

  let headline, hColor;
  if (roundResult === 'flinch') { headline = 'FLINCHED!'; hColor = '#E74C3C'; }
  else if (roundResult === 'player') { headline = 'ROUND WON'; hColor = '#FFE066'; }
  else { headline = 'ROUND LOST'; hColor = '#E74C3C'; }

  ctx.fillStyle = hColor;
  ctx.font = 'bold 28px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText(headline, W/2, H*0.35 + 44);

  if (roundResult === 'player' && pReactMs > 0) {
    ctx.fillStyle = '#FF9F43';
    ctx.font = 'bold 20px sans-serif';
    ctx.fillText(`${pReactMs}ms`, W/2, H*0.35 + 76);
    if (pReactMs === bestReact && bestReact > 0) {
      ctx.fillStyle = '#FFE066';
      ctx.font = 'bold 13px Georgia, serif';
      ctx.fillText('NEW RECORD!', W/2, H*0.35 + 98);
    } else if (bestReact > 0) {
      ctx.fillStyle = 'rgba(255,255,255,0.45)';
      ctx.font = '12px sans-serif';
      ctx.fillText(`Best: ${bestReact}ms`, W/2, H*0.35 + 97);
    }
  } else if (roundResult === 'ai' || roundResult === 'timeout') {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '13px sans-serif';
    if (roundResult === 'ai') ctx.fillText(`Outlaw drew in ${aReactMs}ms`, W/2, H*0.35 + 72);
    else ctx.fillText('Too slow — holster up!', W/2, H*0.35 + 72);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '13px Georgia, serif';
    ctx.fillText('Jumped the gun', W/2, H*0.35 + 72);
  }

  const pulse = 0.6 + Math.sin(Date.now()/480)*0.4;
  ctx.fillStyle = `rgba(255,224,102,${pulse})`;
  ctx.font = 'bold 14px Georgia, serif';
  ctx.fillText('TAP TO CONTINUE', W/2, H*0.35 + 128);

  ctx.restore();
}

function drawOver() {
  ctx.save();
  drawBackground(); drawStars();
  drawCactus(38, H-60, 92); drawCactus(318, H-60, 78);

  const won = pWins >= 2;
  drawDueler(P_X, P_Y, 1,  won, won ? 0 : Math.min(fallAngle, Math.PI/2));
  drawDueler(A_X, A_Y, -1, !won, !won ? 0 : Math.min(fallAngle, Math.PI/2));
  drawDust();

  ctx.fillStyle = 'rgba(5,2,8,0.72)';
  rr(38, H*0.24, W-76, 220, 14); ctx.fill();
  ctx.strokeStyle = won ? 'rgba(200,160,74,0.55)' : 'rgba(200,50,30,0.55)';
  ctx.lineWidth = 1.5; rr(38, H*0.24, W-76, 220, 14); ctx.stroke();

  ctx.font = 'bold 30px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillStyle = won ? '#FFE066' : '#E74C3C';
  ctx.fillText(won ? 'MATCH WON' : 'MATCH LOST', W/2, H*0.24 + 48);

  ctx.font = '14px Georgia, serif';
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  ctx.fillText(won ? 'The outlaw hits the dust.' : 'You\'re outdrawn.', W/2, H*0.24 + 76);

  if (bestReact > 0) {
    ctx.fillStyle = '#FF9F43';
    ctx.font = 'bold 14px sans-serif';
    ctx.fillText(`Best draw: ${bestReact}ms`, W/2, H*0.24 + 104);
  }

  ctx.fillStyle = '#FFE066';
  ctx.font = 'bold 14px sans-serif';
  ctx.fillText(`Matches won: ${matchWins}`, W/2, H*0.24 + 128);

  // Share button
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  rr(W/2-58, H*0.24+148, 116, 30, 8); ctx.fill();
  ctx.fillStyle = '#ccc'; ctx.font = '13px sans-serif';
  ctx.fillText('Share Score', W/2, H*0.24+168);

  // Feedback button
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  rr(W/2-58, H*0.24+185, 116, 26, 8); ctx.fill();
  ctx.fillStyle = '#aaa'; ctx.font = '12px sans-serif';
  ctx.fillText('Leave Feedback', W/2, H*0.24+202);

  const pulse = 0.6 + Math.sin(Date.now()/480)*0.4;
  ctx.fillStyle = `rgba(255,224,102,${pulse})`;
  ctx.font = 'bold 14px Georgia, serif';
  ctx.fillText('TAP TO PLAY AGAIN', W/2, H*0.24+218);

  ctx.restore();
}

// ── Main draw ──────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);
  if      (state === 'title')  drawTitle();
  else if (state === 'intro')  drawIntro();
  else if (state === 'ready')  drawReady();
  else if (state === 'draw')   drawDrawState();
  else if (state === 'result') drawResult();
  else if (state === 'over')   drawOver();
  drawFade();
}

// ── Update ─────────────────────────────────────────────────
let lastTs = 0;

function update(ts) {
  const dt = Math.min(0.08, (ts - lastTs) / 1000);
  lastTs = ts;

  updateDust(dt);

  if (flashAlpha > 0) flashAlpha = Math.max(0, flashAlpha - dt * 6);
  if (fadeAlpha  > 0) fadeAlpha  = Math.max(0, fadeAlpha  - dt * 5);

  if ((state === 'result' || state === 'over') && fallAngle < Math.PI/2) {
    fallAngle = Math.min(Math.PI/2, fallAngle + dt * 2.8);
  }

  if (state === 'ready') {
    const now = Date.now();
    if (now >= drawAt) { enterDraw(); return; }
    if (now >= readyTickNext) {
      const t = Math.min(1, (now - readyAt) / (drawAt - readyAt));
      playReadyTick(t);
      readyTickNext = now + 650 - t * 200;
    }
  }
}

function loop(ts) {
  try { update(ts); draw(); } catch (e) { console.error('Game loop error:', e); }
  requestAnimationFrame(loop);
}

// ── Game logic ─────────────────────────────────────────────
function startMatch() {
  round = 1; pWins = 0; aWins = 0;
  startIntro();
}

function startIntro() {
  state     = 'intro';
  roundResult = '';
  fallAngle = 0;
  fadeAlpha = 0.35;
}

function startReady() {
  state    = 'ready';
  readyAt  = Date.now();
  const delay = READY_MIN + Math.random() * (READY_MAX - READY_MIN);
  drawAt = readyAt + delay;
  readyTickNext = readyAt + 200;
}

function enterDraw() {
  state       = 'draw';
  drawShownAt = Date.now();
  roundResult = '';

  const [amin, amax] = aiRange(matchWins);
  aiDelay  = Math.floor(amin + Math.random() * (amax - amin));
  aReactMs = aiDelay;

  aiTimer   = setTimeout(() => { if (state === 'draw' && !roundResult) resolveRound('ai'); }, aiDelay);
  drawTimer = setTimeout(() => { if (state === 'draw' && !roundResult) resolveRound('timeout'); }, DRAW_TIMEOUT);
}

function resolveRound(winner) {
  if (roundResult) return;
  roundResult = winner;
  clearTimeout(aiTimer); clearTimeout(drawTimer);
  aiTimer = drawTimer = null;

  if (winner === 'player') {
    flashX = A_X; flashY = A_Y - 80; flashAlpha = 1;
    playGunshot(); setTimeout(playVictory, 140);
    if (pReactMs > 0 && (bestReact === 0 || pReactMs < bestReact)) {
      bestReact = pReactMs;
      localStorage.setItem('tinstar_best_react', bestReact);
    }
    pWins++;
  } else if (winner === 'flinch') {
    playDefeat(); aWins++;
  } else {
    flashX = P_X; flashY = P_Y - 80; flashAlpha = 1;
    playGunshot(); setTimeout(playDefeat, 140);
    aWins++;
  }

  state     = 'result';
  resultAt  = Date.now();
  fallAngle = 0;
}

function playerFire() {
  if (state === 'ready') {
    if (Date.now() - readyAt > 100) {
      pReactMs = 0;
      resolveRound('flinch');
    }
    return;
  }
  if (state === 'draw' && !roundResult) {
    pReactMs = Math.max(1, Date.now() - drawShownAt);
    resolveRound('player');
  }
}

function advanceFromResult() {
  if (Date.now() - resultAt < RESULT_LOCK) return;
  if (pWins >= 2 || aWins >= 2) {
    if (pWins >= 2) matchWins++;
    matchTotal++;
    state = 'over'; fallAngle = 0; fadeAlpha = 0.4;
  } else {
    round++;
    startIntro();
  }
}

// ── Input ──────────────────────────────────────────────────
function getCanvasXY(e) {
  const r  = canvas.getBoundingClientRect();
  const sc = W / r.width;
  const src = e.touches ? e.touches[0] : e;
  return [(src.clientX - r.left) * sc, (src.clientY - r.top) * sc];
}

function onTap(e) {
  e.preventDefault();
  if (feedbackOverlay.style.display === 'flex') return;
  initAudio();

  if (state === 'title')  { startMatch(); return; }
  if (state === 'intro')  { startReady(); return; }
  if (state === 'ready' || state === 'draw') { playerFire(); return; }
  if (state === 'result') { advanceFromResult(); return; }
  if (state === 'over') {
    const [gx, gy] = getCanvasXY(e);
    const cardTop = H * 0.24;
    // Share
    if (gx > W/2-58 && gx < W/2+58 && gy > cardTop+148 && gy < cardTop+178) {
      if (navigator.share) navigator.share({ title: 'Tin Star Showdown',
        text: `I won ${matchWins} match${matchWins !== 1 ? 'es' : ''}! Best draw: ${bestReact}ms` });
      return;
    }
    // Feedback
    if (gx > W/2-58 && gx < W/2+58 && gy > cardTop+185 && gy < cardTop+211) {
      fbRating = 0; fbText.value = ''; fbStatus.textContent = '';
      fbSubmitBtn.textContent = 'Submit'; fbSubmitBtn.disabled = false;
      starSpans.forEach(s => { s.textContent = '☆'; s.style.color = 'rgba(255,215,0,0.4)'; });
      feedbackOverlay.style.display = 'flex';
      return;
    }
    // Play again
    state = 'title'; fadeAlpha = 0.4;
    return;
  }
}

canvas.addEventListener('click',      onTap);
canvas.addEventListener('touchstart', onTap, { passive: false });
window.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); onTap({ preventDefault: () => {}, touches: null }); }
});

// ── Feedback overlay ───────────────────────────────────────
const feedbackOverlay = document.createElement('div');
feedbackOverlay.id = 'feedback-overlay';
feedbackOverlay.style.cssText =
  'display:none;position:absolute;top:0;left:0;width:100%;height:100%;' +
  'flex-direction:column;align-items:center;justify-content:center;gap:14px;' +
  'background:rgba(5,2,8,0.97);border:2px solid #FFD700;box-sizing:border-box;padding:28px;z-index:10;';
feedbackOverlay.innerHTML = `
  <h2 style="color:#FFD700;font-family:Georgia,serif;font-size:20px;margin:0;text-align:center;">Rate This Game</h2>
  <div id="stars" style="display:flex;gap:10px;font-size:34px;cursor:pointer;user-select:none;">
    <span data-v="1" style="color:rgba(255,215,0,0.4)">&#9734;</span>
    <span data-v="2" style="color:rgba(255,215,0,0.4)">&#9734;</span>
    <span data-v="3" style="color:rgba(255,215,0,0.4)">&#9734;</span>
    <span data-v="4" style="color:rgba(255,215,0,0.4)">&#9734;</span>
    <span data-v="5" style="color:rgba(255,215,0,0.4)">&#9734;</span>
  </div>
  <textarea id="fb-text" rows="4" placeholder="What worked? What could be better?"
    style="width:100%;max-width:300px;background:#1a0a06;color:#E8DCC8;border:1px solid #555;
    border-radius:6px;padding:10px;font-size:14px;resize:none;font-family:sans-serif;"></textarea>
  <button id="fb-submit" style="background:#FFD700;color:#0d0608;font-weight:bold;font-size:16px;
    padding:10px 36px;border:none;border-radius:8px;cursor:pointer;">Submit</button>
  <button id="fb-cancel" style="background:none;border:none;color:#A09070;font-size:14px;
    cursor:pointer;text-decoration:underline;">Cancel</button>
  <p id="fb-status" style="color:#A09070;font-size:13px;min-height:18px;margin:0;text-align:center;"></p>
`;
wrap.appendChild(feedbackOverlay);

const starSpans   = feedbackOverlay.querySelectorAll('#stars span');
const fbText      = feedbackOverlay.querySelector('#fb-text');
const fbStatus    = feedbackOverlay.querySelector('#fb-status');
const fbSubmitBtn = feedbackOverlay.querySelector('#fb-submit');
let fbRating = 0;

starSpans.forEach(span => {
  span.addEventListener('click', () => {
    fbRating = parseInt(span.dataset.v, 10);
    starSpans.forEach(s => {
      const v = parseInt(s.dataset.v, 10);
      s.textContent = v <= fbRating ? '★' : '☆';
      s.style.color = v <= fbRating ? '#FFD700' : 'rgba(255,215,0,0.4)';
    });
  });
});

feedbackOverlay.querySelector('#fb-cancel').addEventListener('click', () => {
  feedbackOverlay.style.display = 'none';
});

fbSubmitBtn.addEventListener('click', () => {
  if (fbRating === 0) { fbStatus.textContent = 'Please pick a star rating.'; return; }
  fbStatus.textContent = 'Sending…'; fbSubmitBtn.disabled = true;
  fetch(FEEDBACK_ENDPOINT, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({ game: 'Tin Star Showdown', rating: fbRating, message: fbText.value, score: matchWins }),
  }).finally(() => {
    fbStatus.textContent = 'Thanks! 🤠';
    setTimeout(() => { feedbackOverlay.style.display = 'none'; }, 1500);
  });
});

// ── Test hooks ─────────────────────────────────────────────
window.__test = {
  getState:       () => ({ state, round, pWins, aWins, matchWins, roundResult, bestReact, pReactMs }),
  triggerDraw:    () => { if (state === 'ready') { clearTimeout(aiTimer); clearTimeout(drawTimer); enterDraw(); } },
  triggerPlayerWin: () => { if (state === 'draw' && !roundResult) { pReactMs = 250; resolveRound('player'); } },
  triggerAiWin:   () => { if (state === 'draw' && !roundResult) resolveRound('ai'); },
  triggerFlinch:  () => { if (state === 'ready') { pReactMs = 0; resolveRound('flinch'); } },
  forceState:     (s) => { state = s; },
  forceWins:      (pw, aw) => { pWins = pw; aWins = aw; },
  forceMatchOver: (playerWon) => {
    pWins = playerWon ? 2 : 0; aWins = playerWon ? 0 : 2;
    if (playerWon) matchWins++;
    matchTotal++;
    state = 'over'; fallAngle = 0; fadeAlpha = 0.4;
  },
  unlockResult:   () => { resultAt = 0; },
  resetBest:      () => { bestReact = 0; localStorage.removeItem('tinstar_best_react'); },
};

// ── Boot ───────────────────────────────────────────────────
requestAnimationFrame(loop);
</script>
</body>
