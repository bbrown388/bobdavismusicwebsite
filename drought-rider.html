// === Audio ===
let audioCtx = null;
function getAC() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playDecision() {
  try {
    const ac = getAC();
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'triangle';
    o.frequency.setValueAtTime(330, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(220, ac.currentTime + 0.25);
    g.gain.setValueAtTime(0.12, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
    o.start(); o.stop(ac.currentTime + 0.3);
  } catch(e) {}
}

function playGood() {
  try {
    const ac = getAC();
    // C major arpeggio: C4 E4 G4
    [262, 330, 392].forEach((freq, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine';
      const t = ac.currentTime + i * 0.12;
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.0, t);
      g.gain.linearRampToValueAtTime(0.13, t + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      o.start(t); o.stop(t + 0.35);
    });
  } catch(e) {}
}

function playBad() {
  try {
    const ac = getAC();
    // Diminished: A3 Eb4 descending
    [220, 311].forEach((freq, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'triangle';
      const t = ac.currentTime + i * 0.1;
      o.frequency.setValueAtTime(freq, t);
      o.frequency.exponentialRampToValueAtTime(freq * 0.85, t + 0.3);
      g.gain.setValueAtTime(0.10, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      o.start(t); o.stop(t + 0.35);
    });
  } catch(e) {}
}

function playWin() {
  try {
    const ac = getAC();
    // G major arpeggio ascending
    [392, 494, 587, 784].forEach((freq, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine';
      const t = ac.currentTime + i * 0.18;
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.0, t);
      g.gain.linearRampToValueAtTime(0.16, t + 0.05);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      o.start(t); o.stop(t + 0.5);
    });
  } catch(e) {}
}

function playLose() {
  try {
    const ac = getAC();
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(110, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(55, ac.currentTime + 1.2);
    g.gain.setValueAtTime(0.14, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 1.5);
    o.start(); o.stop(ac.currentTime + 1.5);
  } catch(e) {}
}

// === Game Logic ===
function calcProb(baseProb) {
  const penalty = Math.min(0.28, heatExposure / 310);
  return Math.max(0.04, baseProb - penalty);
}

function getHeatHint() {
  let hint = HEAT_HINTS[0][1];
  for (const [thresh, text] of HEAT_HINTS) {
    if (heatExposure >= thresh) hint = text;
  }
  return hint;
}

function addPopup(text, color) {
  popups.push({ text, color, x: W / 2, y: 300, vy: -40, life: 1.0 });
}

function startGame() {
  state = 'day_start';
  dayIdx = 0;
  water = 70;
  horse = 100;
  heatExposure = 0;
  goodChoices = 0;
  score = 0;
  animT = 0;
  transT = 0;
  popups = [];
  choiceResult = null;
  waterAnimFrom = water;
  horseAnimFrom = horse;
  pendingEnd = false;
}

function makeChoice(idx) {
  const day = DAYS[dayIdx];
  const ch = day.choices[idx];
  const prob = calcProb(ch.goodProb);
  const success = Math.random() < prob;

  const wBefore = water;
  const hBefore = horse;

  // Apply base costs
  water = Math.max(0, Math.min(100, water + ch.waterDelta));
  horse = Math.max(0, Math.min(100, horse + ch.horseDelta));

  // Apply weather heat base + choice heat modifier
  const weatherHeat = WEATHER[day.weather].heatBase;
  heatExposure = Math.min(100, Math.max(0, heatExposure + weatherHeat + ch.heatDelta));

  if (success) {
    if (ch.goodBonus) {
      water = Math.min(100, water + (ch.goodBonus.water || 0));
      horse = Math.min(100, horse + (ch.goodBonus.horse || 0));
    }
    goodChoices++;
    playGood();
    choiceResult = { success: true, text: ch.goodText, wBefore, hBefore };
    addPopup('MADE IT', '#72C859');
  } else {
    if (ch.badPenalty) {
      water = Math.max(0, water + (ch.badPenalty.water || 0));
      horse = Math.max(0, horse + (ch.badPenalty.horse || 0));
    }
    playBad();
    choiceResult = { success: false, text: ch.badText, wBefore, hBefore };
    addPopup('TROUBLE', '#E74C3C');
  }

  waterAnimFrom = wBefore;
  horseAnimFrom = hBefore;
  animT = 0;
  state = 'outcome';
}

function advanceFromOutcome() {
  if (water <= 0) {
    state = 'lose';
    choiceResult = { loseReason: 'thirst', text: 'You ran out of water. The desert claimed you.' };
    playLose();
    return;
  }
  if (horse <= 0) {
    state = 'lose';
    choiceResult = { loseReason: 'horse', text: 'Your horse collapsed. You didn\'t make it.' };
    playLose();
    return;
  }
  dayIdx++;
  if (dayIdx >= TOTAL_DAYS) {
    score = 1000 + water * 5 + horse * 5 + goodChoices * 80;
    if (score > best) { best = score; localStorage.setItem('drought-rider_best', best); }
    state = 'win';
    playWin();
  } else {
    state = 'day_start';
    animT = 0;
    transT = 0;
  }
}

// === Drawing ===
function drawBackground(dayFrac) {
  ctx.save();
  const day = DAYS[Math.min(dayIdx, TOTAL_DAYS - 1)];
  const w = WEATHER[day.weather];

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.55);
  skyGrad.addColorStop(0, w.skyA);
  skyGrad.addColorStop(1, w.skyB);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H * 0.55);

  // Stars (faint, fixed)
  ctx.fillStyle = 'rgba(255,240,200,0.4)';
  const starSeeds = [17,53,89,113,149,181,211,239,271,307,331,359,383];
  for (let i = 0; i < starSeeds.length; i++) {
    const sx = (starSeeds[i] * 23 + i * 47) % W;
    const sy = (starSeeds[i] * 7 + i * 19) % (H * 0.40);
    const r = (i % 3 === 0) ? 1.2 : 0.7;
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Sun / moon position
  const sunX = W * 0.72;
  const sunY = H * 0.12;
  if (day.weather === 'OVERCAST') {
    // Gray sun behind clouds
    ctx.fillStyle = 'rgba(180,160,120,0.3)';
    ctx.beginPath(); ctx.arc(sunX, sunY, 28, 0, Math.PI * 2); ctx.fill();
  } else if (day.weather === 'SCORCHING') {
    const sunGrad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 36);
    sunGrad.addColorStop(0, '#FFF4A0');
    sunGrad.addColorStop(0.4, '#FF9820');
    sunGrad.addColorStop(1, 'rgba(255,80,0,0)');
    ctx.fillStyle = sunGrad;
    ctx.beginPath(); ctx.arc(sunX, sunY, 36, 0, Math.PI * 2); ctx.fill();
    // Heat haze glow
    const hazeGrad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 70);
    hazeGrad.addColorStop(0, 'rgba(255,100,0,0.15)');
    hazeGrad.addColorStop(1, 'rgba(255,80,0,0)');
    ctx.fillStyle = hazeGrad;
    ctx.beginPath(); ctx.arc(sunX, sunY, 70, 0, Math.PI * 2); ctx.fill();
  } else {
    const sunGrad = ctx.createRadialGradient(sunX, sunY, 0, sunX, sunY, 30);
    sunGrad.addColorStop(0, '#FFFAB0');
    sunGrad.addColorStop(0.5, '#FFD040');
    sunGrad.addColorStop(1, 'rgba(255,180,0,0)');
    ctx.fillStyle = sunGrad;
    ctx.beginPath(); ctx.arc(sunX, sunY, 30, 0, Math.PI * 2); ctx.fill();
  }

  // Distant mesa silhouettes
  ctx.fillStyle = '#1a0d00';
  const horizY = H * 0.55;
  ctx.beginPath();
  ctx.moveTo(0, horizY);
  // Mesa 1
  ctx.lineTo(20, horizY - 60);
  ctx.lineTo(55, horizY - 80);
  ctx.lineTo(90, horizY - 55);
  // Mesa 2
  ctx.lineTo(140, horizY - 35);
  ctx.lineTo(190, horizY - 95);
  ctx.lineTo(230, horizY - 70);
  // Mesa 3
  ctx.lineTo(280, horizY - 40);
  ctx.lineTo(310, horizY - 72);
  ctx.lineTo(360, horizY - 50);
  ctx.lineTo(360, horizY);
  ctx.closePath();
  ctx.fill();

  // Mid ground: scrub / cactus silhouettes
  ctx.fillStyle = '#1a0800';
  ctx.beginPath();
  ctx.moveTo(0, horizY + 10);
  ctx.lineTo(0, H);
  ctx.lineTo(W, H);
  ctx.lineTo(W, horizY + 10);
  // Slight undulation
  for (let x = W; x >= 0; x -= 30) {
    const yOff = Math.sin(x * 0.04 + bgScrollX * 0.01) * 6;
    ctx.lineTo(x, horizY + 10 + yOff);
  }
  ctx.closePath();
  ctx.fill();

  // Sand ground
  const sandGrad = ctx.createLinearGradient(0, horizY, 0, H);
  sandGrad.addColorStop(0, '#2a1200');
  sandGrad.addColorStop(1, '#100800');
  ctx.fillStyle = sandGrad;
  ctx.fillRect(0, horizY, W, H);

  // Horizon dust band
  const dustGrad = ctx.createLinearGradient(0, horizY - 20, 0, horizY + 30);
  dustGrad.addColorStop(0, 'rgba(200,140,40,0)');
  dustGrad.addColorStop(0.5, 'rgba(200,140,40,0.18)');
  dustGrad.addColorStop(1, 'rgba(200,140,40,0)');
  ctx.fillStyle = dustGrad;
  ctx.fillRect(0, horizY - 20, W, 50);

  // Heat shimmer overlay (visible when heatExposure is high)
  if (heatExposure > 30) {
    const shimmerAlpha = (heatExposure - 30) / 140;
    const shGrad = ctx.createLinearGradient(0, horizY - 40, 0, horizY + 40);
    shGrad.addColorStop(0, 'rgba(255,120,0,0)');
    shGrad.addColorStop(0.5, `rgba(255,120,0,${shimmerAlpha.toFixed(2)})`);
    shGrad.addColorStop(1, 'rgba(255,120,0,0)');
    ctx.fillStyle = shGrad;
    ctx.fillRect(0, horizY - 40, W, 80);
  }

  // Clouds (overcast only)
  if (day.weather === 'OVERCAST') {
    ctx.fillStyle = 'rgba(80,70,100,0.5)';
    [[40, 60, 80, 25], [150, 45, 110, 20], [280, 70, 90, 22]].forEach(([cx, cy, cw, ch]) => {
      ctx.beginPath();
      ctx.ellipse(cx, cy, cw, ch, 0, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  ctx.restore();
}

function drawRider() {
  ctx.save();
  const horizY = H * 0.55;
  const rx = W * 0.25;
  const ry = horizY - 18 + Math.sin(riderBob) * 3;
  ctx.fillStyle = '#0e0608';

  // Horse body
  ctx.beginPath();
  ctx.ellipse(rx, ry + 2, 32, 14, 0, 0, Math.PI * 2);
  ctx.fill();

  // Horse head/neck
  ctx.beginPath();
  ctx.ellipse(rx + 34, ry - 8, 12, 8, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Horse nose
  ctx.beginPath();
  ctx.ellipse(rx + 44, ry - 6, 6, 5, 0.2, 0, Math.PI * 2);
  ctx.fill();

  // Legs (animated with bob)
  const legPhase = riderBob;
  const legs = [
    [rx - 20, ry + 14, rx - 22, ry + 28],
    [rx - 8,  ry + 14, rx - 6,  ry + 28],
    [rx + 8,  ry + 14, rx + 10 + Math.sin(legPhase) * 4, ry + 28],
    [rx + 20, ry + 14, rx + 22 + Math.cos(legPhase) * 4, ry + 28],
  ];
  ctx.strokeStyle = '#0e0608';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  legs.forEach(([x1, y1, x2, y2]) => {
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
  });

  // Rider silhouette
  ctx.fillStyle = '#1a0c20';
  ctx.beginPath();
  ctx.ellipse(rx + 8, ry - 20, 9, 13, 0.1, 0, Math.PI * 2); // torso
  ctx.fill();
  ctx.beginPath();
  ctx.arc(rx + 10, ry - 36, 8, 0, Math.PI * 2); // head
  ctx.fill();

  // Hat
  ctx.fillStyle = '#0a0510';
  ctx.beginPath();
  ctx.ellipse(rx + 10, ry - 44, 11, 3, 0, 0, Math.PI * 2); // brim
  ctx.fill();
  ctx.beginPath();
  ctx.rect(rx + 2, ry - 54, 16, 12); // crown
  ctx.fill();

  // Saddle bags
  ctx.fillStyle = '#3a1f05';
  ctx.beginPath();
  ctx.rect(rx - 30, ry - 6, 12, 16);
  ctx.fill();

  ctx.restore();
}

function drawChoices() {
  ctx.save();
  const day = DAYS[dayIdx];
  const startY = H * 0.62 + 100;
  const btnW = W - 28;
  const btnX = 14;
  const btnH = 52;
  const gap = 6;

  day.choices.forEach((ch, i) => {
    const by = startY + i * (btnH + gap);
    const prob = calcProb(ch.goodProb);
    const pctGood = Math.round(prob * 100);
    const pctBad = 100 - pctGood;

    // Button background
    ctx.fillStyle = 'rgba(25,12,40,0.95)';
    roundRect(btnX, by, btnW, btnH, 8);
    ctx.fill();
    ctx.strokeStyle = '#3a2060';
    ctx.lineWidth = 1;
    roundRect(btnX, by, btnW, btnH, 8);
    ctx.stroke();

    // Probability bar (background)
    const probBarX = btnX + 8;
    const probBarW = btnW - 16;
    const probBarY = by + btnH - 12;
    ctx.fillStyle = 'rgba(80,0,0,0.5)';
    roundRect(probBarX, probBarY, probBarW, 6, 3);
    ctx.fill();

    // Good portion (green)
    ctx.fillStyle = '#2a7a3a';
    roundRect(probBarX, probBarY, probBarW * prob, 6, 3);
    ctx.fill();

    // Choice label
    ctx.fillStyle = '#FFE066';
    ctx.font = 'bold 12px Georgia,serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(ch.label, btnX + 10, by + 7);

    // Probability text
    ctx.fillStyle = '#72C859';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'right';
    ctx.fillText(`${pctGood}% safe`, btnX + btnW - 8, by + 7);

    // Trouble text
    if (pctBad > 5) {
      ctx.fillStyle = '#E74C3C';
      ctx.font = '10px sans-serif';
      ctx.fillText(`${pctBad}% trouble`, btnX + btnW - 8, by + 20);
    }

    // Description
    ctx.fillStyle = '#9a8878';
    ctx.font = '10px Georgia,serif';
    ctx.textAlign = 'left';
    ctx.fillText(ch.desc, btnX + 10, by + 22);

    // Water/horse cost summary
    const costParts = [];
    if (ch.waterDelta !== 0) costParts.push(`Water ${ch.waterDelta > 0 ? '+' : ''}${ch.waterDelta}`);
    if (ch.horseDelta !== 0) costParts.push(`Horse ${ch.horseDelta > 0 ? '+' : ''}${ch.horseDelta}`);
    ctx.fillStyle = '#776655';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(costParts.join('  '), btnX + 10, by + 36);
  });

  ctx.restore();
}

function drawOutcome() {

  lines.forEach((line, i) => {

  // Animated resource change display
  const elapsed = Math.min(animT / 0.6, 1);
  const dispWater = lerp(choiceResult.wBefore, water, elapsed);
  const dispHorse = lerp(choiceResult.hBefore, horse, elapsed);

  const barY = cardY + 120;
  const barW2 = cardW - 60;
  const bx = cardX + 30;

  ctx.fillStyle = '#4A90D9';

  roundRect(bx + 50, barY, (barW2 - 50) * Math.max(0, dispWater / 100), 12, 4); ctx.fill();

  // Horse
  ctx.fillStyle = '#C8A04A';

  roundRect(bx + 50, barY + 20, barW2 - 50, 12, 4); ctx.fill();

  // Continue prompt

    ctx.fillStyle = `rgba(255,224,102,${0.5 + 0.5 * Math.sin(animT * 3)})`;
    ctx.font = 'bold 12px Georgia,serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('Tap to continue', W / 2, cardY + cardH - 12);
  }

  ctx.restore();
}

function drawPopups(dt) {
  ctx.save();
  popups = popups.filter(p => p.life > 0);
  popups.forEach(p => {
    p.y += p.vy * dt;
    p.life -= dt * 1.0;
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.font = 'bold 15px Georgia,serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(p.text, p.x, p.y);

  ctx.globalAlpha = 1;
  ctx.restore();
}

// === Utilities ===
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function pill(cx, cy, w, h, color) {
  ctx.fillStyle = color;
  roundRect(cx - w / 2, cy, w, h, h / 2);
  ctx.fill();
}

function wrapText(text, x, y, maxW, lineH) {
  const words = text.split(' ');
  let line = '';
  let lineY = y;
  words.forEach(word => {
    const test = line + (line ? ' ' : '') + word;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, x, lineY);
      lineY += lineH;
      line = word;
    } else {
      line = test;
    }
  });
  if (line) ctx.fillText(line, x, lineY);
}

function wrapTextArr(text, maxW) {
  const words = text.split(' ');
  const lines = [];
  let line = '';
  ctx.font = '11px Georgia,serif';
  words.forEach(word => {
    const test = line + (line ? ' ' : '') + word;
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  });
  if (line) lines.push(line);
  return lines;
}

function lerp(a, b, t) { return a + (b - a) * t; }

// === Input Handling ===
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const sx = canvas.offsetWidth / W;
  const sy = canvas.offsetHeight / H;
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - rect.left) / sx, y: (src.clientY - rect.top) / sy };
}

function handleTap(px, py) {
  // Feedback button (all states except title)
  if (state !== 'title') {
    if (px >= FB_BTN.x && px <= FB_BTN.x + FB_BTN.w &&
        py >= FB_BTN.y && py <= FB_BTN.y + FB_BTN.h) {
      document.getElementById('fb-overlay').classList.add('open');
      return;
    }
  }

  if (state === 'title') {
    // Play button
    const pbW = 160, pbH = 44, pbX = (W - pbW) / 2, pbY = H * 0.66;
    if (px >= pbX && px <= pbX + pbW && py >= pbY && py <= pbY + pbH) {
      startGame();
    }
    return;
  }

  if (state === 'day_start') {
    // Tap to skip/advance day card reveal
    if (animT > 0.5) {
      state = 'choice';
    }
    return;
  }

  if (state === 'choice') {
    const day = DAYS[dayIdx];
    const startY = H * 0.62 + 100;
    const btnH = 52, gap = 6;
    for (let i = 0; i < day.choices.length; i++) {
      const by = startY + i * (btnH + gap);
      if (px >= 14 && px <= W - 14 && py >= by && py <= by + btnH) {
        playDecision();
        makeChoice(i);
        return;
      }
    }
    return;
  }

  if (state === 'outcome') {
    if (animT >= 1.0) {
      advanceFromOutcome();
    }
    return;
  }

  if (state === 'win') {
    const pbW = 160, pbH = 40, pbX = (W - pbW) / 2, pbY = H * 0.80;
    if (px >= pbX && px <= pbX + pbW && py >= pbY && py <= pbY + pbH) {
      startGame();
      return;
    }
    // Share
    const sbW = 140, sbH = 34, sbX = (W - sbW) / 2, sbY = H * 0.91;
    if (px >= sbX && px <= sbX + sbW && py >= sbY && py <= sbY + sbH) {
      if (navigator.share) {
        navigator.share({ title: 'Drought Rider', text: `I survived the 7-day crossing with a score of ${score}! Can you beat it?`, url: location.href });
      }
      return;
    }
    return;
  }

  if (state === 'lose') {
    const pbW = 160, pbH = 40, pbX = (W - pbW) / 2, pbY = H * 0.70;
    if (px >= pbX && px <= pbX + pbW && py >= pbY && py <= pbY + pbH) {
      startGame();
    }
    return;
  }
}

canvas.addEventListener('click', e => { const p = getPos(e); handleTap(p.x, p.y); });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const p = getPos(e); handleTap(p.x, p.y);
}, { passive: false });
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    if (state === 'title') startGame();
    else if (state === 'day_start' && animT > 0.5) state = 'choice';
    else if (state === 'outcome' && animT >= 1.0) advanceFromOutcome();
  }
});

// === Game Loop ===
function loop(ts) {
  try {
    const dt = Math.min((ts - lastTime) / 1000, 0.1);
    lastTime = ts;
    animT += dt;
    bgScrollX += dt * 8;
    riderBob += dt * 2.2;

    ctx.clearRect(0, 0, W, H);

    if (state === 'title') {
      drawTitle();
    } else if (state === 'day_start') {
      drawBackground();
      drawRider();
      drawHUD();
      drawDayCard();
      drawPopups(dt);
      drawFeedbackBtn();

      if (animT > 1.8) {
        state = 'choice';
      }
    } else if (state === 'choice') {
      drawBackground();
      drawRider();
      drawHUD();
      drawDayCard();
      drawChoices();
      drawPopups(dt);
      drawFeedbackBtn();
    } else if (state === 'outcome') {
      drawBackground();
      drawRider();
      drawHUD();
      drawOutcome();
      drawPopups(dt);
      drawFeedbackBtn();
    } else if (state === 'win') {
      drawWin();
      drawPopups(dt);
      drawFeedbackBtn();
    } else if (state === 'lose') {
      drawLose();
      drawPopups(dt);
      drawFeedbackBtn();
    }
  } catch(e) { console.error(e); }
  requestAnimationFrame(loop);
}

requestAnimationFrame(ts => { lastTime = ts; requestAnimationFrame(loop); });

// === Test API ===
window.__run = {
  get state() { return state; },
  get dayIdx() { return dayIdx; },
  get water() { return water; },
  get horse() { return horse; },
  get heatExposure() { return heatExposure; },
  get goodChoices() { return goodChoices; },
  get score() { return score; },
  get animT() { return animT; },
  get choiceResult() { return choiceResult; },
  get best() { return best; },
  set animT(v) { animT = v; },
  DAYS, WEATHER, HEAT_HINTS, TOTAL_DAYS,
  startGame,
  makeChoice,
  advanceFromOutcome,
  calcProb,
  getHeatHint,
  addPopup,
};
</script>
