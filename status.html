tion":"fix","game":"Midnight Rodeo","result":"success","summary":"Fixed Midnight Rodeo: taps now register at any time during play, not just the 0.7s telegraph window.","commitHash":"e6cf348"},{"runAt":"2026-04-30T09:15:00Z","action":"new_game","game":"Prairie Fire","result":"success","summary":"Built Game 15: Prairie Fire - wildfire cellular automaton, 18x26 grid, wind-direction spread, firebreak+water placement, 35 tests pass.","commitHash":"230cc44"},{"runAt":"2026-05-02T08:00:34Z","action":"new_game","game":"Moonshine Run","result":"success","summary":"Built Game 16: Moonshine Run - stealth + 3-gauge resource management, revenuer lantern cone detection, 40 tests pass.","commitHash":"153863c"},{"runAt":"2026-05-02T03:52:45Z","action":"new_game","game":"Rope Trick","result":"success","summary":"Built Game 17: Rope Trick - oscillating aim cursor, parabolic arc, wind drift, 5 rounds, 40 tests pass.","commitHash":"e0cf5fb"},{"runAt":"2026-05-02T09:00:00Z","action":"new_game","game":"Dead Man's Hand","result":"success","summary":"Built Game 18: Dead Man's Hand - Texas Hold'em vs 3 AI outlaws with bluffing tells, full hand evaluator, 44 tests pass.","commitHash":"9afae30"},{"runAt":"2026-05-02T09:18:46Z","action":"new_game","game":"Canyon Crossfire","result":"success","summary":"Built Game 19: Canyon Crossfire - cover-based shooter, 3 outlaws with staggered reload cycles, peek/fire/retreat, 36 tests pass.","commitHash":"924bb91"},{"runAt":"2026-05-02T04:47:06Z","action":"new_game","game":"Trail Boss","result":"success","summary":"Built Game 20: Trail Boss - top-down wagon escort, 3 draining resources, 5 biomes, ambush/supply/river events, 40 tests pass.","commitHash":"6deb670"},{"runAt":"2026-05-02T10:10:00.000Z","action":"new_game","game":"Wanted: Dead or Alive","result":"success","summary":"Built Game 21: Wanted: Dead or Alive - first-person investigation, 5 locations, confidence meter, accuse mechanic, 47 tests pass.","commitHash":"42565c3"},{"runAt":"2026-05-03T09:30:00.000Z","action":"new_game","game":"Gallows Road","result":"success","summary":"Built Game 22: Gallows Road - turn-based grid puzzle, 5 levels, guard patrol, crate push mechanic, 37 tests pass.","commitHash":"97e35cf"},{"runAt":"2026-05-03T08:30:19.000Z","action":"new_game","game":"Devil's Backbone","result":"success","summary":"Built Game 23: Devil's Backbone - hold-to-balance wagon load, spring+damping physics, 5-stage mountain pass, 44 tests pass.","commitHash":"2ae179d"},{"runAt":"2026-05-03T09:00:00.000Z","action":"new_game","game":"Dead Reckoning","result":"success","summary":"Built Game 24: Dead Reckoning - celestial navigation, star bearing lines, 5-round terrain puzzle, 50 tests pass.","commitHash":"d7d6e9f"},{"runAt":"2026-05-03T09:45:00.000Z","action":"new_game","game":"Fence Line","result":"success","summary":"Built Game 25: Fence Line - construction/placement mechanic, wind gusts, cattle gap-seek AI, 5 levels, 42 tests pass.","commitHash":"23c7df0"},{"runAt":"2026-05-03T10:30:00.000Z","action":"new_game","game":"Dust Storm","result":"success","summary":"Built Game 26: Dust Storm - fog-of-war visibility cone, lane-dodge stagecoach, 42 tests pass.","commitHash":"ab93339"},{"runAt":"2026-05-03T11:30:00.000Z","action":"new_game","game":"River Run","result":"success","summary":"Built Game 27: River Run - white-water raft, inertia model, current-reading swirls, 42 tests pass.","commitHash":"2c6b15b"},{"runAt":"2026-05-04T08:30:00.000Z","action":"new_game","game":"Brand Iron","result":"success","summary":"Built Game 28: Brand Iron - path-tracing drag mechanic, heat sweet-zone gauge, 45 tests pass.","commitHash":"4e20960"},{"runAt":"2026-05-04T09:30:00.000Z","action":"new_game","game":"Jail Break","result":"success","summary":"Built Game 29: Jail Break - turn-based stealth escape, vision cones, pick-lock, object-throw, shadow zones, 50 tests pass.","commitHash":"9a691f5"}]};

function timeAgo(iso) {
  if (!iso) return 'never';
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function render(d) {
  const dotClass = d.currentTask ? 'working' : (d.lastRunResult === 'success' ? 'ok' : d.lastRunResult === 'error' ? 'err' : 'idle');
  const statusLabel = d.currentTask ? 'Working' : 'Idle';
  const currentHtml = d.currentTask
    ? `Building Game ${d.gamesBuilt + 1}: ${d.currentTask.context || 'new game'}`
    : 'Waiting for next scheduled run (3 AM nightly)';

  const errors = (d.runLog || []).filter(r => r.result === 'error' || r.result === 'warning').slice(-3);

  const queueHtml = (d.gameQueue || []).map(g => `
    <div class="queue-item${g.status === 'in_progress' ? ' active' : ''}">
      <div class="queue-num">Game ${g.num}</div>
      <div class="queue-title">${g.title}</div>
      <div class="queue-concept">${g.concept}</div>
      <div class="queue-bar">â†‘ ${g.raisesBarOn}</div>
      <span class="queue-status ${g.status}">${g.status.replace('_', ' ')}</span>
    </div>`).join('');

  const logHtml = [...(d.runLog || [])].reverse().slice(0, 20).map(e => `
    <div class="log-entry">
      <span class="log-time">${fmtDate(e.runAt)}</span>
      <span class="log-result ${e.result}">${e.result}</span>
      <span class="log-summary">${e.summary}${e.commitHash ? ' <span style="color:#705848">[' + e.commitHash.slice(0,7) + ']</span>' : ''}</span>
    </div>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="status-row">
      <span class="dot ${dotClass}"></span>
      <span class="status-text">${statusLabel}</span>
      <span class="status-time">Last run: ${timeAgo(d.lastRunAt)}</span>
    </div>
    ${errors.length ? `<div class="error-box">Recent issue: ${errors[errors.length-1].summary}</div>` : ''}
    <div class="games-count">${d.gamesBuilt}</div>
    <div class="games-label">Games built</div>
    <div class="section-head">Current task</div>
    <div class="current-task${d.currentTask ? '' : ' none'}">${currentHtml}</div>
    <div class="section-head">Game queue</div>
    <div class="queue">${queueHtml || '<p style="color:#705848;font-size:13px;font-style:italic">No planned games yet.</p>'}</div>
    <div class="section-head">Run log</div>
    ${logHtml || '<p style="color:#705848;font-size:13px;font-style:italic">No runs recorded yet.</p>'}
  `;
}

render(STATUS);

const FEEDBACK_URL = 'https://script.google.com/macros/s/AKfycbwdJq8jFwM31ZUwkyhRrVVJkk5wf8rOZARAArWFOMfaymVOnNmnmM7fOc_acsiM6dRVSg/exec';

document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('fb-form');

  form.addEventListener('submit', e => {
    e.preventDefault();
    const target  = document.getElementById('fb-target').value.trim() || 'general';

    }).finally(() => {
      statusEl.textContent = 'Sent. Director picks it up on next run.';
      form.reset();
    });
  });
});
