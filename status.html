imultaneous dual-resource drain, first physics-impulse collision response used offensively","status":"planned"}],"runLog":[{"runAt":"2026-05-09T09:15:00.000Z","action":"new_game","game":"Wanted: Reward","result":"success","summary":"Built Game 43: Wanted: Reward - visual search + composite matching, 4-trait crowd silhouettes, economic payout, 35 tests pass.","commitHash":"e3d67a9"},{"runAt":"2026-05-10T09:30:00.000Z","action":"new_game","game":"Trail Blaze","result":"success","summary":"Built Game 44: Trail Blaze - player-drawn pathfinding, 5 terrain types, A* comparison, escalating threats, 35 tests pass.","commitHash":"dfe0a5a"},{"runAt":"2026-05-11T08:00:01Z","action":"new_game","game":"Rattlesnake Round-Up","result":"success","summary":"Built Game 45: Rattlesnake Round-Up - multi-phase hold+drag snake wrangling, thermal scope view, 3 snake tiers, 24 tests pass.","commitHash":"835538c"},{"runAt":"2026-05-11T08:16:33.000Z","action":"new_game","game":"Prairie Telegraph","result":"success","summary":"Built Game 46: Prairie Telegraph - semaphore relay chain, 26-letter visual alphabet, hex direct-selector UI, wind gusts, 25 tests pass.","commitHash":"60391b9"},{"runAt":"2026-05-12T09:30:00Z","action":"new_game","game":"Outlaw Auction","result":"success","summary":"Built Game 47: Outlaw Auction - hidden-value bounty bidding, 5 behavioral AI rivals, bankroll management, 36 tests pass.","commitHash":"ae32b90"},{"runAt":"2026-05-12T10:00:00.000Z","action":"new_game","game":"Hangman's Bluff","result":"success","summary":"Built Game 48: Hangman's Bluff - interrogation deception, lie memory, 3-stage sheriff checkpoint, 37 tests pass.","commitHash":"329cdf0"},{"runAt":"2026-05-13T08:30:00.000Z","action":"new_game","game":"Lariat Spin","result":"success","summary":"Built Game 49: Lariat Spin - rotational rope physics, momentum-accumulation + precision-release, 35 tests pass.","commitHash":"f6562ad"},{"runAt":"2026-05-13T08:45:00.000Z","action":"new_game","game":"Tin Pan Alley","result":"success","summary":"Built Game 50: Tin Pan Alley - melody-completion piano puzzle, musical phrase-memory mechanic, 47 tests pass.","commitHash":"6743ff8"}]};

function timeAgo(iso) {
  if (!iso) return 'never';
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function render(d) {
  const dotClass = d.currentTask ? 'working' : (d.lastRunResult === 'success' ? 'ok' : d.lastRunResult === 'error' ? 'err' : 'idle');
  const statusLabel = d.currentTask ? 'Working' : 'Idle';
  const currentHtml = d.currentTask
    ? `Building Game ${d.gamesBuilt + 1}: ${d.currentTask.context || 'new game'}`
    : 'Waiting for next scheduled run (3 AM nightly)';

  const errors = (d.runLog || []).filter(r => r.result === 'error' || r.result === 'warning').slice(-3);

  const queueHtml = (d.gameQueue || []).map(g => `
    <div class="queue-item${g.status === 'in_progress' ? ' active' : ''}">
      <div class="queue-num">Game ${g.num}</div>
      <div class="queue-title">${g.title}</div>
      <div class="queue-concept">${g.concept}</div>
      <div class="queue-bar">â†‘ ${g.raisesBarOn}</div>
      <span class="queue-status ${g.status}">${g.status.replace('_', ' ')}</span>
    </div>`).join('');

  const logHtml = [...(d.runLog || [])].reverse().slice(0, 20).map(e => `
    <div class="log-entry">
      <span class="log-time">${fmtDate(e.runAt)}</span>
      <span class="log-result ${e.result}">${e.result}</span>
      <span class="log-summary">${e.summary}${e.commitHash ? ' <span style="color:#705848">[' + e.commitHash.slice(0,7) + ']</span>' : ''}</span>
    </div>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="status-row">
      <span class="dot ${dotClass}"></span>
      <span class="status-text">${statusLabel}</span>
      <span class="status-time">Last run: ${timeAgo(d.lastRunAt)}</span>
    </div>
    ${errors.length ? `<div class="error-box">Recent issue: ${errors[errors.length-1].summary}</div>` : ''}
    <div class="games-count">${d.gamesBuilt}</div>
    <div class="games-label">Games built</div>
    <div class="section-head">Current task</div>
    <div class="current-task${d.currentTask ? '' : ' none'}">${currentHtml}</div>
    <div class="section-head">Game queue</div>
    <div class="queue">${queueHtml || '<p style="color:#705848;font-size:13px;font-style:italic">No planned games yet.</p>'}</div>
    <div class="section-head">Run log</div>
    ${logHtml || '<p style="color:#705848;font-size:13px;font-style:italic">No runs recorded yet.</p>'}
  `;
}

render(STATUS);

const FEEDBACK_URL = 'https://script.google.com/macros/s/AKfycbwdJq8jFwM31ZUwkyhRrVVJkk5wf8rOZARAArWFOMfaymVOnNmnmM7fOc_acsiM6dRVSg/exec';

document.addEventListener('DOMContentLoaded', () => {
  const form = document.getElementById('fb-form');

  form.addEventListener('submit', e => {
    e.preventDefault();
    const target  = document.getElementById('fb-target').value.trim() || 'general';

    const fix     = document.getElementById('fb-fix').checked;
    if (!message) { statusEl.textContent = 'Please enter a message.'; return; }
    statusEl.textContent = 'Sendingâ€¦';
    fetch(FEEDBACK_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify({ game: target, message, fixRequested: fix }),
    }).finally(() => {
      statusEl.textContent = 'Sent. Director picks it up on next run.';
      form.reset();
    });
  });
});
