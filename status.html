<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Director Status — Bob Davis Games</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0d0608;
  color: #E8DCC8;
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  padding: 40px 20px 60px;
  max-width: 680px;
  margin: 0 auto;
}

a { color: inherit; text-decoration: none; }

.back {
  display: inline-block;
  font-size: 12px;
  color: #705848;
  letter-spacing: 1px;
  margin-bottom: 36px;
}
.back:hover { color: #907860; }

h1 {
  font-size: 13px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #FFD700;
  margin-bottom: 4px;
}

.subtitle {
  font-size: 11px;
  color: #705848;
  letter-spacing: 2px;
  margin-bottom: 36px;
}

.status-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
  padding: 14px 18px;
  border: 1px solid rgba(255,215,0,0.1);
  border-radius: 8px;
}

.dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot.ok      { background: #4aaa60; box-shadow: 0 0 6px #4aaa60; }
.dot.err     { background: #e05030; box-shadow: 0 0 6px #e05030; }
.dot.idle    { background: #555; }
.dot.working { background: #FFD700; box-shadow: 0 0 6px #FFD700; animation: pulse 1s infinite; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.status-text { font-size: 13px; color: #C8B89A; }
.status-time { font-size: 11px; color: #705848; margin-left: auto; white-space: nowrap; }

.section-head {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #705848;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,215,0,0.08);
}

.current-task {
  padding: 14px 18px;
  border: 1px solid rgba(255,215,0,0.15);
  border-radius: 8px;
  margin-bottom: 32px;
  font-size: 13px;
  color: #C8B89A;
}
.current-task.none { color: #705848; font-style: italic; }

.queue { margin-bottom: 32px; }

.queue-item {
  padding: 14px 18px;
  border: 1px solid rgba(255,215,0,0.08);
  border-radius: 8px;
  margin-bottom: 8px;
}
.queue-item.active {
  border-color: rgba(255,215,0,0.3);
  background: rgba(255,215,0,0.03);
}

.queue-num     { font-size: 10px; color: #705848; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
.queue-title   { font-size: 15px; color: #FFD700; margin-bottom: 5px; }
.queue-concept { font-size: 12px; color: #907860; line-height: 1.5; margin-bottom: 5px; }
.queue-bar     { font-size: 11px; color: #4aaa60; }

.queue-status {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 4px;
  margin-top: 6px;
}
.queue-status.planned     { background: rgba(255,215,0,0.08); color: #907860; }
.queue-status.in_progress { background: rgba(255,215,0,0.18); color: #FFD700; }
.queue-status.done        { background: rgba(74,170,96,0.12); color: #4aaa60; }

.log-entry {
  display: grid;
  grid-template-columns: 150px 60px 1fr;
  gap: 10px;
  align-items: start;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,215,0,0.05);
  font-size: 12px;
}
.log-entry:last-child { border-bottom: none; }
.log-time              { color: #705848; }
.log-result.success    { color: #4aaa60; }
.log-result.warning    { color: #e0a030; }
.log-result.error      { color: #e05030; }
.log-summary           { color: #907860; line-height: 1.5; }

.games-count { font-size: 48px; color: #FFD700; font-weight: bold; letter-spacing: -2px; line-height: 1; }
.games-label { font-size: 11px; color: #705848; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; margin-bottom: 32px; }

.error-box {
  padding: 16px 18px;
  border: 1px solid rgba(224,80,48,0.3);
  border-radius: 8px;
  background: rgba(224,80,48,0.05);
  font-size: 13px;
  color: #e05030;
  margin-bottom: 24px;
}
</style>
</head>
<body>

<a class="back" href="index.html">← bobdavismusic.com</a>

<h1>Game Director</h1>
<p class="subtitle">Autonomous status — updated each session</p>

<div id="app"></div>

<script>
// Status data embedded at build time — no external fetch needed.
// The automated session regenerates this file with updated data after each run.
const STATUS = {"lastRunAt":"2026-04-27T19:23:00Z","lastRunResult":"success","lastRunSummary":"Built Game 07: Tin Star Showdown — quick-draw duel, best-of-3, AI difficulty scaling. 13 Playwright tests pass.","currentTask":null,"gamesBuilt":7,"lastGameTitle":"Tin Star Showdown","lastGameFile":"tin-star-showdown.html","gameQueue":[{"num":8,"title":"Dust Devil","concept":"Physics-based puzzle: steer a tumbleweed through canyon gaps using wind gusts. Tap to puff, chain gusts for momentum. Race the clock.","raisesBarOn":"First physics simulation in the series (real momentum + drag), puzzle design with spatial reasoning — distinctly different from all prior games","status":"planned"},{"num":9,"title":"Wanted Poster","concept":"Memory/deduction game: study a wanted poster, then identify the outlaw in a saloon crowd before time runs out. Procedurally generated faces.","raisesBarOn":"Cognitive mechanic (first non-physical challenge in the series), procedural face generation, crowd NPC behavior","status":"planned"},{"num":10,"title":"Gold Rush","concept":"Resource management + survival: mine for gold in a procedural cave, manage lantern fuel and pickaxe durability, escape before the tunnel collapses.","raisesBarOn":"First inventory/resource system, procedural dungeon generation, dual resource timers creating layered urgency","status":"planned"}],"runLog":[{"runAt":"2026-04-27T18:27:45Z","action":"new_game","game":"Cattle Drive","result":"success","summary":"Built Game 06: Cattle Drive (cattle-drive.html). Flocking AI, wolf predators, 13 tests pass.","commitHash":"582b596"},{"runAt":"2026-04-27T19:23:00Z","action":"new_game","game":"Tin Star Showdown","result":"success","summary":"Built Game 07: Tin Star Showdown (tin-star-showdown.html). Quick-draw duel, best-of-3, AI difficulty scaling, 13 tests pass.","commitHash":"b3329ab"}]};

function timeAgo(iso) {
  if (!iso) return 'never';
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function render(d) {
  const dotClass = d.currentTask ? 'working' : (d.lastRunResult === 'success' ? 'ok' : d.lastRunResult === 'error' ? 'err' : 'idle');
  const statusLabel = d.currentTask ? 'Working' : 'Idle';
  const currentHtml = d.currentTask
    ? `Building Game ${d.gamesBuilt + 1}: ${d.currentTask.context || 'new game'}`
    : 'Waiting for next scheduled run (3 AM nightly)';

  const errors = (d.runLog || []).filter(r => r.result === 'error' || r.result === 'warning').slice(-3);

  const queueHtml = (d.gameQueue || []).map(g => `
    <div class="queue-item${g.status === 'in_progress' ? ' active' : ''}">
      <div class="queue-num">Game ${g.num}</div>
      <div class="queue-title">${g.title}</div>
      <div class="queue-concept">${g.concept}</div>
      <div class="queue-bar">↑ ${g.raisesBarOn}</div>
      <span class="queue-status ${g.status}">${g.status.replace('_', ' ')}</span>
    </div>`).join('');

  const logHtml = [...(d.runLog || [])].reverse().slice(0, 20).map(e => `
    <div class="log-entry">
      <span class="log-time">${fmtDate(e.runAt)}</span>
      <span class="log-result ${e.result}">${e.result}</span>
      <span class="log-summary">${e.summary}${e.commitHash ? ' <span style="color:#705848">[' + e.commitHash.slice(0,7) + ']</span>' : ''}</span>
    </div>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="status-row">
      <span class="dot ${dotClass}"></span>
      <span class="status-text">${statusLabel}</span>
      <span class="status-time">Last run: ${timeAgo(d.lastRunAt)}</span>
    </div>
    ${errors.length ? `<div class="error-box">Recent issue: ${errors[errors.length-1].summary}</div>` : ''}
    <div class="games-count">${d.gamesBuilt}</div>
    <div class="games-label">Games built</div>
    <div class="section-head">Current task</div>
    <div class="current-task${d.currentTask ? '' : ' none'}">${currentHtml}</div>
    <div class="section-head">Game queue</div>
    <div class="queue">${queueHtml || '<p style="color:#705848;font-size:13px;font-style:italic">No planned games yet.</p>'}</div>
    <div class="section-head">Run log</div>
    ${logHtml || '<p style="color:#705848;font-size:13px;font-style:italic">No runs recorded yet.</p>'}
  `;
}

render(STATUS);
</script>
</body>
</html>
