<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Director Status — Bob Davis</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0d0608;
  color: #E8DCC8;
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  padding: 40px 20px 60px;
  max-width: 680px;
  margin: 0 auto;
}

a { color: inherit; text-decoration: none; }

.back {
  display: inline-block;
  font-size: 12px;
  color: #705848;
  letter-spacing: 1px;
  margin-bottom: 36px;
}
.back:hover { color: #907860; }

h1 {
  font-size: 13px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #FFD700;
  margin-bottom: 4px;
}

.subtitle {
  font-size: 11px;
  color: #705848;
  letter-spacing: 2px;
  margin-bottom: 36px;
}

.status-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
  padding: 14px 18px;
  border: 1px solid rgba(255,215,0,0.1);
  border-radius: 8px;
}

.dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot.ok      { background: #4aaa60; box-shadow: 0 0 6px #4aaa60; }
.dot.err     { background: #e05030; box-shadow: 0 0 6px #e05030; }
.dot.idle    { background: #555; }
.dot.working { background: #FFD700; box-shadow: 0 0 6px #FFD700; animation: pulse 1s infinite; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.status-text { font-size: 13px; color: #C8B89A; }
.status-time { font-size: 11px; color: #705848; margin-left: auto; white-space: nowrap; }

.section-head {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #705848;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,215,0,0.08);
}

.current-task {
  padding: 14px 18px;
  border: 1px solid rgba(255,215,0,0.15);
  border-radius: 8px;
  margin-bottom: 32px;
  font-size: 13px;
  color: #C8B89A;
}
.current-task.none { color: #705848; font-style: italic; }

.queue { margin-bottom: 32px; }

.queue-item {
  padding: 14px 18px;
  border: 1px solid rgba(255,215,0,0.08);
  border-radius: 8px;
  margin-bottom: 8px;
}
.queue-item.active {
  border-color: rgba(255,215,0,0.3);
  background: rgba(255,215,0,0.03);
}

.queue-num     { font-size: 10px; color: #705848; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
.queue-title   { font-size: 15px; color: #FFD700; margin-bottom: 5px; }
.queue-concept { font-size: 12px; color: #907860; line-height: 1.5; margin-bottom: 5px; }
.queue-bar     { font-size: 11px; color: #4aaa60; }

.queue-status {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 4px;
  margin-top: 6px;
}
.queue-status.planned     { background: rgba(255,215,0,0.08); color: #907860; }
.queue-status.in_progress { background: rgba(255,215,0,0.18); color: #FFD700; }
.queue-status.done        { background: rgba(74,170,96,0.12); color: #4aaa60; }

.log-entry {
  display: grid;
  grid-template-columns: 150px 60px 1fr;
  gap: 10px;
  align-items: start;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,215,0,0.05);
  font-size: 12px;
}
.log-entry:last-child { border-bottom: none; }
.log-time              { color: #705848; }
.log-result.success    { color: #4aaa60; }
.log-result.warning    { color: #e0a030; }
.log-result.error      { color: #e05030; }
.log-summary           { color: #907860; line-height: 1.5; }

.counter-value { font-size: 48px; color: #FFD700; font-weight: bold; letter-spacing: -2px; line-height: 1; }
.counter-label { font-size: 11px; color: #705848; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; margin-bottom: 32px; }

.project-badge {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #705848;
  border: 1px solid rgba(255,215,0,0.1);
  border-radius: 4px;
  padding: 2px 8px;
  margin-bottom: 16px;
}

.error-box {
  padding: 16px 18px;
  border: 1px solid rgba(224,80,48,0.3);
  border-radius: 8px;
  background: rgba(224,80,48,0.05);
  font-size: 13px;
  color: #e05030;
  margin-bottom: 24px;
}
</style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-X1W0TNHM51"></script>

  window.dataLayer = window.dataLayer || [];

<body>

<a class="back" href="index.html">← bobdavismusic.com</a>

<h1>Director Status</h1>
<p class="subtitle">Autonomous — updated each session</p>

<div id="app"></div>

<script>
// Status data embedded at build time — no external fetch needed.
// The automated session regenerates this file with updated data after each run.
const STATUS = {"project":"bob-davis-music","projectLabel":"Games","currentTask":null,"lastRunSummary":"Built Game 62: Texas Twister - vortex physics tornado survival, drag-to-carry under live hazards, 47 tests pass.","lastRunAt":"2026-05-20T10:30:00.000Z","lastRunResult":"success","counter":{"value":62,"label":"Games Built"},"taskQueue":[{"num":63,"title":"Iron Horse","concept":"Steam locomotive driving puzzle. Manage boiler pressure by shoveling coal on the beat grid while the train accelerates through 5 stations.","raisesBarOn":"First steam locomotive simulation, first beat-grid resource management.","status":"planned"},{"num":64,"title":"Bounty Board","concept":"Strategic card-drafting western. Spend your limited posse to claim wanted posters before a rival marshal AI.","raisesBarOn":"First card-drafting mechanic, first multi-unit assignment puzzle.","status":"planned"},{"num":65,"title":"Quicksand","concept":"Timed physics rescue puzzle. Form a rope-pulley system to pull a wagon from quicksand before it sinks.","raisesBarOn":"First rope-as-tool physics puzzle, first mechanical advantage simulation.","status":"planned"}],"runLog":[{"runAt":"2026-05-20T10:30:00.000Z","action":"new_game","result":"success","summary":"Built Game 62: Texas Twister - vortex physics, 47 tests pass.","commitHash":"ad1169e"},{"runAt":"2026-05-20T10:00:00.000Z","action":"new_game","result":"success","summary":"Built Game 61: Snake Eyes - Liar's Dice probability duel, 51 tests pass.","commitHash":"e74a1c1"},{"runAt":"2026-05-19T10:00:00.000Z","action":"new_game","result":"success","summary":"Built Game 60: Night Herd - isometric stealth defense, 50 tests pass.","commitHash":"4cafe15"}]};

function timeAgo(iso) {
  if (!iso) return 'never';
  const m = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (m < 1)  return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function render(d) {
  const dotClass    = d.currentTask ? 'working' : (d.lastRunResult === 'success' ? 'ok' : d.lastRunResult === 'error' ? 'err' : 'idle');
  const statusLabel = d.currentTask ? 'Working' : 'Idle';
  const currentHtml = d.currentTask
    ? (d.currentTask.context || d.currentTask.name || 'Working...')
    : 'Waiting for next scheduled run (3 AM nightly)';

  const errors = (d.runLog || []).filter(r => r.result === 'error' || r.result === 'warning').slice(-3);

  const queueHtml = (d.taskQueue || []).map(t => `
    <div class="queue-item${t.status === 'in_progress' ? ' active' : ''}">
      <div class="queue-num">${d.projectLabel || 'Task'} ${t.num}</div>
      <div class="queue-title">${t.title}</div>
      ${t.concept     ? `<div class="queue-concept">${t.concept}</div>` : ''}
      ${t.description ? `<div class="queue-concept">${t.description}</div>` : ''}
      ${t.raisesBarOn ? `<div class="queue-bar">→ ${t.raisesBarOn}</div>` : ''}
      <span class="queue-status ${t.status || 'planned'}">${(t.status || 'planned').replace('_', ' ')}</span>
    </div>`).join('');

  const logHtml = [...(d.runLog || [])].reverse().slice(0, 20).map(e => `
    <div class="log-entry">
      <span class="log-time">${fmtDate(e.runAt || e.completedAt)}</span>
      <span class="log-result ${e.result}">${e.result || ''}</span>
      <span class="log-summary">${e.summary || e.lastRunSummary || ''}${e.commitHash ? ' <span style="color:#705848">[' + e.commitHash.slice(0,7) + ']</span>' : ''}</span>
    </div>`).join('');

  const counterHtml = d.counter
    ? `<div class="counter-value">${d.counter.value}</div><div class="counter-label">${d.counter.label}</div>`
    : '';

  document.getElementById('app').innerHTML = `
    ${d.projectLabel ? `<div class="project-badge">${d.projectLabel}</div>` : ''}
    <div class="status-row">
      <span class="dot ${dotClass}"></span>
      <span class="status-text">${statusLabel}</span>
      <span class="status-time">Last run: ${timeAgo(d.lastRunAt)}</span>
    </div>
    ${errors.length ? `<div class="error-box">Recent issue: ${errors[errors.length-1].summary}</div>` : ''}
    ${counterHtml}
    <div class="section-head">Current task</div>
    <div class="current-task${d.currentTask ? '' : ' none'}">${currentHtml}</div>
    <div class="section-head">Up next</div>
    <div class="queue">${queueHtml || '<p style="color:#705848;font-size:13px;font-style:italic">Nothing queued.</p>'}</div>
    <div class="section-head">Run log</div>
    ${logHtml || '<p style="color:#705848;font-size:13px;font-style:italic">No runs recorded yet.</p>'}
  `;
}

render(STATUS);
</script>

</body>
</html>
