<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Director Status — Bob Davis Games</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0d0608;
  color: #E8DCC8;
  font-family: 'Courier New', monospace;
  min-height: 100vh;
  padding: 40px 20px 60px;
  max-width: 680px;
  margin: 0 auto;
}

a { color: inherit; text-decoration: none; }

.back {
  display: inline-block;
  font-size: 12px;
  color: #443328;
  letter-spacing: 1px;
  margin-bottom: 36px;
}
.back:hover { color: #907860; }

h1 {
  font-size: 13px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #FFD700;
  margin-bottom: 4px;
}

.subtitle {
  font-size: 11px;
  color: #443328;
  letter-spacing: 2px;
  margin-bottom: 36px;
}

/* ── Status row ── */
.status-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 32px;
  padding: 14px 18px;
  border: 1px solid rgba(255,215,0,0.1);
  border-radius: 8px;
}

.dot {
  width: 9px; height: 9px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot.ok  { background: #4aaa60; box-shadow: 0 0 6px #4aaa60; }
.dot.err { background: #e05030; box-shadow: 0 0 6px #e05030; }
.dot.idle { background: #555; }
.dot.working { background: #FFD700; box-shadow: 0 0 6px #FFD700; animation: pulse 1s infinite; }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.status-text { font-size: 13px; color: #C8B89A; }
.status-time { font-size: 11px; color: #443328; margin-left: auto; }

/* ── Section headings ── */
.section-head {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #443328;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,215,0,0.08);
}

/* ── Current task ── */
.current-task {
  padding: 14px 18px;
  border: 1px solid rgba(255,215,0,0.15);
  border-radius: 8px;
  margin-bottom: 32px;
  font-size: 13px;
  color: #C8B89A;
}
.current-task.none { color: #443328; font-style: italic; }

/* ── Queue ── */
.queue { margin-bottom: 32px; }

.queue-item {
  padding: 14px 18px;
  border: 1px solid rgba(255,215,0,0.08);
  border-radius: 8px;
  margin-bottom: 8px;
}
.queue-item.active {
  border-color: rgba(255,215,0,0.3);
  background: rgba(255,215,0,0.03);
}

.queue-num { font-size: 10px; color: #443328; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
.queue-title { font-size: 15px; color: #FFD700; margin-bottom: 5px; }
.queue-concept { font-size: 12px; color: #705848; line-height: 1.5; margin-bottom: 5px; }
.queue-bar { font-size: 11px; color: #4aaa60; }
.queue-status {
  display: inline-block;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 2px 8px;
  border-radius: 4px;
  margin-top: 6px;
}
.queue-status.planned { background: rgba(255,215,0,0.08); color: #907860; }
.queue-status.in_progress { background: rgba(255,215,0,0.18); color: #FFD700; }
.queue-status.done { background: rgba(74,170,96,0.12); color: #4aaa60; }

/* ── Run log ── */
.log-entry {
  display: grid;
  grid-template-columns: 140px 60px 1fr;
  gap: 10px;
  align-items: start;
  padding: 10px 0;
  border-bottom: 1px solid rgba(255,215,0,0.05);
  font-size: 12px;
}
.log-entry:last-child { border-bottom: none; }
.log-time { color: #443328; }
.log-result { }
.log-result.success { color: #4aaa60; }
.log-result.warning { color: #e0a030; }
.log-result.error   { color: #e05030; }
.log-summary { color: #907860; line-height: 1.5; }

/* ── Games built ── */
.games-count {
  font-size: 48px;
  color: #FFD700;
  font-weight: bold;
  letter-spacing: -2px;
  line-height: 1;
}
.games-label { font-size: 11px; color: #443328; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; margin-bottom: 32px; }

.error-box {
  padding: 16px 18px;
  border: 1px solid rgba(224,80,48,0.3);
  border-radius: 8px;
  background: rgba(224,80,48,0.05);
  font-size: 13px;
  color: #e05030;
  margin-bottom: 24px;
}
</style>
</head>
<body>

<a class="back" href="index.html">← bobdavismusic.com</a>

<h1>Game Director</h1>
<p class="subtitle">Autonomous status — last updated each session</p>

<div id="app"><p style="color:#443328;font-size:13px">Loading status…</p></div>

<script>
const STATUS_URL = 'autonomous/status.json';

function timeAgo(isoStr) {
  if (!isoStr) return 'never';
  const diff = Date.now() - new Date(isoStr).getTime();
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

function fmtDate(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function statusDot(result) {
  if (!result) return '<span class="dot idle"></span>';
  if (result === 'success') return '<span class="dot ok"></span>';
  if (result === 'working') return '<span class="dot working"></span>';
  return '<span class="dot err"></span>';
}

function renderQueue(queue) {
  if (!queue || !queue.length) return '<p style="color:#443328;font-size:13px;font-style:italic">No planned games yet.</p>';
  return queue.map(g => `
    <div class="queue-item${g.status === 'in_progress' ? ' active' : ''}">
      <div class="queue-num">Game ${g.num}</div>
      <div class="queue-title">${g.title}</div>
      <div class="queue-concept">${g.concept}</div>
      <div class="queue-bar">↑ ${g.raisesBarOn}</div>
      <span class="queue-status ${g.status}">${g.status.replace('_', ' ')}</span>
    </div>
  `).join('');
}

function renderLog(log) {
  if (!log || !log.length) return '<p style="color:#443328;font-size:13px;font-style:italic">No runs recorded yet.</p>';
  return [...log].reverse().slice(0, 20).map(e => `
    <div class="log-entry">
      <span class="log-time">${fmtDate(e.runAt)}</span>
      <span class="log-result ${e.result}">${e.result}</span>
      <span class="log-summary">${e.summary}${e.commitHash ? ' <span style="color:#443328">[' + e.commitHash.slice(0,7) + ']</span>' : ''}</span>
    </div>
  `).join('');
}

async function load() {
  const app = document.getElementById('app');
  try {
    const res = await fetch(STATUS_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const d = await res.json();

    const dotHtml = statusDot(d.currentTask ? 'working' : d.lastRunResult);
    const currentLabel = d.currentTask
      ? `Building Game ${d.gamesBuilt + 1}: <strong>${d.currentTask.context || 'new game'}</strong>`
      : 'Idle — waiting for next scheduled run';

    const errors = d.runLog
      ? d.runLog.filter(r => r.result === 'error' || r.result === 'warning').slice(-3)
      : [];

    app.innerHTML = `
      <div class="status-row">
        ${dotHtml}
        <span class="status-text">${d.currentTask ? 'Working' : 'Idle'}</span>
        <span class="status-time">Last run: ${timeAgo(d.lastRunAt)}</span>
      </div>

      ${errors.length ? `<div class="error-box">⚠ Recent issue: ${errors[errors.length-1].summary}</div>` : ''}

      <div class="games-count">${d.gamesBuilt}</div>
      <div class="games-label">Games built</div>

      <div class="section-head">Current task</div>
      <div class="current-task${d.currentTask ? '' : ' none'}">${currentLabel}</div>

      <div class="section-head">Game queue</div>
      <div class="queue">${renderQueue(d.gameQueue)}</div>

      <div class="section-head">Run log</div>
      ${renderLog(d.runLog)}
    `;
  } catch(e) {
    app.innerHTML = `<div class="error-box">Could not load status.json: ${e.message}</div>`;
  }
}

load();
</script>
</body>
</html>
