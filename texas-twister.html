<script>
'use strict';

const FEEDBACK_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwdJq8jFwM31ZUwkyhRrVVJkk5wf8rOZARAArWFOMfaymVOnNmnmM7fOc_acsiM6dRVSg/exec';
const MUSIC_SRC = '';

const W = 360, H = 640;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  canvas.width = W; canvas.height = H;
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
resize();
window.addEventListener('resize', resize);

// --- Audio ---
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
function playTone(freq, dur, type = 'sine', vol = 0.18) {
  try {
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch(e) {}
}

// Wind howl: sawtooth oscillator with LFO on frequency
let windNode = null, windGain = null;
function startWind(intensity) {
  try {
    ensureAudio();
    if (windNode) { try { windNode.stop(); } catch(e) {} }
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.value = 0.4 + intensity * 0.3;
    lfoGain.gain.value = 30 + intensity * 40;
    lfo.connect(lfoGain);

    windNode = audioCtx.createOscillator();
    windNode.type = 'sawtooth';
    windNode.frequency.value = 80 + intensity * 60;
    lfoGain.connect(windNode.frequency);

    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 600;
    filter.Q.value = 0.5;

    windGain = audioCtx.createGain();
    windGain.gain.value = 0;

    windNode.connect(filter);
    filter.connect(windGain);
    windGain.connect(audioCtx.destination);
    lfo.start(); windNode.start();
    windGain.gain.setTargetAtTime(0.06 + intensity * 0.08, audioCtx.currentTime, 0.5);
  } catch(e) {}
}
function stopWind() {
  try {
    if (windGain) windGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.3);
    setTimeout(() => { try { if (windNode) windNode.stop(); } catch(e) {} windNode = null; }, 500);
  } catch(e) {}
}
function playThud() {
  try {
    ensureAudio();
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = 80;
    o.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.15);
    g.gain.setValueAtTime(0.4, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.15);
  } catch(e) {}
}
function playKnock() {
  // noise burst for debris hit
  try {
    ensureAudio();
    const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.08, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length);
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const f = audioCtx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 800; f.Q.value = 2;
    const g = audioCtx.createGain(); g.gain.value = 0.35;
    src.connect(f); f.connect(g); g.connect(audioCtx.destination);
    src.start();
  } catch(e) {}
}
function playSave() {
  [440, 554, 659].forEach((f, i) => setTimeout(() => playTone(f, 0.15, 'triangle', 0.15), i * 60));
}
function playWin() {
  [330, 392, 494, 659, 784].forEach((f, i) => setTimeout(() => playTone(f, 0.3, 'triangle', 0.14), i * 80));
}
function playLose() {
  [330, 277, 220, 185].forEach((f, i) => setTimeout(() => playTone(f, 0.3, 'sawtooth', 0.12), i * 100));
}

// --- Music ---
let musicEl = null, musicOn = false;
if (MUSIC_SRC) {
  musicEl = new Audio(MUSIC_SRC);
  musicEl.loop = true; musicEl.volume = 0.35;
}
function toggleMusic() {
  if (!musicEl) return;
  musicOn = !musicOn;
  musicOn ? musicEl.play() : musicEl.pause();
}

// --- Constants ---
const VORTEX_CX = 180;
const VORTEX_CY = 180;
const CELLAR = { x: 55, y: 560, w: 90, h: 50 };
const CELLAR_GLOW_R = 60;
const ITEM_HIT_R = 22;
const DEBRIS_HIT_R = 16;
const GRAB_R = 36;
const SPRING = 9;
const SUCTION_BASE = 28;
const MIN_DEBRIS_R = 55;
const OMEGA_BASE = 0.75;

const ITEM_TYPES = [
  { name: 'Water Barrel', color: '#7a4e2a', highlight: '#c8914a', shape: 'barrel' },
  { name: 'Medicine Box', color: '#b8943a', highlight: '#ffe066', shape: 'box' },
  { name: 'Saddlebag',    color: '#9a6b3a', highlight: '#d4a060', shape: 'bag' },
  { name: 'Lantern',      color: '#cc8c20', highlight: '#ffe566', shape: 'lantern' },
  { name: 'Bedroll',      color: '#8a6048', highlight: '#c4966a', shape: 'roll' },
];

const ROUNDS = [
  { itemCount: 3, needSaved: 2, debrisCount: 3, suckMult: 0.7, timer: 45, omegaFactor: 1.0, label: 'Category 1' },
  { itemCount: 3, needSaved: 2, debrisCount: 4, suckMult: 0.9, timer: 40, omegaFactor: 1.25, label: 'Category 2' },
  { itemCount: 4, needSaved: 3, debrisCount: 5, suckMult: 1.2, timer: 38, omegaFactor: 1.55, label: 'Category 3' },
  { itemCount: 4, needSaved: 3, debrisCount: 6, suckMult: 1.4, timer: 35, omegaFactor: 1.85, label: 'Category 4' },
  { itemCount: 5, needSaved: 4, debrisCount: 7, suckMult: 1.7, timer: 32, omegaFactor: 2.2,  label: 'Category 5' },
];

// --- Game state ---
let state = 'title';
let score = 0, roundIdx = 0, timeLeft = 0;
let items = [], debris = [], popups = [];
let heldIdx = -1, gripX = 0, gripY = 0;
let funnelRot = 0, vortexPulse = 0;
let best = parseInt(localStorage.getItem('texas_twister_best') || '0');
let feedbackOpen = false, fbRating = 0, fbText = '';
let roundResult = ''; // 'pass' | 'fail'
let savedCount = 0, lostCount = 0;
let roundEndTimer = 0;
let touchActive = false;

function startGame() {
  score = 0;
  roundIdx = 0;
  popups = [];
  state = 'playing';
  startRound();
}

function startRound() {
  const cfg = ROUNDS[roundIdx];
  timeLeft = cfg.timer;
  heldIdx = -1;
  items = [];
  debris = [];
  savedCount = 0;
  lostCount = 0;

  // Place items scattered in the yard (away from cellar and vortex tip)
  const typeIndices = shuffle([0, 1, 2, 3, 4]).slice(0, cfg.itemCount);
  typeIndices.forEach((ti, i) => {
    // Spread from x=90 to x=280, y=340 to y=490
    const angle = (i / cfg.itemCount) * Math.PI * 1.6 + 0.2;
    const rr = 90 + Math.random() * 70;
    items.push({
      x: clamp(VORTEX_CX + Math.cos(angle) * rr, 90, 270),
      y: clamp(VORTEX_CY + 160 + Math.sin(angle) * 60 + i * 28, 350, 490),
      vx: 0, vy: 0,
      type: ti,
      saved: false,
      lost: false,
      held: false,
      wobble: 0,
      alpha: 1,
    });
  });

  // Create orbiting debris
  for (let i = 0; i < cfg.debrisCount; i++) {
    const r = MIN_DEBRIS_R + 80 + Math.random() * 160;
    debris.push({
      r,
      theta: (i / cfg.debrisCount) * Math.PI * 2 + Math.random() * 0.5,
      x: 0, y: 0,
      shape: ['plank', 'barrel', 'tumbleweed'][i % 3],
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 4,
      len: 28 + Math.random() * 20,
    });
  }

  startWind(cfg.omegaFactor / 2.2);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// --- Draw helpers ---
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}
function pill(x, y, w, h, fill, stroke) {
  ctx.save();
  roundRect(x, y, w, h, h / 2);
  ctx.fillStyle = fill; ctx.fill();
  if (stroke) { ctx.strokeStyle = stroke; ctx.lineWidth = 1.5; ctx.stroke(); }
  ctx.restore();
}

function drawItem(it) {
  if (it.saved || it.lost) return;
  const t = ITEM_TYPES[it.type];
  ctx.save();
  ctx.globalAlpha = it.alpha;
  ctx.translate(it.x, it.y);
  if (it.held) {
    ctx.shadowColor = '#FFE066';
    ctx.shadowBlur = 14;
  }
  switch (t.shape) {
    case 'barrel': {
      ctx.fillStyle = t.color;
      ctx.beginPath();
      ctx.ellipse(0, 0, 12, 20, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#3a1f05'; ctx.lineWidth = 2;
      [-10, 0, 10].forEach(dy => {
        ctx.beginPath(); ctx.ellipse(0, dy, 12, 3.5, 0, 0, Math.PI * 2); ctx.stroke();
      });
      ctx.strokeStyle = t.highlight; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.ellipse(-4, -8, 4, 6, -0.3, 0, Math.PI * 2); ctx.stroke();
      break;
    }
    case 'box': {
      ctx.fillStyle = t.color;
      roundRect(-14, -14, 28, 28, 3); ctx.fill();
      ctx.strokeStyle = '#3a1f05'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.fillStyle = '#E74C3C';
      ctx.fillRect(-3, -11, 6, 22);
      ctx.fillRect(-11, -3, 22, 6);
      ctx.fillStyle = t.highlight; ctx.font = '7px Georgia';
      ctx.textAlign = 'center'; ctx.fillText('MED', 0, 17);
      break;
    }
    case 'bag': {
      ctx.fillStyle = t.color;
      roundRect(-16, -10, 32, 20, 5); ctx.fill();
      ctx.strokeStyle = '#3a1f05'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.strokeStyle = t.highlight; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(-8, -10); ctx.lineTo(-8, 10); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(8, -10); ctx.lineTo(8, 10); ctx.stroke();
      ctx.fillStyle = '#3a1f05';
      ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
      break;
    }
    case 'lantern': {
      // Hexagonal lantern
      ctx.fillStyle = '#2a1500';
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2 - Math.PI / 6;
        i === 0 ? ctx.moveTo(Math.cos(a) * 13, Math.sin(a) * 16)
                : ctx.lineTo(Math.cos(a) * 13, Math.sin(a) * 16);
      }
      ctx.closePath(); ctx.fill();
      ctx.strokeStyle = t.color; ctx.lineWidth = 2; ctx.stroke();
      // Flame glow
      ctx.fillStyle = t.highlight;
      ctx.globalAlpha = it.alpha * (0.6 + Math.sin(Date.now() / 150) * 0.4);
      ctx.beginPath(); ctx.ellipse(0, 0, 5, 7, 0, 0, Math.PI * 2); ctx.fill();
      ctx.globalAlpha = it.alpha;
      break;
    }
    case 'roll': {
      ctx.fillStyle = t.color;
      ctx.beginPath();
      ctx.ellipse(0, 0, 18, 11, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#3a1f05'; ctx.lineWidth = 1.5; ctx.stroke();
      ctx.strokeStyle = t.highlight; ctx.lineWidth = 1;
      [-6, 0, 6].forEach(dx => {
        ctx.beginPath(); ctx.moveTo(dx, -11); ctx.lineTo(dx, 11); ctx.stroke();
      });
      // Ends
      ctx.fillStyle = '#c4966a';
      ctx.beginPath(); ctx.ellipse(-18, 0, 4, 11, 0, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(18, 0, 4, 11, 0, 0, Math.PI * 2); ctx.fill();
      break;
    }
  }
  // Label
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#FFE066'; ctx.font = 'bold 9px Georgia, serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(t.name.split(' ')[0], 0, 28);
  ctx.restore();
}

function drawDebris(d) {
  ctx.save();
  ctx.translate(d.x, d.y);
  ctx.rotate(d.rot);
  ctx.globalAlpha = 0.82;
  switch (d.shape) {
    case 'plank':
      ctx.fillStyle = '#5a3a1a';
      ctx.fillRect(-d.len / 2, -4, d.len, 8);
      ctx.strokeStyle = '#8a6a4a'; ctx.lineWidth = 1;
      ctx.strokeRect(-d.len / 2, -4, d.len, 8);
      // Wood grain
      ctx.strokeStyle = '#3a2a0a'; ctx.lineWidth = 0.5;
      [-d.len * 0.3, 0, d.len * 0.3].forEach(x => {
        ctx.beginPath(); ctx.moveTo(x, -4); ctx.lineTo(x + 4, 4); ctx.stroke();
      });
      break;
    case 'barrel':
      ctx.fillStyle = '#6a3a1a';
      ctx.beginPath(); ctx.ellipse(0, 0, 9, 14, 0, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = '#3a1500'; ctx.lineWidth = 1.5;
      [-6, 0, 6].forEach(dy => {
        ctx.beginPath(); ctx.ellipse(0, dy, 9, 2.5, 0, 0, Math.PI * 2); ctx.stroke();
      });
      break;
    case 'tumbleweed':
      ctx.strokeStyle = '#8a7050'; ctx.lineWidth = 1.5;
      for (let i = 0; i < 8; i++) {
        const a = (i / 8) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(
          Math.cos(a + 0.4) * 12, Math.sin(a + 0.4) * 12,
          Math.cos(a) * 18, Math.sin(a) * 18
        );
        ctx.stroke();
      }
      ctx.fillStyle = '#8a7050';
      ctx.beginPath(); ctx.arc(0, 0, 4, 0, Math.PI * 2); ctx.fill();
      break;
  }
  ctx.restore();
}

function drawTornado() {
  ctx.save();
  // Draw funnel from top-center down to vortex center
  const tipX = VORTEX_CX, tipY = VORTEX_CY;
  const topW = 110; // funnel mouth width at y=0

  // Outer funnel silhouette
  ctx.beginPath();
  ctx.moveTo(tipX - topW / 2, 0);
  ctx.quadraticCurveTo(tipX - topW * 0.6, tipY * 0.5, tipX - 18, tipY);
  ctx.lineTo(tipX + 18, tipY);
  ctx.quadraticCurveTo(tipX + topW * 0.6, tipY * 0.5, tipX + topW / 2, 0);
  ctx.closePath();
  const grad = ctx.createLinearGradient(tipX, 0, tipX, tipY);
  grad.addColorStop(0, 'rgba(50,30,60,0.85)');
  grad.addColorStop(0.6, 'rgba(35,20,45,0.7)');
  grad.addColorStop(1, 'rgba(20,10,30,0.4)');
  ctx.fillStyle = grad;
  ctx.fill();

  // Rotating spiral bands inside funnel
  ctx.save();
  ctx.clip();
  funnelRot += 0.018;
  for (let i = 0; i < 5; i++) {
    const t = (i / 5 + funnelRot) % 1;
    const bandY = t * tipY;
    const halfW = (topW / 2) * (1 - bandY / tipY) + 18 * (bandY / tipY);
    ctx.strokeStyle = `rgba(80,50,100,${0.4 - t * 0.3})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(tipX - halfW, bandY);
    ctx.bezierCurveTo(
      tipX - halfW * 0.3, bandY + 8,
      tipX + halfW * 0.3, bandY - 8,
      tipX + halfW, bandY
    );
    ctx.stroke();
  }
  ctx.restore();

  // Vortex glow at tip
  vortexPulse = (vortexPulse + 0.04) % (Math.PI * 2);
  const glowR = 28 + Math.sin(vortexPulse) * 6;
  const glow = ctx.createRadialGradient(tipX, tipY, 0, tipX, tipY, glowR);
  glow.addColorStop(0, 'rgba(150,80,200,0.5)');
  glow.addColorStop(1, 'rgba(80,30,120,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(tipX, tipY, glowR, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawBackground() {
  ctx.save();
  // Sky gradient — stormy
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#0d0520');
  sky.addColorStop(0.4, '#1a1030');
  sky.addColorStop(0.7, '#2a1500');
  sky.addColorStop(1, '#1a0a00');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // Ground plane at y=510 with earth texture
  ctx.fillStyle = '#1a0a00';
  ctx.fillRect(0, 510, W, H - 510);
  ctx.fillStyle = '#2a1200';
  ctx.fillRect(0, 510, W, 3);

  // Distant homestead silhouettes (farmhouse shape)
  ctx.fillStyle = '#0d0800';
  // House shape right
  ctx.beginPath();
  ctx.moveTo(240, 510); ctx.lineTo(240, 470); ctx.lineTo(270, 450);
  ctx.lineTo(300, 470); ctx.lineTo(300, 510); ctx.closePath(); ctx.fill();
  // Barn shape
  ctx.beginPath();
  ctx.moveTo(290, 510); ctx.lineTo(290, 460); ctx.lineTo(310, 445);
  ctx.lineTo(330, 460); ctx.lineTo(330, 510); ctx.closePath(); ctx.fill();
  // Fence posts
  ctx.fillStyle = '#150800';
  for (let x = 80; x < W; x += 22) {
    ctx.fillRect(x, 504, 3, 12);
    if (x + 22 < W) ctx.fillRect(x + 3, 507, 19, 2);
  }

  ctx.restore();
}

function drawCellar(near) {
  ctx.save();
  const cx = CELLAR.x, cy = CELLAR.y;
  const hw = CELLAR.w / 2, hh = CELLAR.h / 2;

  // Foundation
  ctx.fillStyle = '#2a1500';
  roundRect(cx - hw - 4, cy - hh - 4, CELLAR.w + 8, CELLAR.h + 8, 4);
  ctx.fill();

  // Door panels (two angled cellar doors)
  if (near) {
    ctx.shadowColor = '#4aff7a';
    ctx.shadowBlur = 20;
  }
  ctx.fillStyle = near ? '#1a3520' : '#1a1000';
  // Left panel
  ctx.beginPath();
  ctx.moveTo(cx - hw, cy - hh); ctx.lineTo(cx - 2, cy - hh + 8);
  ctx.lineTo(cx - 2, cy + hh); ctx.lineTo(cx - hw, cy + hh); ctx.closePath(); ctx.fill();
  // Right panel
  ctx.beginPath();
  ctx.moveTo(cx + hw, cy - hh); ctx.lineTo(cx + 2, cy - hh + 8);
  ctx.lineTo(cx + 2, cy + hh); ctx.lineTo(cx + hw, cy + hh); ctx.closePath(); ctx.fill();

  ctx.strokeStyle = near ? '#4aff7a' : '#5a3a1a';
  ctx.lineWidth = 2;
  ctx.strokeRect(cx - hw, cy - hh, CELLAR.w, CELLAR.h);
  // Handle
  ctx.fillStyle = near ? '#4aff7a' : '#8a6a2a';
  ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI * 2); ctx.fill();

  ctx.shadowBlur = 0;
  ctx.fillStyle = near ? '#4aff7a' : '#C8A04A';
  ctx.font = 'bold 11px Georgia, serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('CELLAR', cx, cy - hh - 10);
  ctx.restore();
}

function drawHUD() {
  ctx.save();
  const cfg = ROUNDS[roundIdx];
  // Score
  pill(W / 2 - 55, 8, 110, 26, 'rgba(0,0,0,0.55)', '#C8A04A');
  ctx.fillStyle = '#FFE066'; ctx.font = 'bold 14px Georgia, serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('$' + score, W / 2, 21);

  // Round
  pill(8, 8, 80, 26, 'rgba(0,0,0,0.55)', '#5a3a1a');
  ctx.fillStyle = '#C8A04A'; ctx.font = 'bold 11px Georgia, serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('Round ' + (roundIdx + 1) + '/5', 48, 21);

  // Timer bar
  const tRatio = timeLeft / cfg.timer;
  const barW = 200, barX = (W - barW) / 2;
  pill(barX - 2, H - 26, barW + 4, 18, 'rgba(0,0,0,0.5)', '#3a1f05');
  const barColor = tRatio > 0.5 ? '#4aff7a' : tRatio > 0.25 ? '#FFE066' : '#E74C3C';
  roundRect(barX, H - 24, barW * tRatio, 14, 7);
  ctx.fillStyle = barColor; ctx.fill();
  ctx.fillStyle = '#fff'; ctx.font = 'bold 10px Arial'; ctx.textAlign = 'center';
  ctx.fillText(Math.ceil(timeLeft) + 's', W / 2, H - 17);

  // Items saved counter
  pill(W - 88, 8, 80, 26, 'rgba(0,0,0,0.55)', '#5a3a1a');
  ctx.fillStyle = '#4aff7a'; ctx.font = 'bold 11px Georgia, serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(savedCount + '/' + cfg.needSaved + ' saved', W - 48, 21);

  // Music toggle
  ctx.fillStyle = '#5a3a1a'; ctx.font = '16px Arial';
  ctx.textAlign = 'right'; ctx.fillText(musicOn ? '🔊' : '🔇', W - 10, H - 10);

  ctx.restore();
}

function drawPopups(dt) {
  ctx.save();
  popups = popups.filter(p => p.life > 0);
  popups.forEach(p => {
    p.life -= dt;
    p.y -= 30 * dt;
    const alpha = Math.min(1, p.life / 0.6);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.font = 'bold 16px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  });
  ctx.restore();
}

function addPopup(text, x, y, color) {
  popups.push({ text, x, y, color, life: 1.0 });
}

// --- Save check ---
function checkSave(item) {
  const cx = CELLAR.x, cy = CELLAR.y;
  const hw = CELLAR.w / 2 + 10, hh = CELLAR.h / 2 + 10;
  return item.x >= cx - hw && item.x <= cx + hw && item.y >= cy - hh && item.y <= cy + hh;
}

// --- Main update ---
let lastT = 0;
function update(dt) {
  if (state === 'round_end') {
    roundEndTimer -= dt;
    if (roundEndTimer <= 0) advanceRound();
    return;
  }
  if (state !== 'playing') return;
  const cfg = ROUNDS[roundIdx];
  timeLeft -= dt;
  funnelRot += dt * 0.5;

  // Update debris
  debris.forEach(d => {
    const omegaFactor = cfg.omegaFactor;
    // Constant omega means outer debris has higher linear speed
    const omega = OMEGA_BASE * omegaFactor;
    d.theta += omega * dt;
    d.rot += d.rotSpeed * dt;

    // Inner chaos: at small r, add angular perturbation
    if (d.r < 100) {
      d.theta += (Math.random() - 0.5) * 0.15 * dt * omegaFactor;
    }

    // Inward drift: r decreases over time
    d.r -= (8 + cfg.omegaFactor * 4) * dt;
    if (d.r < MIN_DEBRIS_R) {
      // Respawn at outer radius
      d.r = 160 + Math.random() * 100;
      d.theta = Math.random() * Math.PI * 2;
    }

    d.x = VORTEX_CX + Math.cos(d.theta) * d.r;
    d.y = VORTEX_CY + Math.sin(d.theta) * d.r;
  });

  // Update items
  items.forEach((it, idx) => {
    if (it.saved || it.lost) return;

    if (it.held) {
      // Spring follow grip point
      it.x += (gripX - it.x) * SPRING * dt;
      it.y += (gripY - it.y) * SPRING * dt;
      it.vx = 0; it.vy = 0;

      // Debris collision while carrying
      debris.forEach(d => {
        const dx = d.x - it.x, dy = d.y - it.y;
        if (Math.hypot(dx, dy) < ITEM_HIT_R + DEBRIS_HIT_R) {
          // Knocked loose
          it.held = false; heldIdx = -1;
          it.vx = dx * 2; it.vy = dy * 2;
          playKnock();
          addPopup('KNOCKED!', it.x, it.y - 20, '#E74C3C');
        }
      });

      // Check cellar save
      if (checkSave(it)) {
        it.saved = true; it.held = false; heldIdx = -1;
        savedCount++;
        const reward = 200 + roundIdx * 50;
        score += reward;
        playSave();
        addPopup('+$' + reward, it.x, it.y - 30, '#4aff7a');
      }
    } else {
      // Suction toward vortex
      const dx = VORTEX_CX - it.x;
      const dy = VORTEX_CY - it.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 0) {
        const suckSpeed = SUCTION_BASE * cfg.suckMult;
        const f = suckSpeed / Math.max(dist * 0.8, 1);
        it.vx += (dx / dist) * f * dt;
        it.vy += (dy / dist) * f * dt;
      }
      it.vx *= Math.pow(0.97, dt * 60);
      it.vy *= Math.pow(0.97, dt * 60);
      it.x += it.vx * dt;
      it.y += it.vy * dt;

      // Lost if reaches vortex center
      if (dist < 35) {
        it.lost = true;
        lostCount++;
        addPopup('LOST!', it.x, it.y, '#E74C3C');
      }

      // Debris shoves idle items
      debris.forEach(d => {
        const ddx = it.x - d.x, ddy = it.y - d.y;
        const ddist = Math.hypot(ddx, ddy);
        if (ddist < ITEM_HIT_R + DEBRIS_HIT_R && ddist > 0) {
          const push = ((ITEM_HIT_R + DEBRIS_HIT_R) - ddist) * 0.5;
          it.vx += (ddx / ddist) * push;
          it.vy += (ddy / ddist) * push;
        }
      });
    }
  });

  // Round end conditions
  const activeItems = items.filter(it => !it.saved && !it.lost);
  const impossible = savedCount + activeItems.length < cfg.needSaved;

  if (savedCount >= cfg.needSaved || timeLeft <= 0 || impossible) {
    endRound();
  }
}

function endRound() {
  if (state !== 'playing') return;
  const cfg = ROUNDS[roundIdx];
  // Time bonus
  const timeBonus = Math.max(0, Math.floor(timeLeft) * 15);
  if (savedCount >= cfg.needSaved) {
    score += timeBonus;
    roundResult = 'pass';
    if (savedCount === cfg.itemCount) {
      score += 400;
      addPopup('ALL SAVED! +$400', W / 2, 300, '#FFE066');
    } else {
      addPopup('+$' + timeBonus + ' time bonus', W / 2, 320, '#4aff7a');
    }
  } else {
    roundResult = 'fail';
    addPopup('NOT ENOUGH SAVED', W / 2, 300, '#E74C3C');
  }

  stopWind();
  state = 'round_end';
  roundEndTimer = 1.8;
  if (roundResult === 'pass') playSave(); else playLose();
}

function advanceRound() {
  if (roundResult === 'fail') {
    // Game over
    if (score > best) { best = score; localStorage.setItem('texas_twister_best', best); }
    state = 'lose';
    playLose();
    return;
  }
  roundIdx++;
  if (roundIdx >= ROUNDS.length) {
    if (score > best) { best = score; localStorage.setItem('texas_twister_best', best); }
    state = 'win';
    playWin();
    startWind(0.5);
    return;
  }
  state = 'playing';
  startRound();
}

// --- Touch/Mouse input ---
function getCanvasPos(e) {
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return { x: (src.clientX - rect.left) * scaleX, y: (src.clientY - rect.top) * scaleY };
}

function onDown(pos) {
  ensureAudio();
  if (state === 'title') { startGame(); return; }
  if (state === 'win' || state === 'lose') {
    const bx = W / 2 - 70, by = H / 2 + 60, bw = 140, bh = 40;
    if (pos.x >= bx && pos.x <= bx + bw && pos.y >= by && pos.y <= by + bh) {
      startGame(); return;
    }
    // Feedback buttons
    const fbx = W / 2 - 50, fby = H / 2 + 120, fbw = 100, fbh = 36;
    if (pos.x >= fbx && pos.x <= fbx + fbw && pos.y >= fby && pos.y <= fby + fbh) {
      feedbackOpen = !feedbackOpen; return;
    }
    return;
  }
  if (state === 'round_end') return;
  if (state !== 'playing') return;

  // Music toggle
  if (pos.x > W - 36 && pos.y > H - 36) { toggleMusic(); return; }

  // Grab nearest item
  if (heldIdx === -1) {
    let bestD = GRAB_R, bestI = -1;
    items.forEach((it, i) => {
      if (it.saved || it.lost || it.held) return;
      const d = Math.hypot(it.x - pos.x, it.y - pos.y);
      if (d < bestD) { bestD = d; bestI = i; }
    });
    if (bestI >= 0) {
      heldIdx = bestI;
      items[bestI].held = true;
      gripX = pos.x; gripY = pos.y;
    }
  }
}

function onMove(pos) {
  if (state !== 'playing' || heldIdx === -1) return;
  gripX = pos.x; gripY = pos.y;
}

function onUp() {
  if (heldIdx >= 0 && heldIdx < items.length) {
    items[heldIdx].held = false;
    heldIdx = -1;
  }
}

canvas.addEventListener('touchstart', e => { e.preventDefault(); touchActive = true; onDown(getCanvasPos(e)); }, { passive: false });
canvas.addEventListener('touchmove', e => { e.preventDefault(); onMove(getCanvasPos(e)); }, { passive: false });
canvas.addEventListener('touchend', e => { e.preventDefault(); onUp(); }, { passive: false });
canvas.addEventListener('mousedown', e => { if (!touchActive) onDown(getCanvasPos(e)); });
canvas.addEventListener('mousemove', e => { if (!touchActive && heldIdx >= 0) onMove(getCanvasPos(e)); });
canvas.addEventListener('mouseup', () => { if (!touchActive) onUp(); });

// --- Screens ---
function drawTitle() {
  ctx.save();
  drawBackground();

  // Animated funnel
  drawTornado();

  // Title
  ctx.fillStyle = '#FFE066';
  ctx.font = 'bold 42px Georgia, serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = '#ff9f43'; ctx.shadowBlur = 20;
  ctx.fillText('TEXAS', W / 2, 380);
  ctx.fillText('TWISTER', W / 2, 430);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#C8A04A';
  ctx.font = '14px Georgia, serif';
  ctx.fillText('Tornado bearing down.', W / 2, 480);
  ctx.fillText('Save what you can before it hits.', W / 2, 500);

  // Tap to play
  const pulse = 0.7 + Math.sin(Date.now() / 500) * 0.3;
  ctx.globalAlpha = pulse;
  ctx.fillStyle = '#FFE066';
  ctx.font = 'bold 16px Georgia, serif';
  ctx.fillText('TAP TO PLAY', W / 2, 550);
  ctx.globalAlpha = 1;

  if (best > 0) {
    ctx.fillStyle = '#8a6a3a'; ctx.font = '12px Georgia, serif';
    ctx.fillText('Best: $' + best, W / 2, 580);
  }
  ctx.restore();
}

function drawPlaying(dt) {
  ctx.save();
  drawBackground();
  drawTornado();

  // Draw item shadows
  items.forEach(it => {
    if (it.saved || it.lost) return;
    ctx.save();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(it.x, it.y + 20, 16, 6, 0, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  });

  // Check near cellar
  const near = heldIdx >= 0 && checkSave({ x: gripX, y: gripY + 30 });
  drawCellar(near);

  // Draw debris
  debris.forEach(drawDebris);

  // Draw items
  items.forEach(drawItem);

  drawHUD();
  drawPopups(dt);
  ctx.restore();
}

function drawRoundEnd() {
  ctx.save();
  drawBackground();
  drawTornado();
  drawCellar(false);
  items.forEach(drawItem);
  debris.forEach(drawDebris);

  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(0, 0, W, H);

  const cfg = ROUNDS[roundIdx];
  const pass = roundResult === 'pass';
  ctx.fillStyle = pass ? '#4aff7a' : '#E74C3C';
  ctx.font = 'bold 28px Georgia, serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(pass ? 'MADE IT!' : 'FAILED', W / 2, 260);

  ctx.fillStyle = '#C8A04A'; ctx.font = '16px Georgia, serif';
  ctx.fillText(savedCount + ' of ' + cfg.itemCount + ' items saved', W / 2, 300);
  ctx.fillText('Need: ' + cfg.needSaved, W / 2, 324);

  if (roundIdx < ROUNDS.length - 1 && pass) {
    ctx.fillStyle = '#FFE066'; ctx.font = '14px Georgia, serif';
    ctx.fillText('Category ' + (roundIdx + 2) + ' twister incoming...', W / 2, 360);
  }

  ctx.fillStyle = '#FFE066'; ctx.font = 'bold 20px Georgia, serif';
  ctx.fillText('Score: $' + score, W / 2, 400);

  // Popups still animate
  drawPopups(0);
  ctx.restore();
}

function drawEndScreen(won) {
  ctx.save();
  drawBackground();
  drawTornado();

  ctx.fillStyle = 'rgba(0,0,0,0.65)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = won ? '#FFE066' : '#E74C3C';
  ctx.font = 'bold 36px Georgia, serif';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowColor = won ? '#ff9f43' : '#800';
  ctx.shadowBlur = 20;
  ctx.fillText(won ? 'SURVIVED!' : 'SWEPT AWAY', W / 2, 220);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#C8A04A'; ctx.font = '16px Georgia, serif';
  ctx.fillText(won ? 'You saved the homestead.' : 'The twister took everything.', W / 2, 265);

  ctx.fillStyle = '#FFE066'; ctx.font = 'bold 28px Georgia, serif';
  ctx.fillText('$' + score, W / 2, 310);

  const isRecord = score >= best && score > 0;
  if (isRecord) {
    const pulse = 0.8 + Math.sin(Date.now() / 300) * 0.2;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#FFE066'; ctx.font = 'bold 15px Georgia, serif';
    ctx.fillText('NEW RECORD!', W / 2, 345);
    ctx.globalAlpha = 1;
  }
  ctx.fillStyle = '#8a6a3a'; ctx.font = '13px Georgia, serif';
  ctx.fillText('Best: $' + best, W / 2, 370);

  // Play Again
  pill(W / 2 - 70, H / 2 + 60, 140, 40, '#C8A04A');
  ctx.fillStyle = '#1a0500'; ctx.font = 'bold 15px Georgia, serif';
  ctx.fillText('PLAY AGAIN', W / 2, H / 2 + 80);

  // Share
  const nav = navigator.share;
  if (nav) {
    pill(W / 2 - 55, H / 2 + 112, 110, 34, 'rgba(50,30,10,0.7)', '#C8A04A');
    ctx.fillStyle = '#FFE066'; ctx.font = '13px Georgia, serif';
    ctx.fillText('SHARE', W / 2, H / 2 + 129);
  }

  // Feedback
  pill(W / 2 - 50, H / 2 + 120, 100, 36, 'rgba(30,15,5,0.7)', '#5a3a1a');
  ctx.fillStyle = '#C8A04A'; ctx.font = '12px Georgia, serif';
  ctx.fillText('FEEDBACK', W / 2, H / 2 + 138);

  if (feedbackOpen) drawFeedbackPanel();
  ctx.restore();
}

function drawFeedbackPanel() {
  ctx.save();
  roundRect(30, H - 230, W - 60, 200, 10);
  ctx.fillStyle = 'rgba(20,10,0,0.92)'; ctx.fill();
  ctx.strokeStyle = '#C8A04A'; ctx.lineWidth = 1.5; ctx.stroke();

  ctx.fillStyle = '#FFE066'; ctx.font = 'bold 13px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('How did we do?', W / 2, H - 208);

  // Stars
  for (let i = 1; i <= 5; i++) {
    ctx.fillStyle = i <= fbRating ? '#FFE066' : '#3a2a1a';
    ctx.font = '24px Arial';
    ctx.fillText('★', 50 + i * 44, H - 178);
  }
  ctx.restore();
}

// --- Loop ---
function loop(ts) {
  try {
    const dt = Math.min((ts - lastT) / 1000, 0.05);
    lastT = ts;

    update(dt);

    if (state === 'title') drawTitle();
    else if (state === 'playing') drawPlaying(dt);
    else if (state === 'round_end') drawRoundEnd();
    else if (state === 'win') drawEndScreen(true);
    else if (state === 'lose') drawEndScreen(false);
  } catch(e) {
    console.error(e);
  }
  requestAnimationFrame(loop);
}

requestAnimationFrame(ts => { lastT = ts; requestAnimationFrame(loop); });

// --- Feedback submission ---
canvas.addEventListener('click', e => {
  if (!feedbackOpen) return;
  const pos = getCanvasPos(e);
  // Star tap
  for (let i = 1; i <= 5; i++) {
    const sx = 50 + i * 44, sy = H - 178;
    if (Math.abs(pos.x - sx) < 16 && Math.abs(pos.y - sy) < 16) {
      fbRating = i;
      // Submit feedback
      fetch(FEEDBACK_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ game: 'Texas Twister', rating: fbRating, score }),
        mode: 'no-cors',
      }).catch(() => {});
      feedbackOpen = false;
    }
  }
});

// Expose for tests
window.__run = {
  getState: () => state,
  getItems: () => items,
  getDebris: () => debris,
  getScore: () => score,
  getRoundIdx: () => roundIdx,
  getSavedCount: () => savedCount,
  getLostCount: () => lostCount,
  getTimeLeft: () => timeLeft,
  getHeldIdx: () => heldIdx,
  setTimeLeft: v => { timeLeft = v; },
  startGame,
  startRound,
  setState: s => { state = s; },
  setRound: i => { roundIdx = i; },
  forceHold: idx => {
    if (idx >= 0 && idx < items.length) {
      heldIdx = idx; items[idx].held = true;
      gripX = items[idx].x; gripY = items[idx].y;
    }
  },
  forceRelease: () => {
    if (heldIdx >= 0 && heldIdx < items.length) items[heldIdx].held = false;
    heldIdx = -1;
  },
  moveGrip: (x, y) => { gripX = x; gripY = y; },
  moveDebrisTo: (idx, x, y) => {
    if (debris[idx]) {
      debris[idx].x = x; debris[idx].y = y;
      const ddx = x - VORTEX_CX, ddy = y - VORTEX_CY;
      debris[idx].r = Math.hypot(ddx, ddy);
      debris[idx].theta = Math.atan2(ddy, ddx);
    }
  },
  forceItemPos: (idx, x, y) => { if (items[idx]) { items[idx].x = x; items[idx].y = y; } },
  forceSave: idx => {
    if (items[idx] && !items[idx].saved && !items[idx].lost) {
      items[idx].saved = true;
      items[idx].held = false;
      if (heldIdx === idx) heldIdx = -1;
      savedCount++;
      score += 200 + roundIdx * 50;
    }
  },
  update,
  ROUNDS, CELLAR, VORTEX_CX, VORTEX_CY, ITEM_HIT_R, DEBRIS_HIT_R,
};
</script>
