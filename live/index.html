<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0d0608;
  color: #E8DCC8;
  font-family: Georgia, serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: 52px 24px;
}
.label {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #9a6838;
  margin-bottom: 18px;
}
h1 {
  font-size: clamp(30px, 8vw, 44px);
  color: #FFD700;
  text-shadow: 0 0 40px rgba(255,215,0,0.4);
  letter-spacing: 2px;
  line-height: 1.1;
  margin-bottom: 18px;
}
p {
  max-width: 420px;
  font-size: 15px;
  line-height: 1.7;
  color: #C8B89A;
  margin-bottom: 36px;
}
.watch {
  width: 100%;
  max-width: 720px;
  margin: 16px 0 44px;
}
.watch h2 {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #9a6838;
  font-weight: normal;
  margin-bottom: 24px;
}
.video {
  margin-bottom: 36px;
}
.video:last-child { margin-bottom: 0; }
.video-title {
  font-size: 19px;
  color: #FFD700;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.video-meta {
  font-size: 13px;
  color: #9a6838;
  letter-spacing: 1px;
  margin-bottom: 16px;
}
.video-frame {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid rgba(220,80,40,0.25);
  background: #000;
}
.video-frame iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  border: 0;
}
.premiere {
  position: relative;
  width: 100%;
  padding-bottom: 56.25%;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid rgba(220,80,40,0.25);
  background: radial-gradient(circle at 50% 40%, rgba(40,16,10,0.9), #0d0608);
  display: flex;
}
.premiere-inner {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.premiere-inner .countdown {
  font-size: 13px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #e87a5a;
  margin-bottom: 10px;
}
.premiere-inner .when {
  font-size: clamp(18px, 5vw, 26px);
  color: #FFD700;
  letter-spacing: 1px;
}
.home-link {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 13px 26px;
  border-radius: 12px;
  font-size: 15px;
  text-decoration: none;
  background: rgba(180,60,30,0.12);
  border: 1px solid rgba(220,80,40,0.35);
  color: #e87a5a;
  transition: filter 0.15s, transform 0.1s;
}
.home-link:hover  { filter: brightness(1.12); }
.home-link:active { transform: scale(0.97); }
</style>

          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
