<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Wanted: Dead or Alive — Bob Davis</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #050208; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

const FEEDBACK_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwdJq8jFwM31ZUwkyhRrVVJkk5wf8rOZARAArWFOMfaymVOnNmnmM7fOc_acsiM6dRVSg/exec';
const MUSIC_SRC = '';
const GAME_SLUG = 'wanted_dead_or_alive';

const W = 360, H = 640;
const HORIZON_Y  = 240;
const SCENE_BOT  = H - 145;
const VP_X       = W / 2;

const FEAT_HATS   = ['wide-brimmed hat', 'narrow-brimmed hat'];
const FEAT_COATS  = ['long duster', 'short jacket'];
const FEAT_BUILDS = ['tall build', 'stocky build'];

const LOC_NAMES  = ['Saloon', 'General Store', 'Livery Stable', "Sheriff's Office", 'Hotel'];
const NUM_LOCS   = 5;
const NUM_SUSPECTS = 8;
const TOTAL_TIME   = 75;

const ACCUSE_THRESHOLD = 0.60;
const CLUE_WEIGHT      = 0.15;
const EVIDENCE_WEIGHT  = 0.12;
const FUGITIVE_SUSPICION = 0.08;

// ── STATE ─────────────────────────────────────────────────────────
let state = 'title';
let score = 0;
let timer = TOTAL_TIME;
let confidence = 0;
let cluesFound;
let currentLoc = 0;
let suspects = [];
let locations = [];
let fugitiveId = -1;
let fugFeatures = {};
let wrongStrikes = 0;
let accuseMode = false;
let posterTimer = 3.0;
let popups = [];
let loseReason = '';
let transAnim = 0;
let bestScore = parseInt(localStorage.getItem(GAME_SLUG + '_best') || '0', 10);
let fbVisible = false, fbRating = 0, fbSubmitting = false, fbDone = false;

let gameSeed = 1;
function rng() {
  gameSeed ^= gameSeed << 13;
  gameSeed ^= gameSeed >> 17;
  gameSeed ^= gameSeed << 5;
  return ((gameSeed >>> 0) / 0xFFFFFFFF);
}

// ── CANVAS ────────────────────────────────────────────────────────
const c = document.getElementById('c');
const ctx = c.getContext('2d');
c.width = W; c.height = H;

function resize() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  c.style.width  = s * W + 'px';
  c.style.height = s * H + 'px';
}
window.addEventListener('resize', resize);
resize();

// ── AUDIO ─────────────────────────────────────────────────────────
const AC = window.AudioContext || window.webkitAudioContext;
let ac;
function getAC() { if (!ac) ac = new AC(); return ac; }

const CHORDS = [196.00, 220.00, 246.94, 293.66, 329.63];

function playNote(freq, dur, vol, type) {
  try {
    const a = getAC();
    const o = a.createOscillator();
    o.type = type || 'triangle';
    o.frequency.value = freq;
    const g = a.createGain();
    g.gain.setValueAtTime(vol, a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.connect(g); g.connect(a.destination);
    o.start(); o.stop(a.currentTime + dur);
  } catch (_) {}
}

function playClue()    { playNote(CHORDS[2], 0.25, 0.14); }
function playAccuse()  { playNote(CHORDS[0], 0.4,  0.20); }
function playWrong()   { playNote(110, 0.5, 0.18, 'sawtooth'); }
function playWin()     { [0,1,2,3,4].forEach((i, idx) => setTimeout(() => playNote(CHORDS[i], 0.35, 0.18), idx * 120)); }
function playNav()     { playNote(CHORDS[1], 0.12, 0.10); }

// ── GAME INIT ─────────────────────────────────────────────────────
function startGame() {
  gameSeed = (Date.now() & 0x7FFFFFFF) | 1;
  state = 'poster';
  score = 0;
  timer = TOTAL_TIME;
  confidence = 0;
  cluesFound = new Set();
  currentLoc = 0;
  wrongStrikes = 0;
  accuseMode = false;
  popups = [];
  loseReason = '';
  posterTimer = 3.0;
  transAnim = 0;
  fbVisible = false; fbRating = 0; fbSubmitting = false; fbDone = false;

  // Fugitive features
  fugFeatures = {
    hat:   Math.floor(rng() * 2),
    coat:  Math.floor(rng() * 2),
    build: Math.floor(rng() * 2),
    scar:  rng() > 0.5,
  };

  // Choose which suspect is the fugitive
  fugitiveId = Math.floor(rng() * NUM_SUSPECTS);

  // Clue topics cycling across 4 features
  const topics = [];
  for (let i = 0; i < NUM_SUSPECTS - 1; i++) topics.push(i % 4);
  for (let i = topics.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [topics[i], topics[j]] = [topics[j], topics[i]];
  }

  suspects = [];
  let witIdx = 0;
  for (let i = 0; i < NUM_SUSPECTS; i++) {
    const isFug = (i === fugitiveId);
    suspects.push({
      id: i,
      hat:    isFug ? fugFeatures.hat   : Math.floor(rng() * 2),
      coat:   isFug ? fugFeatures.coat  : Math.floor(rng() * 2),
      build:  isFug ? fugFeatures.build : Math.floor(rng() * 2),
      hasScar: isFug ? fugFeatures.scar : rng() > 0.5,
      isFugitive: isFug,
      interviewed: false,
      accused: false,
      locIdx: -1,
      x: VP_X,
      depth: 1,
      clueText: isFug
        ? "Just passing through. Mind your own business."
        : buildClueText(topics[witIdx++]),
    });
  }

  // Distribute suspects: [2,1,2,1,2] per location = 8 total
  const order = [...Array(NUM_SUSPECTS).keys()];
  for (let i = order.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [order[i], order[j]] = [order[j], order[i]];
  }
  const counts = [2, 1, 2, 1, 2];
  let si = 0;
  locations = LOC_NAMES.map((name, li) => ({
    name,
    npcs: order.slice(si, (si += counts[li])),
    evidence: null,
  }));

  // Assign position within each location
  for (let li = 0; li < NUM_LOCS; li++) {
    const npcs = locations[li].npcs;
    npcs.forEach((sid, ni) => {
      suspects[sid].locIdx = li;
      if (npcs.length === 1) {
        suspects[sid].x = VP_X;
        suspects[sid].depth = 1;
      } else {
        suspects[sid].x     = ni === 0 ? Math.round(W * 0.33) : Math.round(W * 0.67);
        suspects[sid].depth = ni === 0 ? 0 : 2;
      }
    });
  }

  // Place evidence at 3 of 5 locations
  const evOrder = [...Array(NUM_LOCS).keys()];
  for (let i = evOrder.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [evOrder[i], evOrder[j]] = [evOrder[j], evOrder[i]];
  }
  const evTypes = [
    { label: 'Bootprints', feature: 'build' },
    { label: 'Dropped hat', feature: 'hat' },
    { label: 'Torn coat', feature: 'coat' },
  ];
  evOrder.slice(0, 3).forEach((li, idx) => {
    locations[li].evidence = { ...evTypes[idx], examined: false };
  });
}

function buildClueText(topic) {
  const f = fugFeatures;
  switch (topic) {
    case 0: return `Spotted 'em — wearing a ${FEAT_HATS[f.hat]}.`;
    case 1: return `Had on a ${FEAT_COATS[f.coat]}, couldn't miss it.`;
    case 2: return f.build === 0 ? 'Tall fella, stood out in a crowd.' : 'Short and stocky, moved quick.';
    case 3: return f.scar ? 'Nasty scar on the left cheek.' : 'Clean face, no marks on them.';
    default: return 'Seen a stranger pass through here.';
  }
}

function evidenceClueText(feature) {
  const f = fugFeatures;
  switch (feature) {
    case 'hat':   return `Track: ${FEAT_HATS[f.hat]} dropped here.`;
    case 'coat':  return `Fabric torn — ${FEAT_COATS[f.coat]}.`;
    case 'build': return f.build === 0 ? 'Long stride marks. Tall person.' : 'Wide, heavy tread. Stocky build.';
    case 'scar':  return f.scar ? 'Bloodied bandage on the ground.' : 'No sign of injury.';
    default: return 'Strange mark here.';
  }
}

// ── MECHANICS ──────────────────────────────────────────────────────
function interviewSuspect(sid) {
  const s = suspects[sid];
  if (s.interviewed) { spawnPopup('Already asked.', '#888888'); return; }
  s.interviewed = true;
  const cid = 'npc_' + sid;
  if (!cluesFound.has(cid)) {
    cluesFound.add(cid);
    if (s.isFugitive) {
      confidence = Math.min(1, confidence + FUGITIVE_SUSPICION);
      spawnPopup(s.clueText, '#E74C3C');
    } else {
      confidence = Math.min(1, confidence + CLUE_WEIGHT);
      spawnPopup(s.clueText, '#FFD700');
    }
    playClue();
  }
}

function examineEvidence(locIdx) {
  const ev = locations[locIdx].evidence;
  if (!ev || ev.examined) return;
  ev.examined = true;
  const cid = 'ev_' + locIdx;
  if (!cluesFound.has(cid)) {
    cluesFound.add(cid);
    confidence = Math.min(1, confidence + EVIDENCE_WEIGHT);
    spawnPopup(evidenceClueText(ev.feature), '#FF9F43');
    playClue();
  }
}

function accuseSuspect(sid) {
  const s = suspects[sid];
  if (s.accused) { spawnPopup('Already cleared.', '#888888'); return; }
  s.accused = true;
  accuseMode = false;
  playAccuse();

  if (s.isFugitive) {
    const timeBonus  = Math.round(timer * 8);
    const confBonus  = Math.round(confidence * 400);
    const strikeBonus = Math.round((2 - wrongStrikes) * 100);
    score = timeBonus + confBonus + strikeBonus;
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem(GAME_SLUG + '_best', bestScore);
    }
    playWin();
    state = 'win';
  } else {
    wrongStrikes++;
    confidence = Math.max(0, confidence - 0.30);
    spawnPopup('NOT GUILTY! -30% confidence', '#E74C3C');
    playWrong();
    if (wrongStrikes >= 2) {
      loseReason = 'wrongaccuse';
      state = 'lose';
    }
  }
}

function navigate(dir) {
  const next = currentLoc + dir;
  if (next < 0 || next >= NUM_LOCS) return;
  currentLoc = next;
  accuseMode = false;
  transAnim = 1.0;
  playNav();
}

function tickTime(dt) {
  if (state !== 'playing') return;
  timer = Math.max(0, timer - dt);
  if (timer <= 0) {
    loseReason = 'timeout';
    state = 'lose';
  }
  popups = popups.filter(p => p.life > 0);
  popups.forEach(p => { p.life -= dt; p.y -= 28 * dt; });
  if (transAnim > 0) transAnim = Math.max(0, transAnim - dt * 4);
}

function spawnPopup(text, color) {
  popups.push({ text, color, x: VP_X, y: SCENE_BOT - 60, life: 2.5 });
}

// ── TAP HANDLING ───────────────────────────────────────────────────
function handleTap(x, y) {
  getAC();
  if (fbVisible) { handleFbTap(x, y); return; }
  if (state === 'title') { startGame(); return; }
  if (state === 'poster') { state = 'playing'; posterTimer = 0; return; }
  if (state === 'win' || state === 'lose') { if (!fbVisible) startGame(); return; }
  if (state !== 'playing') return;

  // Nav arrows (bottom strip, left/right 60px)
  if (y > H - 140 && y < H - 95) {
    if (x < 65) { navigate(-1); return; }
    if (x > W - 65) { navigate(1); return; }
  }

  // ACCUSE toggle button
  if (y > H - 85 && y < H - 45 && x > VP_X - 60 && x < VP_X + 60) {
    if (confidence >= ACCUSE_THRESHOLD) accuseMode = !accuseMode;
    return;
  }

  // Evidence tap
  const ev = locations[currentLoc].evidence;
  if (ev && !ev.examined) {
    const evX = Math.round(W * 0.78), evY = SCENE_BOT - 22;
    if (Math.abs(x - evX) < 26 && Math.abs(y - evY) < 26) {
      examineEvidence(currentLoc);
      return;
    }
  }

  // NPC tap
  for (const sid of locations[currentLoc].npcs) {
    const s = suspects[sid];
    const sc  = npcScale(s.depth);
    const nY  = npcBaseY(s.depth);
    const hw  = 20 * sc, hh = 60 * sc;
    if (Math.abs(x - s.x) < hw && Math.abs(y - nY) < hh) {
      if (accuseMode) accuseSuspect(sid);
      else            interviewSuspect(sid);
      return;
    }
  }

  // Tapping anywhere else exits accuse mode
  if (accuseMode) accuseMode = false;
}

function handleFbTap(x, y) {
  if (fbDone) { fbVisible = false; return; }
  if (fbSubmitting) return;
  const stY = H * 0.52, stSz = 32;
  const stX = VP_X - 2.5 * stSz;
  if (y > stY - stSz && y < stY + stSz) {
    for (let i = 1; i <= 5; i++) {
      if (x >= stX + (i - 1) * stSz && x < stX + i * stSz) { fbRating = i; return; }
    }
  }
  if (y > H * 0.62 && y < H * 0.62 + 50 && x > VP_X - 80 && x < VP_X + 80 && fbRating > 0) {
    submitFeedback();
  }
  if (y > H * 0.76 && y < H * 0.76 + 40 && x > VP_X - 60 && x < VP_X + 60) {
    fbVisible = false;
  }
}

function submitFeedback() {
  fbSubmitting = true;
  fetch(FEEDBACK_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ game: 'Wanted: Dead or Alive', rating: fbRating, score }),
  }).finally(() => { fbDone = true; fbSubmitting = false; });
}

// ── NPC GEOMETRY ───────────────────────────────────────────────────
function npcScale(depth) { return [0.45, 0.72, 1.05][depth]; }
function npcBaseY(depth) {
  const t = [0.18, 0.50, 0.85][depth];
  return Math.round(HORIZON_Y + (SCENE_BOT - HORIZON_Y) * t);
}

function drawNPC(s, highlight) {
  const sc = npcScale(s.depth);
  const bY = npcBaseY(s.depth);

  ctx.save();
  ctx.translate(s.x, bY);

  const bw = (s.build === 0 ? 17 : 22) * sc;
  const bh = (s.build === 0 ? 58 : 48) * sc;
  const hr = 9 * sc;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(0, 2, bw * 0.9, 5 * sc, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body fill (accused = grey, highlight = red, interviewed = slightly lighter)
  let bodyColor = '#1a0520';
  if (s.accused)       bodyColor = '#2a2a2a';
  else if (highlight)  bodyColor = '#7a0010';
  else if (s.interviewed) bodyColor = '#2d1240';

  // Coat — long duster reaches below knees
  const coatBot = s.coat === 0 ? bh * 0.20 : bh * 0.55;
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.roundRect(-bw / 2, -bh, bw, bh - coatBot, [3 * sc, 3 * sc, 0, 0]);
  ctx.fill();

  // Lower coat (skirt / tails)
  if (s.coat === 0) {
    ctx.beginPath();
    const sk = bw * 0.7;
    ctx.moveTo(-sk, -bh + bh * 0.55);
    ctx.lineTo(-sk - 4 * sc, 0);
    ctx.lineTo(sk + 4 * sc, 0);
    ctx.lineTo(sk, -bh + bh * 0.55);
    ctx.closePath();
    ctx.fill();
  } else {
    ctx.fillRect(-bw / 2, -bh + bh * 0.45, bw, bh * 0.55);
  }

  // Head
  ctx.fillStyle = bodyColor;
  ctx.beginPath();
  ctx.arc(0, -bh - hr, hr, 0, Math.PI * 2);
  ctx.fill();

  // Hat
  if (s.hat === 0) {
    // Wide brim
    ctx.fillRect(-15 * sc, -bh - 2 * hr - 7 * sc, 30 * sc, 7 * sc);
    ctx.fillRect(-9 * sc,  -bh - 2 * hr - 16 * sc, 18 * sc, 11 * sc);
  } else {
    // Narrow brim
    ctx.fillRect(-11 * sc, -bh - 2 * hr - 6 * sc, 22 * sc, 5 * sc);
    ctx.fillRect(-7 * sc,  -bh - 2 * hr - 15 * sc, 14 * sc, 11 * sc);
  }

  // Scar
  if (s.hasScar) {
    ctx.strokeStyle = '#C0392B';
    ctx.lineWidth = 2 * sc;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(3 * sc, -bh - hr * 0.8);
    ctx.lineTo(6 * sc, -bh - hr * 0.2);
    ctx.stroke();
  }

  // Interview badge (gold star dot)
  if (s.interviewed) {
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(bw / 2 + 5 * sc, -bh - hr, 4 * sc, 0, Math.PI * 2);
    ctx.fill();
  }

  // Accused X
  if (s.accused && !s.isFugitive) {
    ctx.strokeStyle = '#E74C3C';
    ctx.lineWidth = 2 * sc;
    const ox = 8 * sc;
    ctx.beginPath(); ctx.moveTo(-ox, -bh * 0.4); ctx.lineTo(ox, -bh * 0.1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(ox, -bh * 0.4); ctx.lineTo(-ox, -bh * 0.1); ctx.stroke();
  }

  ctx.restore();
}

// ── DRAWING ────────────────────────────────────────────────────────
function drawTitle() {
  // Background
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#050208');
  bg.addColorStop(1, '#1a0a00');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (let i = 0; i < 60; i++) {
    const sx = (Math.sin(i * 137.5) * 0.5 + 0.5) * W;
    const sy = (Math.sin(i * 79.3 + 1.1) * 0.5 + 0.5) * (H * 0.5);
    const sr = 0.8 + (i % 3) * 0.4;
    ctx.fillStyle = `rgba(255,230,150,${0.4 + (i % 5) * 0.12})`;
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill();
  }

  // Poster frame
  ctx.fillStyle = '#3a1f05';
  roundRect(ctx, 24, 80, W - 48, H - 180, 8);
  ctx.fill();
  ctx.strokeStyle = '#C8A04A';
  ctx.lineWidth = 3;
  roundRect(ctx, 24, 80, W - 48, H - 180, 8);
  ctx.stroke();
  ctx.strokeStyle = '#8B6914';
  ctx.lineWidth = 1;
  roundRect(ctx, 30, 86, W - 60, H - 192, 6);
  ctx.stroke();

  // WANTED header
  ctx.fillStyle = '#FFE066';
  ctx.font = 'bold 48px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('WANTED', VP_X, 148);

  ctx.fillStyle = '#C8A04A';
  ctx.font = 'bold 18px Georgia, serif';
  ctx.fillText('Dead or Alive', VP_X, 172);

  // Silhouette mugshot
  drawPosterMugshot(VP_X, 280, 0.9);

  // $500 REWARD
  ctx.fillStyle = '#FFD700';
  ctx.font = 'bold 22px Georgia, serif';
  ctx.fillText('$500 REWARD', VP_X, 410);

  ctx.fillStyle = '#C8A04A';
  ctx.font = '13px Georgia, serif';
  ctx.fillText('Track the fugitive through town', VP_X, 432);
  ctx.fillText('Gather clues — make the accusation', VP_X, 450);

  // Tap to play
  const pulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.003);
  ctx.fillStyle = `rgba(255,224,102,${pulse})`;
  ctx.font = 'bold 16px Georgia, serif';
  ctx.fillText('TAP TO BEGIN THE HUNT', VP_X, 510);

  if (bestScore > 0) {
    ctx.fillStyle = '#8B6914';
    ctx.font = '13px Georgia, serif';
    ctx.fillText('Best: ' + bestScore, VP_X, 535);
  }
}

function drawPosterMugshot(cx, cy, sc) {
  ctx.save();
  ctx.translate(cx, cy);
  const bh = 70 * sc, bw = 22 * sc, hr = 11 * sc;
  ctx.fillStyle = '#1a0520';
  ctx.fillRect(-bw / 2, -bh, bw, bh);
  ctx.beginPath(); ctx.arc(0, -bh - hr, hr, 0, Math.PI * 2); ctx.fill();
  // Wide brim hat
  ctx.fillRect(-18 * sc, -bh - 2 * hr - 8 * sc, 36 * sc, 8 * sc);
  ctx.fillRect(-11 * sc, -bh - 2 * hr - 18 * sc, 22 * sc, 12 * sc);
  // "?" on face
  ctx.fillStyle = '#C8A04A';
  ctx.font = `bold ${14 * sc}px Georgia, serif`;
  ctx.textAlign = 'center';
  ctx.fillText('?', 0, -bh - hr + 4 * sc);
  ctx.restore();
}

function drawPoster() {
  // Parchment background
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#2a1200');
  bg.addColorStop(1, '#0a0600');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Poster frame
  ctx.fillStyle = '#c8902a';
  roundRect(ctx, 18, 40, W - 36, H - 90, 6);
  ctx.fill();
  ctx.fillStyle = '#e8b84a';
  roundRect(ctx, 22, 44, W - 44, H - 98, 5);
  ctx.fill();
  ctx.fillStyle = '#d4a03a';
  roundRect(ctx, 26, 48, W - 52, H - 106, 4);
  ctx.fill();

  // WANTED text
  ctx.fillStyle = '#1a0a00';
  ctx.font = 'bold 52px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('WANTED', VP_X, 108);

  ctx.font = 'bold 16px Georgia, serif';
  ctx.fillText('Dead or Alive', VP_X, 128);

  // Fugitive silhouette in box
  ctx.fillStyle = '#b8882a';
  roundRect(ctx, 90, 140, W - 180, 160, 4);
  ctx.fill();
  ctx.strokeStyle = '#1a0a00';
  ctx.lineWidth = 2;
  roundRect(ctx, 90, 140, W - 180, 160, 4);
  ctx.stroke();
  drawFugitiveInPoster();

  // Description
  ctx.fillStyle = '#1a0a00';
  ctx.font = 'bold 13px Georgia, serif';
  ctx.textAlign = 'left';
  const lx = 34;
  ctx.fillText('DESCRIPTION:', lx, 322);
  ctx.font = '13px Georgia, serif';
  const f = fugFeatures;
  const lines = [
    '• ' + (f.build === 0 ? 'Tall build' : 'Stocky build'),
    '• ' + FEAT_HATS[f.hat].charAt(0).toUpperCase() + FEAT_HATS[f.hat].slice(1),
    '• ' + FEAT_COATS[f.coat].charAt(0).toUpperCase() + FEAT_COATS[f.coat].slice(1),
    '• ' + (f.scar ? 'Scar on left cheek' : 'No distinguishing marks'),
  ];
  lines.forEach((ln, i) => ctx.fillText(ln, lx, 342 + i * 20));

  // Reward
  ctx.font = 'bold 20px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('$500 REWARD', VP_X, 450);
  ctx.font = '11px Georgia, serif';
  ctx.fillStyle = '#3a1a00';
  ctx.fillText('Issued by the County Sheriff', VP_X, 466);

  // Tap prompt / timer
  const pct = Math.min(1, (3.0 - posterTimer) / 3.0);
  ctx.fillStyle = '#5a3010';
  roundRect(ctx, 34, H - 105, W - 68, 6, 3);
  ctx.fill();
  ctx.fillStyle = '#1a0a00';
  roundRect(ctx, 34, H - 105, Math.round((W - 68) * pct), 6, 3);
  ctx.fill();

  const pulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.004);
  ctx.fillStyle = `rgba(26,10,0,${pulse})`;
  ctx.font = 'bold 14px Georgia, serif';
  ctx.fillText('TAP TO BEGIN — STUDY THE POSTER', VP_X, H - 80);
}

function drawFugitiveInPoster() {
  const f = fugFeatures;
  ctx.save();
  ctx.translate(VP_X, 230);
  const sc = 0.85;
  const bh = (f.build === 0 ? 60 : 50) * sc;
  const bw = (f.build === 0 ? 16 : 22) * sc;
  const hr = 10 * sc;

  ctx.fillStyle = '#1a0a00';
  ctx.fillRect(-bw / 2, -bh, bw, bh);
  ctx.beginPath(); ctx.arc(0, -bh - hr, hr, 0, Math.PI * 2); ctx.fill();

  if (f.hat === 0) {
    ctx.fillRect(-15 * sc, -bh - 2 * hr - 8 * sc, 30 * sc, 8 * sc);
    ctx.fillRect(-9 * sc,  -bh - 2 * hr - 18 * sc, 18 * sc, 12 * sc);
  } else {
    ctx.fillRect(-10 * sc, -bh - 2 * hr - 6 * sc, 20 * sc, 5 * sc);
    ctx.fillRect(-7 * sc,  -bh - 2 * hr - 15 * sc, 14 * sc, 11 * sc);
  }

  if (f.coat === 0) {
    const sk = bw * 0.75;
    ctx.beginPath();
    ctx.moveTo(-sk, -bh * 0.45);
    ctx.lineTo(-sk - 4 * sc, 0);
    ctx.lineTo(sk + 4 * sc, 0);
    ctx.lineTo(sk, -bh * 0.45);
    ctx.closePath();
    ctx.fill();
  }

  if (f.scar) {
    ctx.strokeStyle = '#8B0000';
    ctx.lineWidth = 2 * sc;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(3 * sc, -bh - hr * 0.8);
    ctx.lineTo(6 * sc, -bh - hr * 0.2);
    ctx.stroke();
  }

  ctx.restore();
}

function drawScene() {
  // Sky
  const sky = ctx.createLinearGradient(0, 0, 0, HORIZON_Y);
  sky.addColorStop(0, '#050210');
  sky.addColorStop(0.7, '#1a0830');
  sky.addColorStop(1, '#3a1500');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, HORIZON_Y);

  // Stars
  for (let i = 0; i < 40; i++) {
    const sx = (Math.sin(i * 137.5) * 0.5 + 0.5) * W;
    const sy = (Math.sin(i * 79.3 + 2.2) * 0.5 + 0.5) * HORIZON_Y * 0.88;
    const sr = 0.7 + (i % 4) * 0.3;
    ctx.fillStyle = `rgba(255,230,150,${0.3 + (i % 6) * 0.1})`;
    ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI * 2); ctx.fill();
  }

  // Moon
  ctx.fillStyle = '#FFE8A0';
  ctx.beginPath(); ctx.arc(W * 0.82, 38, 14, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a0830';
  ctx.beginPath(); ctx.arc(W * 0.82 + 7, 34, 11, 0, Math.PI * 2); ctx.fill();

  // Ground
  const gnd = ctx.createLinearGradient(0, HORIZON_Y, 0, SCENE_BOT);
  gnd.addColorStop(0, '#2a1200');
  gnd.addColorStop(1, '#120800');
  ctx.fillStyle = gnd;
  ctx.fillRect(0, HORIZON_Y, W, SCENE_BOT - HORIZON_Y);

  // Perspective lines on ground
  ctx.strokeStyle = '#1e0d00';
  ctx.lineWidth = 1;
  for (let i = -5; i <= 5; i++) {
    ctx.beginPath();
    ctx.moveTo(VP_X, HORIZON_Y);
    ctx.lineTo(VP_X + i * 40, SCENE_BOT);
    ctx.stroke();
  }

  // Buildings (silhouette facades on left and right)
  drawBuildings();

  // Location sign above horizon
  ctx.fillStyle = '#C8A04A';
  ctx.font = 'bold 15px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText(locations[currentLoc].name, VP_X, HORIZON_Y - 12);

  // NPCs in current location
  const npcList = locations[currentLoc].npcs.slice().sort((a, b) =>
    suspects[a].depth - suspects[b].depth
  );
  for (const sid of npcList) {
    drawNPC(suspects[sid], accuseMode && !suspects[sid].accused);
  }

  // Evidence
  const ev = locations[currentLoc].evidence;
  if (ev && !ev.examined) drawEvidence(ev);

  // Transition flash
  if (transAnim > 0) {
    ctx.fillStyle = `rgba(0,0,0,${transAnim * 0.5})`;
    ctx.fillRect(0, 0, W, SCENE_BOT);
  }
}

function drawBuildings() {
  const bTop = 20;
  // Left building: outer edge at x=0, inner edge converges to VP at horizon
  const leftInnerHorizon = VP_X - 35;
  const rightInnerHorizon = VP_X + 35;

  // Left building silhouette
  ctx.fillStyle = '#0a0400';
  ctx.beginPath();
  ctx.moveTo(0, bTop);
  ctx.lineTo(leftInnerHorizon, HORIZON_Y);
  ctx.lineTo(0, SCENE_BOT);
  ctx.closePath();
  ctx.fill();

  // Left building windows
  const lwx = [16, 6];
  const lwy = [90, 140, 190];
  ctx.fillStyle = '#3a2a00';
  for (const wy of lwy) {
    const t = (wy - bTop) / (SCENE_BOT - bTop);
    const innerX = leftInnerHorizon + (0 - leftInnerHorizon) * t;
    const ww = 14 + t * 8, wh = 10 + t * 4;
    const wx = innerX * 0.5 - ww / 2;
    ctx.fillRect(wx, wy, ww, wh);
    ctx.fillStyle = `rgba(255,180,60,${0.3 + Math.sin(Date.now() * 0.002 + wy) * 0.1})`;
    ctx.fillRect(wx + 2, wy + 2, ww - 4, wh - 4);
    ctx.fillStyle = '#3a2a00';
  }

  // Right building silhouette
  ctx.fillStyle = '#0a0400';
  ctx.beginPath();
  ctx.moveTo(W, bTop);
  ctx.lineTo(rightInnerHorizon, HORIZON_Y);
  ctx.lineTo(W, SCENE_BOT);
  ctx.closePath();
  ctx.fill();

  // Right building windows
  const rwy = [85, 135, 185];
  ctx.fillStyle = '#3a2a00';
  for (const wy of rwy) {
    const t = (wy - bTop) / (SCENE_BOT - bTop);
    const innerX = rightInnerHorizon + (W - rightInnerHorizon) * t;
    const ww = 14 + t * 8, wh = 10 + t * 4;
    const wx = innerX + (W - innerX) * 0.5 - ww / 2;
    ctx.fillRect(wx, wy, ww, wh);
    ctx.fillStyle = `rgba(255,180,60,${0.3 + Math.sin(Date.now() * 0.002 + wy + 1) * 0.1})`;
    ctx.fillRect(wx + 2, wy + 2, ww - 4, wh - 4);
    ctx.fillStyle = '#3a2a00';
  }

  // Saloon roofline details (balcony rail on left)
  ctx.strokeStyle = '#2a1500';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, 70);
  ctx.lineTo(leftInnerHorizon - 10, HORIZON_Y - 10);
  ctx.stroke();
}

function drawEvidence(ev) {
  const ex = Math.round(W * 0.78), ey = SCENE_BOT - 22;
  // Glow
  const pulse = 0.6 + 0.4 * Math.sin(Date.now() * 0.004);
  ctx.fillStyle = `rgba(255,160,40,${pulse * 0.3})`;
  ctx.beginPath(); ctx.arc(ex, ey, 18, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = '#C8A04A';
  ctx.font = 'bold 11px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText(ev.label, ex, ey - 6);
  ctx.font = '10px Georgia, serif';
  ctx.fillStyle = '#FFD700';
  ctx.fillText('[EXAMINE]', ex, ey + 8);
}

function drawHUD() {
  // HUD background
  ctx.fillStyle = 'rgba(10,5,0,0.92)';
  ctx.fillRect(0, SCENE_BOT, W, H - SCENE_BOT);

  // Location nav bar
  ctx.fillStyle = '#1a0d00';
  ctx.fillRect(0, SCENE_BOT, W, 48);

  // Left arrow
  const canLeft  = currentLoc > 0;
  const canRight = currentLoc < NUM_LOCS - 1;
  ctx.fillStyle = canLeft  ? '#C8A04A' : '#3a2a10';
  ctx.font = 'bold 28px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('<', 32, SCENE_BOT + 33);
  ctx.fillStyle = canRight ? '#C8A04A' : '#3a2a10';
  ctx.fillText('>', W - 32, SCENE_BOT + 33);

  // Location dots
  for (let i = 0; i < NUM_LOCS; i++) {
    ctx.fillStyle = i === currentLoc ? '#FFD700' : '#3a2a10';
    ctx.beginPath();
    ctx.arc(VP_X + (i - 2) * 18, SCENE_BOT + 34, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  // Confidence bar
  const cbX = 14, cbY = SCENE_BOT + 55, cbW = W - 28, cbH = 14;
  ctx.fillStyle = '#1a0d00';
  roundRect(ctx, cbX, cbY, cbW, cbH, 7);
  ctx.fill();
  const confW = Math.round(cbW * confidence);
  if (confW > 0) {
    const confColor = confidence >= ACCUSE_THRESHOLD ? '#FF9F43' : '#C8A04A';
    ctx.fillStyle = confColor;
    roundRect(ctx, cbX, cbY, confW, cbH, 7);
    ctx.fill();
  }
  ctx.strokeStyle = '#3a2a10';
  ctx.lineWidth = 1;
  roundRect(ctx, cbX, cbY, cbW, cbH, 7);
  ctx.stroke();

  // Confidence label
  ctx.fillStyle = '#C8A04A';
  ctx.font = '11px Georgia, serif';
  ctx.textAlign = 'left';
  ctx.fillText('CONFIDENCE', cbX, cbY - 2);
  ctx.textAlign = 'right';
  ctx.fillText(Math.round(confidence * 100) + '%', cbX + cbW, cbY - 2);

  // ACCUSE button
  const btnY = SCENE_BOT + 79, btnH = 32;
  const btnActive = confidence >= ACCUSE_THRESHOLD;
  if (accuseMode) {
    ctx.fillStyle = '#8B0000';
  } else {
    ctx.fillStyle = btnActive ? '#3a1500' : '#1a0d00';
  }
  roundRect(ctx, VP_X - 58, btnY, 116, btnH, 6);
  ctx.fill();
  ctx.strokeStyle = btnActive ? (accuseMode ? '#E74C3C' : '#C8A04A') : '#2a1a00';
  ctx.lineWidth = 1.5;
  roundRect(ctx, VP_X - 58, btnY, 116, btnH, 6);
  ctx.stroke();
  ctx.fillStyle = btnActive ? '#FFD700' : '#3a2a10';
  ctx.font = `bold 13px Georgia, serif`;
  ctx.textAlign = 'center';
  ctx.fillText(accuseMode ? 'TAP SUSPECT TO ACCUSE' : 'ACCUSE', VP_X, btnY + 21);

  // Timer pill (top-right of scene)
  const tColor = timer < 15 ? '#E74C3C' : '#C8A04A';
  ctx.fillStyle = 'rgba(10,5,0,0.8)';
  roundRect(ctx, W - 80, 8, 70, 24, 12);
  ctx.fill();
  ctx.strokeStyle = tColor;
  ctx.lineWidth = 1;
  roundRect(ctx, W - 80, 8, 70, 24, 12);
  ctx.stroke();
  ctx.fillStyle = tColor;
  ctx.font = `bold 14px Georgia, serif`;
  ctx.textAlign = 'center';
  ctx.fillText(Math.ceil(timer) + 's', W - 45, 25);

  // Wrong strikes
  if (wrongStrikes > 0) {
    ctx.fillStyle = '#E74C3C';
    ctx.font = 'bold 12px Georgia, serif';
    ctx.textAlign = 'left';
    ctx.fillText('⚠ ' + wrongStrikes + '/2 wrong', 10, 25);
  }

  // Popups
  for (const p of popups) {
    const a = Math.min(1, p.life);
    ctx.fillStyle = `rgba(${hexToRgb(p.color)},${a})`;
    ctx.font = '13px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
  }
}

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `${r},${g},${b}`;
}

function drawGameOver(won) {
  ctx.fillStyle = 'rgba(5,2,8,0.85)';
  ctx.fillRect(0, 0, W, H);

  if (won) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 36px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText('FUGITIVE CAUGHT!', VP_X, H * 0.25);

    ctx.fillStyle = '#C8A04A';
    ctx.font = '16px Georgia, serif';
    ctx.fillText('Justice served in ' + LOC_NAMES[suspects[fugitiveId].locIdx], VP_X, H * 0.25 + 30);

    ctx.fillStyle = '#FFE066';
    ctx.font = 'bold 28px Georgia, serif';
    ctx.fillText(score + ' pts', VP_X, H * 0.38);

    if (score >= bestScore && score > 0) {
      const pulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.006);
      ctx.fillStyle = `rgba(255,160,40,${pulse})`;
      ctx.font = 'bold 16px Georgia, serif';
      ctx.fillText('NEW RECORD!', VP_X, H * 0.38 + 28);
    } else if (bestScore > 0) {
      ctx.fillStyle = '#8B6914';
      ctx.font = '13px Georgia, serif';
      ctx.fillText('Best: ' + bestScore, VP_X, H * 0.38 + 28);
    }
  } else {
    ctx.fillStyle = '#E74C3C';
    ctx.font = 'bold 36px Georgia, serif';
    ctx.textAlign = 'center';
    ctx.fillText('GOT AWAY', VP_X, H * 0.25);

    ctx.fillStyle = '#C8A04A';
    ctx.font = '15px Georgia, serif';
    const reason = loseReason === 'timeout' ? 'Ran out of time' : 'Too many wrong accusations';
    ctx.fillText(reason, VP_X, H * 0.25 + 30);

    // Reveal the fugitive
    ctx.fillStyle = '#8B6914';
    ctx.font = '13px Georgia, serif';
    ctx.fillText('Fugitive was in ' + LOC_NAMES[suspects[fugitiveId].locIdx], VP_X, H * 0.25 + 52);
  }

  // Tap to play again
  ctx.fillStyle = won ? '#C8A04A' : '#8B3030';
  ctx.font = '14px Georgia, serif';
  ctx.fillText('Tap to hunt again', VP_X, H * 0.50);
}

function drawFeedback() {
  ctx.fillStyle = 'rgba(5,2,8,0.93)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#C8A04A';
  ctx.font = 'bold 20px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText('How\'d we do, partner?', VP_X, H * 0.35);

  ctx.fillStyle = '#8B6914';
  ctx.font = '13px Georgia, serif';
  ctx.fillText('Rate Wanted: Dead or Alive', VP_X, H * 0.35 + 24);

  if (fbDone) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 18px Georgia, serif';
    ctx.fillText('Much obliged!', VP_X, H * 0.52);
    ctx.fillStyle = '#C8A04A';
    ctx.font = '13px Georgia, serif';
    ctx.fillText('Tap to close', VP_X, H * 0.52 + 24);
    return;
  }

  const stY = H * 0.52, stSz = 32;
  const stX = VP_X - 2.5 * stSz;
  for (let i = 1; i <= 5; i++) {
    ctx.fillStyle = i <= fbRating ? '#FFD700' : '#3a2a10';
    ctx.font = `${stSz}px Georgia, serif`;
    ctx.textAlign = 'left';
    ctx.fillText('★', stX + (i - 1) * stSz, stY + stSz * 0.85);
  }

  const btnReady = fbRating > 0 && !fbSubmitting;
  ctx.fillStyle = btnReady ? '#3a1500' : '#1a0d00';
  roundRect(ctx, VP_X - 80, H * 0.62, 160, 50, 8);
  ctx.fill();
  ctx.strokeStyle = btnReady ? '#C8A04A' : '#2a1a00';
  ctx.lineWidth = 1.5;
  roundRect(ctx, VP_X - 80, H * 0.62, 160, 50, 8);
  ctx.stroke();
  ctx.fillStyle = btnReady ? '#FFD700' : '#3a2a10';
  ctx.font = 'bold 15px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.fillText(fbSubmitting ? 'Sending...' : 'Send Feedback', VP_X, H * 0.62 + 31);

  ctx.fillStyle = '#3a2a10';
  ctx.font = '13px Georgia, serif';
  ctx.fillText('Skip', VP_X, H * 0.76 + 28);
}

// ── UTILS ─────────────────────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  if (w <= 0 || h <= 0) return;
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ── MAIN LOOP ─────────────────────────────────────────────────────
let last = 0;
function loop(ts) {
  try {
    const dt = Math.min((ts - last) / 1000, 0.05);
    last = ts;
    ctx.clearRect(0, 0, W, H);

    if (state === 'title') {
      drawTitle();
    } else if (state === 'poster') {
      posterTimer -= dt;
      if (posterTimer <= 0) state = 'playing';
      drawPoster();
    } else if (state === 'playing') {
      tickTime(dt);
      drawScene();
      drawHUD();
    } else if (state === 'win') {
      drawScene();
      drawHUD();
      drawGameOver(true);
      if (!fbVisible) { fbVisible = true; fbRating = 0; fbDone = false; fbSubmitting = false; }
      if (fbVisible) drawFeedback();
    } else if (state === 'lose') {
      drawScene();
      drawHUD();
      drawGameOver(false);
      if (!fbVisible) { fbVisible = true; fbRating = 0; fbDone = false; fbSubmitting = false; }
      if (fbVisible) drawFeedback();
    }

    requestAnimationFrame(loop);
  } catch (e) {
    console.error(e);
    requestAnimationFrame(loop);
  }
}

requestAnimationFrame(loop);

// ── INPUT ─────────────────────────────────────────────────────────
c.addEventListener('pointerdown', e => {
  const r = c.getBoundingClientRect();
  handleTap(
    (e.clientX - r.left) * (W / r.width),
    (e.clientY - r.top)  * (H / r.height)
  );
});

document.addEventListener('keydown', e => {
  if (e.code === 'Space')       handleTap(VP_X, H / 2);
  if (e.code === 'ArrowLeft')   { if (state === 'playing') navigate(-1); }
  if (e.code === 'ArrowRight')  { if (state === 'playing') navigate(1);  }
});

// ── TEST INTERFACE ────────────────────────────────────────────────
window.__test = {
  getState:       () => state,
  getScore:       () => score,
  getTimer:       () => timer,
  getConfidence:  () => confidence,
  getFugitiveId:  () => fugitiveId,
  getSuspects:    () => suspects.map(s => ({ ...s })),
  getLocations:   () => locations.map(l => ({ ...l, npcs: [...l.npcs] })),
  getCurrentLoc:  () => currentLoc,
  getWrongStrikes:() => wrongStrikes,
  getPopups:      () => popups.map(p => ({ ...p })),
  getCluesFound:  () => cluesFound.size,
  getAccuseMode:  () => accuseMode,
  getLoseReason:  () => loseReason,
  FEAT_HATS, FEAT_COATS, FEAT_BUILDS, LOC_NAMES, NUM_LOCS, NUM_SUSPECTS,
  ACCUSE_THRESHOLD, CLUE_WEIGHT, EVIDENCE_WEIGHT, FUGITIVE_SUSPICION, TOTAL_TIME,
  startGame() { startGame(); state = 'playing'; },
  startGameFull: startGame,
  tickTime,
  navigate,
  interviewSuspect,
  examineEvidence,
  accuseSuspect,
  handleTap,
  setTimer:       t  => { timer = t; },
  setConfidence:  cv => { confidence = cv; },
  setCurrentLoc:  n  => { currentLoc = n; },
  setAccuseMode:  b  => { accuseMode = b; },
  setWrongStrikes:n  => { wrongStrikes = n; },
  getFugFeatures: () => ({ ...fugFeatures }),
};
</script>
